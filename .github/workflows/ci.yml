name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Lint Python Scripts
        run: |
          # Check syntax correctness for all Python scripts in the repo.
          # All .py files now live in scripts/ (the migration to scripts/ moved
          # them out of root). Listing scripts/*.py alone — without the
          # `*.py scripts/*.py` form — is robust across shell-glob behaviors
          # (CI runners that have nullglob on would silently drop an empty
          # root glob and pass, but bash with default nullglob off passes the
          # literal `*.py` to py_compile which then errors with FileNotFoundError).
          python3 -m py_compile scripts/*.py

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint Shell Scripts
        run: |
          # Lint shell scripts to catch actual code-breaking errors, ignoring styling/formatting recommendations
          shellcheck --severity=error *.sh scripts/*.sh

      - name: Validate Docker Compose Configuration
        run: |
          # Create a dummy .env file to satisfy environment variable dependencies in docker-compose.yml
          touch .env
          echo "WIREGUARD_PRIVATE_KEY=dummy_key_private" >> .env
          echo "WIREGUARD_PUBLIC_KEY=dummy_key_public" >> .env
          echo "WIREGUARD_ADDRESSES=10.2.0.2/32" >> .env
          echo "TS_AUTHKEY=tskey-auth-dummy" >> .env
          
          # Validate configuration syntax
          docker compose config
