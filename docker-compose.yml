services:
  warp:
    image: qmcgaw/gluetun
    container_name: warp
    cap_add:
      - NET_ADMIN
    environment:
      - VPN_SERVICE_PROVIDER=custom
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_PUBLIC_KEY=${WIREGUARD_PUBLIC_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}
      - WIREGUARD_ENDPOINT_IP=162.159.192.1
      - WIREGUARD_ENDPOINT_PORT=2408
      # MTU Fix (Critical): Prevent packet fragmentation from double-encryption
      - WIREGUARD_MTU=1280
    entrypoint:
      - /bin/sh
      - -c
      - "export WIREGUARD_PORT=$$((1024 + RANDOM % 64511)) && exec /gluetun-entrypoint"
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    volumes:
      - ./post-rules.txt:/iptables/post-rules.txt
    restart: unless-stopped

  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale
    network_mode: service:warp
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - TS_EXTRA_ARGS=--advertise-exit-node
      - TS_USERSPACE=false
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./tailscale-state:/var/lib/tailscale
    depends_on:
      - warp
    restart: unless-stopped

  routing-fix:
    image: alpine:latest
    container_name: routing-fix
    network_mode: service:warp
    cap_add:
      - NET_ADMIN
    command: sh -c "while true; do ip rule add to 100.64.0.0/10 lookup 52 pref 99 2>/dev/null; sleep 30; done"
    depends_on:
      - warp
      - tailscale
    restart: unless-stopped
