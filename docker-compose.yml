services:
  warp:
    image: qmcgaw/gluetun
    container_name: warp
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=custom
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_PUBLIC_KEY=${WIREGUARD_PUBLIC_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}
      - WIREGUARD_ENDPOINT_IP=162.159.192.1
      - WIREGUARD_ENDPOINT_PORT=2408
      # MTU Fix (Critical): Prevent packet fragmentation from double-encryption
      - WIREGUARD_MTU=1280
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    volumes:
      - ./post-rules.txt:/iptables/post-rules.txt:ro
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale
    network_mode: service:warp
    depends_on:
      warp:
        condition: service_healthy
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_MODULE
    environment:
      - TS_EXTRA_ARGS=--advertise-exit-node
      - TS_USERSPACE=false
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
    entrypoint:
      - /bin/sh
      - -c
      - |
        if [ -f "/var/lib/tailscale/tailscaled.state" ] && [ -s "/var/lib/tailscale/tailscaled.state" ]; then
          echo "State found — unsetting TS_AUTHKEY to avoid expired key failure"
          unset TS_AUTHKEY
        fi
        exec /usr/local/bin/containerboot
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./tailscale-state:/var/lib/tailscale
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  routing-fix:
    image: alpine:latest
    container_name: routing-fix
    network_mode: service:warp
    pid: "service:tailscale"
    cap_add:
      - NET_ADMIN
    depends_on:
      warp:
        condition: service_healthy
    command: >
      sh -c "
        was_missing=0
        while true; do
          if ip rule show | grep -q '100.64.0.0/10'; then
            if [ $$was_missing -eq 1 ]; then
              echo 'routing-fix: Rule restored — sending SIGHUP to tailscaled'
              kill -HUP $$(pidof tailscaled) 2>/dev/null || true
              was_missing=0
            fi
          else
            ip rule add to 100.64.0.0/10 lookup 52 pref 99 2>/dev/null || true
            echo 'routing-fix: Rule missing, re-injected'
            was_missing=1
          fi
          sleep 5
        done
      "
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"
