services:
  warp:
    image: qmcgaw/gluetun:v3.41.1
    container_name: warp
    hostname: nullexit-gateway
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "5354:5335/udp"    # AdGuard DNS (5335 is used by SSH on host, use 5354 instead)
      - "5354:5335/tcp"    # AdGuard DNS (TCP)
      - "41641:41641/udp"  # Tailscale WireGuard (direct connection to host)
      - "1080:1080/tcp"    # SOCKS5 proxy (routed through WARP tunnel)
    environment:
      - TZ=America/New_York
      - VPN_SERVICE_PROVIDER=custom
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_PUBLIC_KEY=${WIREGUARD_PUBLIC_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}
      - WIREGUARD_ENDPOINT_IP=162.159.192.1
      - WIREGUARD_ENDPOINT_PORT=2408
      # Set to 25s (WireGuard default) to beat standard 30s hardware NAT/firewall UDP timeouts
      - WIREGUARD_PERSISTENT_KEEPALIVE_INTERVAL=25s
      # MTU Fix (Critical): Prevent packet fragmentation from double-encryption
      - WIREGUARD_MTU=1280
      # Give WARP more time to establish the connection before internal restart (default is 6s which is too short)
      - HEALTH_VPN_DURATION_INITIAL=30s
      # Use plaintext DNS resolvers instead of DNS-over-TLS (DoT) to prevent startup failures on networks where port 853 is blocked
      - DNS_UPSTREAM_RESOLVER_TYPE=plain
      - DNS_UPSTREAM_PLAIN_ADDRESSES=1.1.1.1:53,8.8.8.8:53
      # Allow local network traffic to bypass WARP so Tailscale can establish fast, direct peer-to-peer connections (no DERP relays) on the LAN
      - FIREWALL_OUTBOUND_SUBNETS=192.168.0.0/16,172.16.0.0/12,10.0.0.0/8
      # Built-in DNS blocking for ads, malicious domains, and tracking
      # NOTE: This is the massive "Hagezi-style" built-in blocklist. 
      # You can turn these to 'on' for maximum security if you have spare RAM 
      # or are running this on a cloud exit node with adequate autonomous resources (requires approx 1-2GB of RAM).
      # Disabled intentionally: AdGuard Home provides the DNS filtering layer instead.
      # If AdGuard fails, there is no fallback filtering, but the healthcheck 
      # dependency chain ensures Tailscale won't come up if AdGuard is down.
      - BLOCK_MALICIOUS=off
      - BLOCK_SURVEILLANCE=off
      - BLOCK_ADS=off
    dns:
      - 1.1.1.1
    sysctls:
      - net.ipv4.ip_forward=1
    volumes:
      - ./post-rules.txt:/iptables/post-rules.txt:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/gluetun-entrypoint healthcheck"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  tailscale:
    image: tailscale/tailscale:v1.98.4
    container_name: tailscale
    network_mode: service:warp
    depends_on:
      warp:
        condition: service_healthy
      adguardhome:
        condition: service_healthy
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    environment:
      - TZ=America/New_York
      - TS_EXTRA_ARGS=--advertise-exit-node
      - PORT=41641
      - TS_USERSPACE=false
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      # (Note: For headless/cloud deployments, you can bypass this footgun by
      # using Tailscale Ephemeral Keys which auto-clean themselves).
      - TS_AUTH_ONCE=true
      # Enable Tailscale's built-in SOCKS5 proxy to route out of the WARP tunnel
      - TS_SOCKS5_SERVER=:1080
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - tailscale_state:/var/lib/tailscale
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  routing-fix:
    image: nullexit-routing-fix:v1.0.0
    build:
      context: ./scripts
      dockerfile: Dockerfile.routing-fix
    container_name: routing-fix
    network_mode: service:warp
    # NOTE: Deliberately NOT sharing tailscale's PID namespace — the shared
    # namespace caused routing-fix to be killed whenever tailscale restarted
    # (e.g. during gluetun health-check flaps), which dropped all routing
    # table changes and left traffic leaking through eth0 instead of tun0.
    cap_add:
      - NET_ADMIN
      - SYSLOG
    depends_on:
      warp:
        condition: service_healthy
      rule-compiler:
        condition: service_completed_successfully
    environment:
      - TZ=America/New_York
      - WARP_ENDPOINT=162.159.192.1
      - BLOCKED_COUNTRIES=${BLOCKED_COUNTRIES}
    volumes:
      - ./scripts/routing-fix.sh:/routing-fix.sh:ro
      # SECURITY: ./adguard/work/ is bind-mounted into this container.
      # Never write to it from the host or another container. The
      # single allowed writer is `python3 sync-rules.py` — manual
      # edits corrupt the AdGuard cache + BoltDB session store.
      - ./adguard/work/userfilters:/userfilters:ro
      - ./adguard/work:/adguard_work:ro
      - .:/app
    restart: unless-stopped
    stop_grace_period: 1s
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"

  adguardhome:
    # WARNING: AdGuard is pre-configured with hardcoded credentials (admin/nullexit).
    # This is fine for a local Mac running behind a NAT, but if you are deploying
    # this on a public cloud VPS with port 80/3000 exposed, change this immediately!
    image: adguard/adguardhome:v0.107.77
    container_name: adguardhome
    network_mode: service:warp
    depends_on:
      warp:
        condition: service_healthy
      rule-compiler:
        condition: service_completed_successfully
    environment:
      - TZ=America/New_York
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 5335 || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 10
    volumes:
      # SECURITY: ./adguard/work/ is bind-mounted into this container.
      # Never write to it from the host or another container. The
      # single allowed writer is `python3 sync-rules.py` — manual
      # edits corrupt the AdGuard cache + BoltDB session store.
      - ./adguard/work:/opt/adguardhome/work
      - ./adguard/conf:/opt/adguardhome/conf
    restart: unless-stopped
    stop_grace_period: 2s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  rule-compiler:
    image: nullexit-rule-compiler:v1.0.0
    build:
      context: ./scripts
      dockerfile: Dockerfile.rule-compiler
    container_name: rule-compiler
    volumes:
      - .:/app

volumes:
  tailscale_state:

networks:
  default:
    ipam:
      config:
        - subnet: 10.200.1.0/24
