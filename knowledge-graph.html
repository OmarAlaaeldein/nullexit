 hole-punching to external peers** — the [[Colima VM]] can't do it, so remote peers fall back to DERP; native Linux runs Docker without VM translation ([[LAN P2P & DERP]])\n- Makes [[Future - Host Lockdown]] **possible** — Linux separates host `OUTPUT` from Docker `FORWARD`, so you *can* blackhole host egress while the exit node keeps routing\n- Eliminates the `gvproxy` SNAT layer behind [[Bug - SNAT Endpoint Poisoning]]\n\n## ⚠️ What it obsoletes (big invalidation)\nHalf the codebase is macOS-specific: [[pf.conf]] kill-switch, the launchd [[watcher.sh]], [[Colima VM]] lifecycle handling, `networksetup`/`route`/`dscacheutil` idioms, the SNAT carve-outs. The `$OSTYPE` Linux branch exists but is *intent-similar, not feature-complete* (see agent.md \"Features Missing From Linux Scripts\").\n\n## Relationships\n- 🔧 **fixes:** VM P2P limits ([[LAN P2P & DERP]]), enables [[Future - Host Lockdown]]\n- ⚠️ **obsoletes:** [[pf.conf]], [[watcher.sh]] (launchd), [[Colima VM]]\n- 🔗 **root cause it removes:** [[Bug - SNAT Endpoint Poisoning]] (gvproxy)\n- 🧭 **index:** [[MOC - Future]]\n","nullexit-knowledge-graph/Future/Future - Pluggable Egress.md":"---\ntags:\n  - type/future\n  - status/architecture\n  - priority/medium\n---\n\n# 🔭 Future — Egress Compartmentalization (Pluggable Architecture)\n\n**§12.9 / §18.2.** Refactor the egress layer so the whole exit path is swappable via one `.env` variable (`EGRESS_TYPE`) + `./toggle.sh --restart`.\n\n## The plan\n1. **Egress plugin system:** WARP-specific logic (`cdn-cgi/trace` health checks, hardcoded interface names) scattered across [[toggle.sh]] + [[routing-fix]] gets abstracted into `scripts/plugins/` where each method (`warp.sh`, `v2ray.sh`) implements `get_egress_interface()`, `check_health()`, `get_bypass_ips()`\n2. **Dynamic compose:** generate compose to spin up only the needed egress containers (skip `warp` when `EGRESS_TYPE=v2ray`)\n3. **Agnostic watchers:** [[routing-fix]] reads `EGRESS_INTERFACE` from the active plugin; the [[WARP Watcher]] becomes a generic \"Egress Watcher\" calling `check_health()`\n\n## Why it's the keystone future\nIt's the **prerequisite** that makes [[Future - AmneziaWG]], [[Future - Shadowsocks Hop]] (B2), and [[Future - Host-Only Tor Mode]] clean instead of invasive rewrites.\n\n## ⚠️ What it touches\nEvery WARP assumption in [[toggle.sh]], [[routing-fix]], [[WARP Watcher]], [[diagnose-host-leak.sh]] — a deliberate, wide refactor.\n\n## Relationships\n- ⬆️ **enables:** [[Future - AmneziaWG]], [[Future - Shadowsocks Hop]], [[Future - Host-Only Tor Mode]]\n- ⚠️ **refactors:** [[toggle.sh]], [[routing-fix]], [[WARP Watcher]]\n- 🧭 **index:** [[MOC - Future]]\n","nullexit-knowledge-graph/Future/Future - Post-Quantum.md":"---\ntags:\n  - type/future\n  - status/research\n  - priority/low\n---\n\n# 🔭 Future — Post-Quantum Cryptography (PQC)\n\n**§18.2.** Tailscale uses Curve25519, theoretically vulnerable to \"harvest now, decrypt later\" quantum attacks. A future iteration could replace the [[tailscale container]] with **raw WireGuard + [Rosenpass](https://rosenpass.eu/)** to negotiate post-quantum PSKs.\n\n## ⚠️ What it invalidates\nDropping Tailscale means losing **MagicDNS** ([[MagicDNS Routing]]), the built-in **SOCKS5** fallback ([[SOCKS5 Fallback]]), the coordination/mesh convenience, and the exit-node advertisement model — all of which the current stack leans on heavily. This is a deep swap, not a drop-in.\n\n## Relationships\n- 🛡️ **strengthens:** [[Threat Model]] (future quantum adversary)\n- ⚠️ **replaces:** [[tailscale container]] → loses [[MagicDNS Routing]], [[SOCKS5 Fallback]]\n- 🤝 **kin:** [[Future - Mullvad & Headscale]] (PSK layer)\n- 🧭 **index:** [[MOC - Future]]\n","nullexit-knowledge-graph/Future/Future - Shadowsocks Hop.md":"---\ntags:\n  - type/future\n  - status/research\n  - priority/low\n---\n\n# 🔭 Future — Shadowsocks / Obfuscation Hop\n\n**§12.4–§12.6, §12.8.** For when WARP is blocked by DPI (recognizable WireGuard handshake to a known Cloudflare IP:2408). **Diagnose first** — if a different provider/IP gets through, the block is Cloudflare-specific and you just swap `VPN_SERVICE_PROVIDER` (Path A). Only if WireGuard *itself* is fingerprinted do you add obfuscation.\n\n## Two ways to slot it in\n- **B1 — Wrap (recommended):** a Shadowsocks/obfs4/v2ray **sidecar**; point [[warp (Gluetun)|Gluetun]]'s endpoint at `127.0.0.1:<port>`; the sidecar relays to your own SS server abroad. **Keeps Gluetun's kill-switch + the whole self-healing stack** — nothing downstream knows the transport changed.\n- **B2 — Replace:** swap `warp` for SS-client + `tun2socks` that owns the namespace. ⚠️ Loses Gluetun's kill-switch/healthcheck (rebuild by hand) — same invalidation as [[Future - AmneziaWG]].\n\n## Note\n`Gluetun's SHADOWSOCKS=on` is the **wrong direction** (it's a server *inside* the tunnel, not a client transport). Plain SS can still be caught by active-probing DPI → next step is v2ray-plugin/Cloak or VLESS+Reality/Hysteria2. Requires a self-hosted VPS (~$4/mo Hetzner; Oracle free tier hands your metadata to Oracle).\n\n## Relationships\n- 🩹 **for:** DPI-blocked WARP ([[Double-Tunnel]] transport)\n- ⚠️ **B2 removes:** [[warp (Gluetun)]] kill-switch (B1 preserves it)\n- ⬆️ **cleanest with:** [[Future - Pluggable Egress]]\n- 🤝 **alternative:** [[Future - AmneziaWG]]\n- 🧭 **index:** [[MOC - Future]]\n","nullexit-knowledge-graph/Observations/Obs - AGY CLI Notifications.md":"---\ntags:\n  - type/observation\n  - status/unverified\n---\n\n# 🔬 Obs — AGY CLI Generates Native macOS Notifications\n\n**§16.2 (unverified, source ruled out at system level).** While testing the blocklist with `malware.wicar.org` (a benign EICAR-style test domain) in a `dig` loop via the Antigravity CLI (`agy`), a macOS-style \"malicious/blocked\" notification appeared and the AGY session closed.\n\n## Investigation\n- XProtect/Gatekeeper logs: **empty**\n- Endpoint Security / System Policy logs: **empty**\n- Broad `log show` for \"malicious/malware/blocked\": **empty**\n- Conclusion: **macOS did not generate it.** Most likely AGY CLI's own guardrail (it's a native app with Notification Center access) fired on the word \"malware\" in the proposed command.\n\n## Takeaway\nFor future DNS blocklist testing, use ad/tracking domains (`doubleclick.net`, `adnxs.com`) to avoid tripping AGY's guardrails.\n\n## Relationships\n- 🔗 **concerns:** [[AdGuard DNS Sinkhole]] testing / [[Sweep Protocol]]\n- 🧭 **index:** [[MOC - Bugs]]\n","nullexit-knowledge-graph/Observations/Obs - Cross-AP P2P.md":"---\ntags:\n  - type/observation\n  - status/open\n---\n\n# 🔬 Obs — Tailscale P2P Succeeds Cross-AP But Fails Same-AP\n\n**§16.4 (July 15, 2026).** Counterintuitively, **farther apart = P2P works.** A Galaxy S24 six floors away (different AP) gets a direct low-ping Tailscale session to an iPhone 11; the *same pair on the same AP* falls back to DERP. The effect shows for the iPhone 11 (plain client) but **not** for S24→macOS or S24→gateway.\n\n## Mechanism\n- **Same AP:** client isolation (L2 block) + both devices share one public IP → reaching each other needs the router to **NAT-hairpin**, which most consumer/campus gear won't do → DERP fallback\n- **Different AP:** large networks segment per-AP into distinct VLANs/subnets routed through the core → client isolation doesn't apply, STUN works **without** hairpin → clean direct P2P\n- **Why macOS/container are immune:** nullexit pins a **direct WireGuard endpoint** (port 41642, `direct 172.x`) so those peers already hold a negotiated path; a plain iPhone 11 is at the mercy of Wi-Fi topology\n\n## Relevance\nRefines [[watcher.sh]]'s `detect_lan_p2p_mode()`: a single \"LAN P2P allowed?\" boolean **under-describes** a multi-AP network — isolation is *per-AP*, and cross-VLAN P2P can succeed even when same-AP fails. No code change; documents expected behavior. Same STUN/hairpin physics as [[Bug - FaceTime Double-Tunnel]] and [[Bug - SNAT Endpoint Poisoning]].\n\n## Relationships\n- 🔬 **refines:** [[LAN P2P & DERP]], [[watcher.sh]] detection\n- 🤝 **same physics as:** [[Bug - SNAT Endpoint Poisoning]], [[Bug - FaceTime Double-Tunnel]]\n- 🧭 **index:** [[MOC - Bugs]]\n","nullexit-knowledge-graph/Observations/Obs - Dual Sinkhole IPs.md":"---\ntags:\n  - type/observation\n  - status/unverified\n---\n\n# 🔬 Obs — AdGuard Returns Two Different Sinkhole IPs\n\n**§16.1 (unverified).** Some blocked domains resolve to `0.0.0.0`, others to `127.0.0.1` — both block, but the inconsistency was unexpected.\n\n## Likely explanation\n[[rule-compiler]] pulls from both **AdBlock-format** sources (`||domain^` → `0.0.0.0`, AdGuard native) and **hosts-format** sources (`127.0.0.1 domain`, Steven Black / Spamhaus / Feodo). AdGuard faithfully returns whatever sinkhole IP the matching rule specifies. (A third convention, `NXDOMAIN`, is the Pi-hole purist default.)\n\n## To verify\nCheck `docker compose exec tailscale cat /etc/hosts` for injected hosts rules, and the AdGuard query log to see which rule matched each domain.\n\n## Relationships\n- 🔗 **concerns:** [[AdGuard DNS Sinkhole]], [[rule-compiler]]\n- 🧭 **index:** [[MOC - Bugs]]\n","nullexit-knowledge-graph/Observations/Obs - system_profiler Longevity.md":"---\ntags:\n  - type/observation\n  - status/open\n  - risk/tension\n---\n\n# 🔬 Obs — `system_profiler SPAirPortDataType` Longevity Risk\n\n**§16.3 / §15.11.6.** [[watcher.sh]]'s `detect_lan_p2p_mode()` reads Wi-Fi security via `system_profiler SPAirPortDataType` — the replacement after Apple **removed the `airport` binary in macOS 14.4** as part of an ongoing Wi-Fi-privacy clampdown.\n\n## The risk\n`system_profiler` still works (no sudo, no redaction) as of Sequoia 15.x — **but given Apple's trajectory, it may be locked down next.** If `security` comes back empty on a future macOS while on Wi-Fi, detection silently falls back to `allow=false` (a safe default) but the detection is *broken* — over-restricting [[LAN P2P & DERP]] on trusted networks.\n\n## Why this is a tension edge\nThis is a **future OS change that would invalidate a working feature** — the auto-detection that decides [[LAN P2P & DERP|P2P safety]]. The long-term fix is a small **Swift CoreWLAN helper** compiled and bundled in the repo.\n\n## Relationships\n- ⚠️ **threatens:** [[watcher.sh]] LAN-P2P detection, [[LAN P2P & DERP]]\n- 🩹 **mitigation:** bundled Swift CoreWLAN helper (not built)\n- 📜 **history:** [[Bugs - macOS Platform Quirks]] (airport removal)\n- 🧭 **tension map:** [[MOC - Tensions & Invalidations]]\n","nullexit-knowledge-graph/Threat-Model/Threat Model.md":"---\ntags:\n  - type/concept\n  - concept/security\n  - moc/threat\n---\n\n# 🛡️ Threat Model\n\nnullexit **shifts trust** rather than eliminating it, calibrated against documented mass-surveillance programs (Snowden: PRISM, UPSTREAM, XKeyscore, MUSCULAR). The goal: no single provider holds a complete picture.\n\n## Layered defense (what each layer defeats)\n- **ISP surveillance** → [[Double-Tunnel]] (WARP): ISP sees only an encrypted tunnel to Cloudflare\n- **DNS tracking** → [[AdGuard DNS Sinkhole]] via [[MagicDNS Routing]]\n- **Device IP exposure** → [[tailscale container|Tailscale]] mesh\n- **IP-direct malware** → [[Kernel IP Blocklist]] + [[Geo-IP Blocking]]\n- **Tunnel death leaks** → [[PF Kill-Switch]] + [[WARP Watcher]]\n- **Nation-state / DPI evasion** → [[Tor-over-WARP]]\n- **Supply-chain** → [[Python Runtime Airgap]]\n- **Script tampering** → [[Crypto Integrity]]\n\n## Trust assumptions (each shifts, none eliminates)\n1. Your physical devices are not compromised\n2. Cloudflare won't correlate your WARP tunnel with exit traffic (strict no-logs, but sees your real IP while connected)\n3. Tailscale won't MITM WireGuard keys\n\n## Structural limitations (honest)\n- **Traffic analysis / metadata** (UPSTREAM-style passive fiber tapping) — needs mixing (Tor) or dummy padding, both crush performance. Partial, opt-in mitigation now exists: [[Cover Traffic & Padding]] via [[noise.sh]] (`NOISE_ENABLED`)\n- **Targeted state actors** — consumer VPNs aren't a complete shield; this defeats *bulk passive* + corporate dragnet\n- Local proxy discovery isn't stopped by [[Procedural Ports]]/[[Honey-Port Tripwire]] — needs a [[PF Kill-Switch|loopback host firewall]]\n- [[Future - Host Lockdown]] impossible on macOS\n\n## Hardening path\n→ [[Future - Mullvad & Headscale]], [[Future - Post-Quantum]], ephemeral keys, PSKs (§9.4)\n\n## Relationships\n- 🧩 **composed of:** every [[MOC - Concepts|concept]] above\n- 🔭 **strengthened by:** [[MOC - Future|hardening upgrades]]\n- ⚔️ **trade-offs mapped in:** [[MOC - Tensions & Invalidations]]\n"}};

/* ---------- palette (validated, dark surface #1a1a19) ---------- */
const GROUP_META = [["Components", "#199e70", "Components"], ["Bugs", "#e66767", "Bugs"], ["Concepts", "#3987e5", "Concepts"], ["Future", "#9085e9", "Future"], ["00-Maps", "#c98500", "Maps"], ["Containers", "#008300", "Containers"], ["Observations", "#d55181", "Observations"], ["Root", "#8a897f", "Root"], ["Threat-Model", "#d95926", "Threat Model"], ["Unresolved", "#6b6a60", "Unresolved"]];
const GROUP_COLOR = Object.fromEntries(GROUP_META.map(g => [g[0], g[1]]));
const GROUP_LABEL = Object.fromEntries(GROUP_META.map(g => [g[0], g[2]]));

/* ---------- build graph model ---------- */
const FILES = DATA.files || {};
const nodes = DATA.nodes.map(n => ({ ...n, ghost: false }));
for (const g of (DATA.ghosts || [])) nodes.push({ id: g.id, group: "Unresolved", ghost: true, refs: g.refs, tags: [], aliases: [], preview: "Unresolved link: no note with this name exists yet." });
const byId = new Map(nodes.map(n => [n.id, n]));
const edges = DATA.edges
  .map(e => ({ s: byId.get(e.s), t: byId.get(e.t) }))
  .filter(e => e.s && e.t);

for (const n of nodes) { n.deg = 0; n.out = []; n.inc = []; n.nbr = new Set(); }
for (const e of edges) {
  e.s.deg++; e.t.deg++;
  e.s.out.push(e.t); e.t.inc.push(e.s);
  e.s.nbr.add(e.t); e.t.nbr.add(e.s);
}
for (const n of nodes) n.r = 3 + 1.7 * Math.sqrt(n.deg);
const maxDeg = Math.max(...nodes.map(n => n.deg));
const hubDeg = Math.max(14, maxDeg * 0.6);

/* deterministic per-id pseudo-random */
function hash01(str, salt) {
  let h = 2166136261 ^ salt;
  for (let i = 0; i < str.length; i++) { h ^= str.charCodeAt(i); h = Math.imul(h, 16777619); }
  return ((h >>> 0) % 100000) / 100000;
}

/* initial layout: one angular sector per group */
{
  const gs = [...new Set(nodes.map(n => n.group))];
  const gi = new Map(gs.map((g, i) => [g, i]));
  for (const n of nodes) {
    const base = (gi.get(n.group) / gs.length) * Math.PI * 2;
    const a = base + (hash01(n.id, 7) - 0.5) * (Math.PI * 2 / gs.length) * 1.4;
    const r = 90 + 320 * hash01(n.id, 13);
    n.x = Math.cos(a) * r; n.y = Math.sin(a) * r;
    n.vx = 0; n.vy = 0; n.fx = null; n.fy = null;
  }
}

/* ---------- force simulation (d3-style) ---------- */
let alpha = 1;
const ALPHA_MIN = 0.001, ALPHA_DECAY = 0.019, VEL_KEEP = 0.6;
const CHARGE = -1200, CHARGE_MAX2 = 1600 * 1600;

function tick() {
  // link springs
  for (const e of edges) {
    const s = e.s, t = e.t;
    let dx = (t.x + t.vx) - (s.x + s.vx), dy = (t.y + t.vy) - (s.y + s.vy);
    let l = Math.sqrt(dx * dx + dy * dy) || 1e-6;
    const target = 140 + s.r + t.r;
    const strength = 0.7 / Math.min(s.deg, t.deg);
    const k = (l - target) / l * alpha * strength;
    dx *= k; dy *= k;
    const bias = s.deg / (s.deg + t.deg);
    t.vx -= dx * bias; t.vy -= dy * bias;
    s.vx += dx * (1 - bias); s.vy += dy * (1 - bias);
  }
  // n-body repulsion
  for (let i = 0; i < nodes.length; i++) {
    const a = nodes[i];
    for (let j = i + 1; j < nodes.length; j++) {
      const b = nodes[j];
      let dx = b.x - a.x, dy = b.y - a.y;
      let l2 = dx * dx + dy * dy;
      if (l2 >= CHARGE_MAX2) continue;
      if (l2 < 1) { dx = hash01(a.id, j) - 0.5; dy = hash01(b.id, i) - 0.5; l2 = dx * dx + dy * dy + 0.01; }
      const w = -CHARGE * alpha / Math.max(l2, 64);
      b.vx += dx * w; b.vy += dy * w;
      a.vx -= dx * w; a.vy -= dy * w;
    }
  }
  // weak pull to origin
  for (const n of nodes) {
    const g = (n.deg ? 0.02 : 0.09) * alpha;
    n.vx -= n.x * g; n.vy -= n.y * g;
  }
  // collision (single pass)
  for (let i = 0; i < nodes.length; i++) {
    const a = nodes[i];
    for (let j = i + 1; j < nodes.length; j++) {
      const b = nodes[j];
      let dx = b.x - a.x, dy = b.y - a.y;
      const min = a.r + b.r + 10;
      let l2 = dx * dx + dy * dy;
      if (l2 >= min * min || l2 === 0) continue;
      const l = Math.sqrt(l2), push = (min - l) / l * 0.5;
      dx *= push; dy *= push;
      b.x += dx; b.y += dy; a.x -= dx; a.y -= dy;
    }
  }
  // integrate
  for (const n of nodes) {
    if (n.fx != null) { n.x = n.fx; n.y = n.fy; n.vx = 0; n.vy = 0; continue; }
    n.vx *= VEL_KEEP; n.vy *= VEL_KEEP;
    n.x += n.vx; n.y += n.vy;
  }
  alpha += (0 - alpha) * ALPHA_DECAY;
}
function reheat(a) { alpha = Math.max(alpha, a); }

/* ---------- view state ---------- */
const cv = document.getElementById("cv");
const ctx = cv.getContext("2d");
let W = 0, H = 0, DPR = 1;
let scale = 1, tx = 0, ty = 0;
let hoverN = null, selN = null;
let userMoved = false;
const hiddenGroups = new Set();
let labelMode = 0; // 0 auto, 1 all, 2 off
let needsDraw = true;
let tween = null;

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 3);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = Math.round(W * DPR); cv.height = Math.round(H * DPR);
  cv.style.width = W + "px"; cv.style.height = H + "px";
  needsDraw = true;
}
window.addEventListener("resize", () => { resize(); if (!userMoved) fitView(false); });
resize();

const visible = n => !hiddenGroups.has(n.group);
function bbox() {
  let x0 = 1e9, y0 = 1e9, x1 = -1e9, y1 = -1e9, any = false;
  for (const n of nodes) {
    if (!visible(n)) continue; any = true;
    x0 = Math.min(x0, n.x - n.r); y0 = Math.min(y0, n.y - n.r);
    x1 = Math.max(x1, n.x + n.r); y1 = Math.max(y1, n.y + n.r);
  }
  return any ? { x0, y0, x1, y1 } : { x0: -100, y0: -100, x1: 100, y1: 100 };
}
function fitView(animate) {
  const b = bbox();
  const pad = 70;
  const s = Math.min((W - pad) / (b.x1 - b.x0 + 1), (H - pad * 2.4) / (b.y1 - b.y0 + 1));
  const ns = Math.max(0.06, Math.min(s, 2));
  const cx = (b.x0 + b.x1) / 2, cy = (b.y0 + b.y1) / 2;
  setView(W / 2 - cx * ns, H / 2 - cy * ns + 14, ns, animate);
}
function setView(nx, ny, ns, animate) {
  if (!animate) { tx = nx; ty = ny; scale = ns; needsDraw = true; return; }
  tween = { t0: performance.now(), dur: 380, fx: tx, fy: ty, fs: scale, nx, ny, ns };
}
function stepTween(now) {
  if (!tween) return;
  let p = Math.min(1, (now - tween.t0) / tween.dur);
  p = 1 - Math.pow(1 - p, 3);
  tx = tween.fx + (tween.nx - tween.fx) * p;
  ty = tween.fy + (tween.ny - tween.fy) * p;
  scale = tween.fs + (tween.ns - tween.fs) * p;
  needsDraw = true;
  if (p >= 1) tween = null;
}
function zoomAt(px, py, factor) {
  const ns = Math.max(0.06, Math.min(scale * factor, 6));
  const wx = (px - tx) / scale, wy = (py - ty) / scale;
  tx = px - wx * ns; ty = py - wy * ns; scale = ns;
  userMoved = true; needsDraw = true;
}

/* ---------- render ---------- */
function labelAlpha(n) {
  if (labelMode === 2) return (n === selN || n === hoverN) ? 1 : 0;
  let a;
  if (labelMode === 1) a = 1;
  else {
    a = Math.max(0, Math.min(1, (scale - 0.15) * 1.5));
    if (n.deg >= hubDeg) a = Math.max(a, scale >= 0.4 ? 0.92 : 0.55);
  }
  if (selN) a = (n === selN || selN.nbr.has(n)) ? 1 : a * 0.06;
  else if (hoverN) a = (n === hoverN || hoverN.nbr.has(n)) ? Math.max(a, 0.9) : a * 0.35;
  return a;
}
function draw() {
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.fillStyle = "#1a1a19";
  ctx.fillRect(0, 0, W, H);
  ctx.setTransform(DPR * scale, 0, 0, DPR * scale, DPR * tx, DPR * ty);

  const focus = selN || hoverN;
  // edges
  ctx.lineWidth = 1 / scale;
  ctx.strokeStyle = "#9c9b90";
  ctx.beginPath();
  for (const e of edges) {
    if (!visible(e.s) || !visible(e.t)) continue;
    if (focus && (e.s === focus || e.t === focus)) continue;
    ctx.moveTo(e.s.x, e.s.y); ctx.lineTo(e.t.x, e.t.y);
  }
  ctx.globalAlpha = focus ? 0.04 : 0.10;
  ctx.stroke();
  if (focus) {
    ctx.beginPath();
    for (const e of edges) {
      if (!visible(e.s) || !visible(e.t)) continue;
      if (e.s !== focus && e.t !== focus) continue;
      ctx.moveTo(e.s.x, e.s.y); ctx.lineTo(e.t.x, e.t.y);
    }
    ctx.globalAlpha = 0.75;
    ctx.strokeStyle = "#c3c2b7";
    ctx.lineWidth = 1.4 / scale;
    ctx.stroke();
  }

  // nodes
  for (const n of nodes) {
    if (!visible(n)) continue;
    const dim = focus && n !== focus && !focus.nbr.has(n);
    ctx.globalAlpha = dim ? 0.13 : 1;
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
    ctx.fillStyle = GROUP_COLOR[n.group] || "#888";
    if (n.ghost) {
      ctx.globalAlpha = dim ? 0.1 : 0.55;
      ctx.setLineDash([3 / scale, 3 / scale]);
      ctx.strokeStyle = "#8a897f"; ctx.lineWidth = 1.2 / scale;
      ctx.stroke(); ctx.setLineDash([]);
    } else {
      ctx.fill();
    }
    if (n === selN) {
      ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 2 / scale;
      ctx.setLineDash([]);
      ctx.beginPath(); ctx.arc(n.x, n.y, n.r + 2.5 / scale, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  // labels
  const fs = 12 / scale;
  ctx.font = `500 ${fs}px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif`;
  ctx.textAlign = "center"; ctx.textBaseline = "top";
  for (const n of nodes) {
    if (!visible(n)) continue;
    const a = labelAlpha(n);
    if (a <= 0.02) continue;
    ctx.globalAlpha = a;
    ctx.fillStyle = (n === selN || n === hoverN) ? "#ffffff" : "#c3c2b7";
    ctx.strokeStyle = "rgba(26,26,25,0.85)";
    ctx.lineWidth = 3 / scale;
    ctx.strokeText(n.id, n.x, n.y + n.r + 4 / scale);
    ctx.fillText(n.id, n.x, n.y + n.r + 4 / scale);
  }
  ctx.globalAlpha = 1;
}

/* ---------- main loop ---------- */
/* pre-settle synchronously so the first paint is already laid out */
for (let i = 0; i < 400 && alpha > 0.03; i++) tick();
let settleFit = true;
fitView(false);
function frame(now) {
  if (alpha > ALPHA_MIN) {
    tick();
    if (settleFit && !userMoved) fitView(false);
    needsDraw = true;
  } else if (settleFit) { settleFit = false; if (!userMoved) fitView(false); }
  stepTween(now);
  if (needsDraw) { draw(); needsDraw = false; }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* ---------- hit testing ---------- */
function pick(px, py) {
  const wx = (px - tx) / scale, wy = (py - ty) / scale;
  const slack = 8 / scale;
  let best = null, bd = 1e9;
  for (const n of nodes) {
    if (!visible(n)) continue;
    const dx = n.x - wx, dy = n.y - wy;
    const d = Math.sqrt(dx * dx + dy * dy) - n.r;
    if (d < slack && d < bd) { bd = d; best = n; }
  }
  return best;
}

/* ---------- pointer input (mouse + touch unified) ---------- */
const pointers = new Map();
let dragN = null, panStart = null, pinchPrev = null;
let downInfo = null;

cv.addEventListener("pointerdown", ev => {
  try { cv.setPointerCapture(ev.pointerId); } catch (_) {}
  pointers.set(ev.pointerId, { x: ev.clientX, y: ev.clientY });
  hideResults();
  if (pointers.size === 1) {
    downInfo = { x: ev.clientX, y: ev.clientY, t: performance.now(), moved: false };
    const n = pick(ev.clientX, ev.clientY);
    if (n) { dragN = n; n.fx = n.x; n.fy = n.y; }
    else { panStart = { px: ev.clientX, py: ev.clientY, tx, ty }; cv.classList.add("grabbing"); }
  } else if (pointers.size === 2) {
    if (dragN) { dragN.fx = dragN.fy = null; dragN = null; }
    panStart = null;
    const [a, b] = [...pointers.values()];
    pinchPrev = { d: Math.hypot(a.x - b.x, a.y - b.y), mx: (a.x + b.x) / 2, my: (a.y + b.y) / 2 };
  }
});
cv.addEventListener("pointermove", ev => {
  const p = pointers.get(ev.pointerId);
  if (!p) { // plain hover
    const n = pick(ev.clientX, ev.clientY);
    if (n !== hoverN) { hoverN = n; needsDraw = true; }
    cv.classList.toggle("pointing", !!n);
    return;
  }
  p.x = ev.clientX; p.y = ev.clientY;
  if (downInfo && Math.hypot(ev.clientX - downInfo.x, ev.clientY - downInfo.y) > 7) downInfo.moved = true;
  if (pointers.size === 2 && pinchPrev) {
    const [a, b] = [...pointers.values()];
    const d = Math.hypot(a.x - b.x, a.y - b.y) || 1;
    const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
    zoomAt(pinchPrev.mx, pinchPrev.my, d / pinchPrev.d);
    tx += mx - pinchPrev.mx; ty += my - pinchPrev.my;
    pinchPrev = { d, mx, my };
    needsDraw = true;
  } else if (dragN) {
    dragN.fx = (ev.clientX - tx) / scale;
    dragN.fy = (ev.clientY - ty) / scale;
    reheat(0.12); userMoved = true; needsDraw = true;
  } else if (panStart) {
    tx = panStart.tx + (ev.clientX - panStart.px);
    ty = panStart.ty + (ev.clientY - panStart.py);
    userMoved = true; needsDraw = true;
  }
});
function endPointer(ev) {
  pointers.delete(ev.pointerId);
  if (pointers.size < 2) pinchPrev = null;
  if (pointers.size === 0) {
    cv.classList.remove("grabbing");
    const tap = downInfo && !downInfo.moved && performance.now() - downInfo.t < 500;
    if (tap) {
      const n = pick(ev.clientX, ev.clientY);
      if (n) select(n); else deselect();
    }
    if (dragN) { dragN.fx = dragN.fy = null; dragN = null; reheat(0.08); }
    panStart = null; downInfo = null;
  }
}
cv.addEventListener("pointerup", endPointer);
cv.addEventListener("pointercancel", endPointer);
cv.addEventListener("wheel", ev => {
  ev.preventDefault();
  const k = ev.deltaMode === 1 ? 20 : 1;
  zoomAt(ev.clientX, ev.clientY, Math.exp(-ev.deltaY * k * 0.0016));
}, { passive: false });

/* ---------- selection & panel ---------- */
const panel = document.getElementById("panel");
const ptitle = document.getElementById("ptitle");
const pbody = document.getElementById("pbody");
document.getElementById("pclose").addEventListener("click", deselect);

const esc = s => s.replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

function linkRow(n) {
  return `<button class="lrow" data-id="${esc(n.id)}">
    <span class="dot" style="--c:${GROUP_COLOR[n.group]}"></span>
    <span class="nm">${esc(n.id)}</span></button>`;
}
/* embedded content opens in the in-page viewer; otherwise fall back to a
   relative link that resolves when the HTML lives in the source tree */
function fileLink(path, icon, label) {
  if (FILES[path] !== undefined)
    return `<button data-f="${esc(path)}">${icon} <span>${esc(label)}</span></button>`;
  return `<a href="${encodeURI(path)}" target="_blank" rel="noopener">${icon} <span>${esc(label)}</span></a>`;
}
function githubLink(url) {
  return `<a href="${esc(url)}" target="_blank" rel="noopener">🐙 <span>GitHub</span></a>`;
}
/* the commit hash: links straight to the file's GitHub history when the repo
   has a GitHub remote, otherwise opens the same history embedded in-page */
function revLink(hash, ghhist, history, kind) {
  const code = `<code>${esc(hash)}</code>`;
  if (ghhist) return `<a class="hlink" href="${esc(ghhist)}" target="_blank" rel="noopener" title="View file history on GitHub">${code}</a>`;
  if (history && history.length) return `<button class="hlink" data-hist="${kind}" title="View commit history">${code}</button>`;
  return code;
}
function select(n) {
  selN = n; needsDraw = true;
  ptitle.textContent = n.id;
  let h = `<div class="pmeta"><span class="gchip"><span class="dot" style="--c:${GROUP_COLOR[n.group]}"></span>${esc(GROUP_LABEL[n.group] || n.group)}</span>`;
  for (const t of (n.tags || [])) h += `<span class="tag">#${esc(t)}</span>`;
  h += `</div>`;
  if (n.preview) h += `<p class="preview">${esc(n.preview)}</p>`;
  if (n.created || n.rev || n.srev) {
    h += `<div class="gitmeta">`;
    if (n.created) {
      h += `<div>Created <b>${esc(n.created)}</b>`;
      if (n.modified && n.modified !== n.created) h += ` · updated <b>${esc(n.modified)}</b>`;
      h += `</div>`;
    }
    if (n.rev) h += `<div class="grev">📝 ${revLink(n.rev, n.ghhist, n.history, "note")} ${esc(n.revmsg || "")}</div>`;
    if (n.srev) h += `<div class="grev">⚙️ ${revLink(n.srev, n.srcghhist, n.srchistory, "src")} ${esc(n.srevmsg || "")}${n.smod ? ` · ${esc(n.smod)}` : ""}</div>`;
    h += `</div>`;
  }
  const files = [];
  if (n.path) {
    files.push(fileLink(n.path, "📝", n.path.split("/").pop()));
    if (n.gh) files.push(githubLink(n.gh));
  }
  if (n.src) {
    files.push(fileLink(n.src, "⚙️", n.src));
    if (n.srcgh) files.push(githubLink(n.srcgh));
  }
  if (files.length) h += `<div class="flinks">${files.join("")}</div>`;
  const outs = n.out ? n.out.filter(visible) : [];
  const ins = n.inc ? n.inc.filter(visible) : [];
  if (outs.length) h += `<div class="lsec">Links to · ${outs.length}</div>` + outs.map(linkRow).join("");
  if (ins.length) h += `<div class="lsec">Linked from · ${ins.length}</div>` + ins.map(linkRow).join("");
  if (n.ghost && n.refs) h += `<div class="lsec">Referenced by</div>` + n.refs.map(id => byId.has(id) ? linkRow(byId.get(id)) : "").join("");
  pbody.innerHTML = h;
  pbody.scrollTop = 0;
  panel.classList.add("open");
  document.getElementById("hint").style.opacity = 0;
}
function deselect() {
  selN = null; needsDraw = true;
  panel.classList.remove("open");
}
pbody.addEventListener("click", ev => {
  const fb = ev.target.closest("[data-f]");
  if (fb) { openViewer(fb.dataset.f); return; }
  const hb = ev.target.closest("[data-hist]");
  if (hb) {
    const isSrc = hb.dataset.hist === "src";
    const entries = isSrc ? selN.srchistory : selN.history;
    const label = isSrc ? (selN.src || selN.id).split("/").pop() : selN.id;
    if (entries) openHistory(entries, label);
    return;
  }
  const btn = ev.target.closest(".lrow");
  if (!btn) return;
  const n = byId.get(btn.dataset.id);
  if (n) focusNode(n);
});

/* ---------- mobile bottom sheet: collapsed by default, expand at will ---------- */
const phandle = document.getElementById("phandle");
let sheetDrag = null;
phandle.addEventListener("pointerdown", ev => {
  sheetDrag = { y: ev.clientY };
  try { phandle.setPointerCapture(ev.pointerId); } catch (_) {}
});
phandle.addEventListener("pointerup", ev => {
  if (!sheetDrag) return;
  const dy = ev.clientY - sheetDrag.y;
  sheetDrag = null;
  if (dy < -20) panel.classList.add("tall");                    // swipe up
  else if (dy > 20) {                                           // swipe down
    if (panel.classList.contains("tall")) panel.classList.remove("tall");
    else deselect();
  } else panel.classList.toggle("tall");                        // tap
});
phandle.addEventListener("pointercancel", () => { sheetDrag = null; });

/* ---------- embedded file viewer ---------- */
const viewer = document.getElementById("viewer");
const vname = document.getElementById("vname");
const vbody = document.getElementById("vbody");
let viewerText = null, viewerName = null;
function openViewer(path) {
  viewerText = FILES[path]; viewerName = path.split("/").pop();
  vname.textContent = viewerName;
  vname.title = path;
  vbody.textContent = viewerText;
  vbody.style.whiteSpace = path.endsWith(".md") ? "pre-wrap" : "pre";
  vbody.scrollTop = 0; vbody.scrollLeft = 0;
  viewer.classList.add("open");
}
/* commit history embedded in-page, for repos without a GitHub remote to
   deep-link to (or when the caller wants it without leaving the page) */
function openHistory(entries, label) {
  viewerName = `${label}-history.txt`;
  const width = Math.max(7, ...entries.map(e => e[0].length));
  viewerText = entries.map(([h, d, s]) => `${h.padEnd(width)}  ${d}  ${s}`).join("\n");
  vname.textContent = `${label} · history`;
  vname.title = `${entries.length} commit${entries.length === 1 ? "" : "s"}`;
  vbody.textContent = viewerText;
  vbody.style.whiteSpace = "pre";
  vbody.scrollTop = 0; vbody.scrollLeft = 0;
  viewer.classList.add("open");
}
function closeViewer() { viewer.classList.remove("open"); viewerText = viewerName = null; }
document.getElementById("vclose").addEventListener("click", closeViewer);
document.getElementById("vdl").addEventListener("click", () => {
  if (viewerText == null) return;
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([viewerText], { type: "text/plain" }));
  a.download = viewerName;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
});
window.addEventListener("keydown", ev => {
  if (ev.key !== "Escape") return;
  if (viewer.classList.contains("open")) closeViewer();
  else if (panel.classList.contains("open")) deselect();
});
function focusNode(n) {
  select(n);
  const ns = Math.max(scale, Math.min(1.6, 1.1));
  const yOff = window.innerWidth < 720 ? -H * 0.12 : 0;
  setView(W / 2 - n.x * ns, H / 2 - n.y * ns + yOff, ns, true);
  userMoved = true;
}

/* ---------- search ---------- */
const searchEl = document.getElementById("search");
const resultsEl = document.getElementById("results");
function hideResults() { resultsEl.classList.remove("open"); }
function runSearch() {
  const q = searchEl.value.trim().toLowerCase();
  if (!q) { hideResults(); return; }
  const hits = nodes.filter(n =>
    n.id.toLowerCase().includes(q) ||
    (n.aliases || []).some(a => a.toLowerCase().includes(q)) ||
    (n.tags || []).some(t => t.toLowerCase().includes(q))
  ).slice(0, 14);
  if (!hits.length) { hideResults(); return; }
  resultsEl.innerHTML = hits.map((n, i) => `
    <div class="rrow${i === 0 ? " hot" : ""}" data-id="${esc(n.id)}">
      <span class="dot" style="--c:${GROUP_COLOR[n.group]}"></span>
      <span class="nm">${esc(n.id)}</span>
      <span class="gp">${esc(GROUP_LABEL[n.group] || n.group)}</span>
    </div>`).join("");
  resultsEl.classList.add("open");
}
searchEl.addEventListener("input", runSearch);
searchEl.addEventListener("focus", runSearch);
searchEl.addEventListener("keydown", ev => {
  if (ev.key === "Enter") {
    const first = resultsEl.querySelector(".rrow");
    if (first) { pickResult(first.dataset.id); }
  } else if (ev.key === "Escape") hideResults();
});
resultsEl.addEventListener("pointerdown", ev => {
  const row = ev.target.closest(".rrow");
  if (row) { ev.preventDefault(); pickResult(row.dataset.id); }
});
function pickResult(id) {
  const n = byId.get(id);
  hideResults(); searchEl.blur();
  if (n) { hiddenGroups.delete(n.group); renderLegend(); focusNode(n); }
}
document.addEventListener("pointerdown", ev => {
  if (!ev.target.closest("#searchwrap")) hideResults();
});

/* ---------- legend ---------- */
const legendEl = document.getElementById("legend");
function renderLegend() {
  const counts = {};
  for (const n of nodes) counts[n.group] = (counts[n.group] || 0) + 1;
  legendEl.innerHTML = GROUP_META
    .filter(([g]) => counts[g])
    .map(([g, c, label]) => `
      <span class="chip${hiddenGroups.has(g) ? " off" : ""}" data-g="${esc(g)}">
        <span class="dot" style="--c:${c}"></span>${esc(label)} <b>${counts[g]}</b>
      </span>`).join("");
}
legendEl.addEventListener("click", ev => {
  const chip = ev.target.closest(".chip");
  if (!chip) return;
  const g = chip.dataset.g;
  if (hiddenGroups.has(g)) hiddenGroups.delete(g); else hiddenGroups.add(g);
  if (selN && hiddenGroups.has(selN.group)) deselect();
  renderLegend(); needsDraw = true;
});
renderLegend();

/* ---------- controls ---------- */
document.getElementById("bFit").addEventListener("click", () => fitView(true));
document.getElementById("bIn").addEventListener("click", () => { zoomAt(W / 2, H / 2, 1.35); });
document.getElementById("bOut").addEventListener("click", () => { zoomAt(W / 2, H / 2, 1 / 1.35); });
document.getElementById("bHeat").addEventListener("click", () => { reheat(0.7); settleFit = !userMoved; });
document.getElementById("bLbl").addEventListener("click", () => {
  labelMode = (labelMode + 1) % 3;
  document.getElementById("lblState").textContent = ["auto", "all", "off"][labelMode];
  needsDraw = true;
});

/* ---------- stats & hint ---------- */
document.getElementById("stats").textContent =
  `${nodes.filter(n => !n.ghost).length} notes · ${edges.length} links`;
setTimeout(() => { document.getElementById("hint").style.opacity = 0; }, 6000);
</script>
</body>
</html>
