X-portable; macOS does NOT ship `flock`).\n# The trap below removes the lock file on every exit so a stale lock never\n# outlives a crashed watcher. On launch: read the existing PID, check it is\n# alive AND is actually a `scripts/watcher.sh` process; if so, exit 0; else\n# overwrite with our PID and proceed. The check-then-write window has a TOCTOU\n# race but is microseconds wide and only matters for hand-launched duplicate\n# test invocations; production is single-launch via launchctl load -w.\nLOCK_FILE=\"/tmp/nullexit-watcher.lock\"\nLOCK_PID=\"\"\nif [ -e \"$LOCK_FILE\" ]; then\n  LOCK_PID=$(cat \"$LOCK_FILE\" 2>/dev/null || echo \"\")\n  if [ -n \"$LOCK_PID\" ] && kill -0 \"$LOCK_PID\" 2>/dev/null; then\n    # Verify the holder is actually a scripts/watcher.sh process (not some\n    # unrelated process that got the recycled PID). The exact-launchd pattern\n    # `bash <abs-path>/scripts/watcher.sh` is hard to accidentally match with\n    # a `grep scripts/watcher.sh .` invocation because we anchor on `^bash`\n    # followed by whitespace and end-of-line on the script path.\n    if ps -p \"$LOCK_PID\" -o args= 2>/dev/null | grep -qE \"(^|[[:space:]])bash[[:space:]]+.*scripts/watcher\\.sh$\"; then\n      echo \"[$(date -u +%FT%TZ)] watcher.sh: another instance holds $LOCK_FILE (pid=$LOCK_PID), exiting\"\n      exit 0\n    fi\n  fi\nfi\necho $$ > \"$LOCK_FILE\"\n\necho \"[$(date -u +%FT%TZ)] watcher.sh start (pid=$$ ppid=$PPID user=$(id -un) lock=acquired)\"\n\n# Treat launchd-resume as a wake signal. Apple's launchd SUSPENDS LaunchAgents\n# during system sleep and restores them on wake; during that suspended gap,\n# macOS's `log stream` cannot catch the wake event that prompted the resume.\n# The next thing that happens after wake IS our own startup, so we always\n# fire one post-wake run unconditionally here. The marker check + debounce\n# in run_recover() make this idempotent: if the gateway isn't up or we just\n# debounced, it no-ops. Without this, the FIRST wake-after-install goes\n# unseen and the watcher appears broken until the SECOND wake.\n# ─── Helper: run recover.sh --post-wake if the gateway is active ──────────\nrun_recover() {\n  local why=\"$1\"\n  if [ ! -f \"$MARKER\" ]; then\n    echo \"[$(date -u +%FT%TZ)] $why → no $MARKER, skip\"\n    return 0\n  fi\n  local now last settle_until\n  now=$(date +%s)\n  # Post-recovery settle window: ignore the Global/IPv4 change our own last\n  # post-wake run caused (exit-node re-assert) so we don't self-feedback loop.\n  settle_until=$(cat \"$COOLDOWN_FILE\" 2>/dev/null || echo 0)\n  if [ \"$now\" -lt \"$settle_until\" ]; then\n    echo \"[$(date -u +%FT%TZ)] $why → settling ($((settle_until - now))s left in post-recovery cooldown), skip\"\n    return 0\n  fi\n  last=$(cat \"$DEBOUNCE_FILE\" 2>/dev/null || echo 0)\n  if [ \"$((now - last))\" -lt \"$DEBOUNCE_SECONDS\" ]; then\n    echo \"[$(date -u +%FT%TZ)] $why → debounced ($((now - last))s since last, threshold ${DEBOUNCE_SECONDS}s)\"\n    return 0\n  fi\n  echo \"$now\" > \"$DEBOUNCE_FILE\"\n  echo \"[$(date -u +%FT%TZ)] $why → bash $RECOVER --post-wake\"\n  bash \"$RECOVER\" --post-wake\n  local exit_code=$?\n  now=$(date +%s)\n  echo \"$now\" > \"$DEBOUNCE_FILE\"\n  # Arm the settle cooldown so the route change this run just caused can't re-fire us.\n  echo \"$((now + POSTWAKE_SETTLE_SECONDS))\" > \"$COOLDOWN_FILE\"\n  echo \"[$(date -u +%FT%TZ)] $why → exit=$exit_code (settle until +${POSTWAKE_SETTLE_SECONDS}s, now=$now)\"\n  return $exit_code\n}\n\nif [ -f \"$MARKER\" ]; then\n  run_recover \"initial post-wake (launchd resume = wake signal)\"\nfi\n\n# ─── LAN P2P Auto-Detection ────────────────────────────────────────────────\n# Detects whether the current network allows safe Tailscale LAN P2P by:\n#   1. Checking WPA2-Enterprise (802.1x) via system_profiler SPAirPortDataType — always forces P2P=false\n#      because enterprise networks almost universally have AP Client Isolation.\n#   2. AP Isolation probe — sends a broadcast ping and checks if ANY LAN host responds.\n#      If no LAN hosts respond on a non-empty network, AP Isolation is active.\n# Writes 'true' or 'false' to .lan_p2p_detected in the repo root.\n# routing-fix.sh reads this file dynamically every 30s loop iteration.\nP2P_OVERRIDE_FILE=\"$SCRIPT_DIR/../.lan_p2p_detected\"\n\n\ndetect_lan_p2p_mode() {\n  local reason=\"unknown\" allow=\"false\"\n\n  # Step 1: Detect Wi-Fi security type via system_profiler (airport binary removed in macOS 14.4+)\n  # SPAirPortDataType lists all known networks; the first \"Security:\" line is the current association.\n  local security\n  security=$(system_profiler SPAirPortDataType 2>/dev/null \\\n    | awk '/Current Network Information:/{found=1} found && /Security:/{print $NF; exit}')\n\n  if [ -z \"$security\" ]; then\n    # Not on Wi-Fi or system_profiler unavailable — fail safe\n    reason=\"no-wifi\" allow=\"false\"\n  elif echo \"$security\" | grep -qi \"Enterprise\"; then\n    # WPA2/WPA3 Enterprise = 802.1x — always AP isolated\n    reason=\"802.1x-enterprise\" allow=\"false\"\n  elif echo \"$security\" | grep -qi \"Personal\\|None\\|Open\"; then\n    # WPA2/WPA3 Personal or open — probe for AP isolation\n    local gw\n    gw=$(route -n get 1.1.1.1 2>/dev/null | awk '/gateway:/{print $2}')\n    if [ -z \"$gw\" ]; then\n      reason=\"no-default-route\" allow=\"false\"\n    else\n      local responses\n      responses=$(ping -c 3 -t 1 -q \"$gw\" 2>/dev/null | awk '/packets transmitted/{print $4}')\n      if [ \"${responses:-0}\" -gt 0 ]; then\n        reason=\"wpa-personal-lan-reachable\" allow=\"true\"\n      else\n        reason=\"wpa-personal-ap-isolated\" allow=\"false\"\n      fi\n    fi\n  else\n    # Unknown security type — fail safe\n    reason=\"unknown-security-type\" allow=\"false\"\n  fi\n\n  echo \"[$(date -u +%FT%TZ)] P2P detect: security='${security:-none}' → allow=${allow} (reason: ${reason})\"\n  echo \"$allow\" > \"$P2P_OVERRIDE_FILE\"\n  write_host_ips\n}\n\n# Run once on startup\ndetect_lan_p2p_mode\n\n# ─── Listener 1: WAKE events via unified log ───────────────────────────────\n# Predicate picks up:\n#   * \"didWake\"             — regular kernel wake events (lid open, RTC alarm)\n#   * \"Wake from Sleep\"     — powerd-driven normal wake\n#   * \"DarkWake\"            — clamshell-display wake that didn't fully wake the\n#                             Mac (relevant when lid opens during display sleep)\n#   * \"Waking from\"         — generic catch-all for variations in newer macOS\n# `[c]` makes the match case-insensitive (the unified log uses mixed-case\n# phrases). --info reduces noise by dropping debug/trace log levels.\n# Subsystem-based predicate catches every powermanagement emission (willSleep,\n# didWake, didDim, didUndim, DarkWake, etc.) regardless of message phrasing\n# across kernel versions. Phrasing-based predicates ('didWake', 'Wake from Sleep')\n# are fragile across macOS releases. We accept the extra log noise because the\n# run_recover() debounce + marker check filter out anything that isn't a real\n# gateway-relevant event.\n(\n  # Reconnect loop: macOS rotates the unified log buffer periodically; when\n  # that happens, this `log stream` subscriber's pipe EOFs, the inner\n  # `while read` consumer terminates, and without this wrapper the listener\n  # would be silently dead for the rest of the watcher's lifetime.\n  while :; do\n    log stream --predicate \\\n      'subsystem == \"com.apple.powermanagement\"' \\\n       --style compact --info 2>/dev/null \\\n      | while IFS= read -r line; do\n          [ -z \"$line\" ] && continue\n          run_recover \"WAKE: $(echo \"$line\" | head -c 100)\"\n        done\n    echo \"[$(date -u +%FT%TZ)] log stream subshell exited; reconnecting in 5s\"\n    sleep 5\n  done\n) &\n\n# ─── Listener 2: NETWORK state changes via scutil ──────────────────────────\n# `scutil n.watch` on a state key prints SCEventUpdate lines whenever the key\n# changes. We watch Global/IPv4 because that's the umbrella that catches link,\n# address, route, and DNS changes for ALL interfaces in one namespace.\n# The pipe is kept alive by an `sleep 86400` loop so scutil never sees EOF\n# from us (which would silently terminate the watch).\n(\n  # Reconnect loop: scutil can exit noisily on certain state changes (rare,\n  # but observed). Without the wrapper, the network listener's pipe EOFs and\n  # every subsequent roam goes unseen until launchd restarts us.\n  while :; do\n    (\n      # Watch both IPv4 and IPv6 umbrella state — IPv6-only or dual-stack\n      # networks never fire on the IPv4 key alone, and the user's first roam\n      # in a hotel / airport / on cellular hotspot is often IPv6-first under\n      # NAT64.\n      echo \"n.add State:/Network/Global/IPv4\"\n      echo \"n.add State:/Network/Global/IPv6\"\n      echo \"n.watch\"\n      while true; do sleep 86400; done\n    ) | script -q /dev/null scutil 2>/dev/null \\\n      | while IFS= read -r line; do\n          case \"$line\" in\n            *changedKey*|*State:/Network/Global/IPv*|*n.state*|*SCEventUpdate*)\n              detect_lan_p2p_mode\n              run_recover \"NET: $(echo \"$line\" | head -c 100)\"\n              ;;\n            *) ;;\n          esac\n        done\n    echo \"[$(date -u +%FT%TZ)] scutil pipe exited; reconnecting in 5s\"\n    sleep 5\n  done\n) &\n# ─── Listener 3: TUNNEL_FAILED_CLOSED.marker Watcher ──────────────────────────\n# Polls for the fail-closed marker dropped by the routing-fix container.\n(\n  last_notified=0\n  while :; do\n    if [ -f \"$SCRIPT_DIR/../TUNNEL_FAILED_CLOSED.marker\" ]; then\n      now=$(date +%s)\n      # Notify once every 5 minutes (300s) if it stays failed\n      if [ \"$((now - last_notified))\" -ge 300 ]; then\n        osascript -e 'display notification \"VPN Tunnel Health Check Failed. Internet traffic is blackholed to prevent IP leak.\" with title \"NullExit Alert\"' || true\n        last_notified=$now\n      fi\n    else\n      last_notified=0\n    fi\n    sleep 3\n  done\n) &\n\n# ─── Lifetime ──────────────────────────────────────────────────────────────\n# `wait` blocks until both background pipelines exit (which they normally\n# never do). launchctl `bootout`/SIGTERM triggers the trap, which kills the\n# whole process group so the sleep-forever in the scutil pipe also dies.\n# We catch TERM/INT/HUP for explicit signals and EXIT for any normal-exit path\n# (so listeners always get cleaned up even if `exit 0` runs somewhere).\n# `rm -f $LOCK_FILE` first so a stale lock can never block the next launch.\n# `pkill -TERM -P $$` then targets direct listener-children, then `kill 0`\n# takes care of any backgrounded group-mates not reachable via the parent.\ntrap 'echo \"[$(date -u +%FT%TZ)] watcher.sh terminating (signal/exit=$?)\"; rm -f \"$LOCK_FILE\" 2>/dev/null || true; pkill -TERM -P $$ 2>/dev/null || true; kill 0 2>/dev/null || true; exit 0' TERM INT HUP EXIT\nwait","nullexit-knowledge-graph/Date of Creation.md":"15/07/2026","nullexit-knowledge-graph/00-Maps/Home.md":"---\ntags:\n  - moc/home\naliases:\n  - nullexit\n  - Index\n---\n\n# 🕳️ nullexit — Knowledge Graph\n\n**nullexit** is a chained network gateway: it routes all **[[tailscale container|Tailscale]]** exit-node traffic through a **[[warp (Gluetun)|Cloudflare WARP]]** tunnel (double encryption + ISP-metadata hiding), adds network-wide **[[AdGuard DNS Sinkhole|DNS ad-blocking]]**, a **[[Kernel IP Blocklist|kernel-level IP threat firewall]]**, **[[Geo-IP Blocking]]**, a **[[PF Kill-Switch]]**, and a secret isolated **[[Tor-over-WARP]]** proxy. It runs on a macOS host inside Docker via the **[[Colima VM]]**, orchestrated by **[[toggle.sh]]**.\n\n> This vault is a *knowledge graph*: each **aspect, bug, interaction, and future direction** is an atomic note, cross-linked so the relationships are visible in Obsidian's Graph View. See [[MOC - Tensions & Invalidations]] for the edges that answer *\"which future direction would invalidate a feature that works today, and which bug class threatens which plan.\"*\n\n## Maps of Content\n- 🧩 [[MOC - Components]] — every script & orchestration file\n- 📦 [[MOC - Containers]] — the 6 Docker services + the VM\n- 💡 [[MOC - Concepts]] — features, mechanisms, design decisions\n- 🐛 [[MOC - Bugs]] — the full incident log (resolved, latent, structural)\n- 🔭 [[MOC - Future]] — TODOs, roadmap, hardening upgrades\n- ⚔️ [[MOC - Tensions & Invalidations]] — conflict / regression / trade-off edges\n- 🛡️ [[Threat Model]] — what nullexit defends against and what it does not\n\n## How to read the graph\nEvery note ends with a **Relationships** block using typed edges:\n\n- 🔗 **depends on / part of** — structural composition\n- ⬆️ **enables** — makes another feature possible\n- 🔧 **fixed by / mitigates** — a bug ↔ the code that resolved it\n- ⚠️ **conflicts with / can break / would invalidate** — the tension edges you care about\n- 🔬 **verify / open question** — unproven assumptions\n\n## Source of truth\nThis vault summarizes the repo's own docs: `README.md`, `devref.md` (2101-line incident log & threat model), `agent.md` (per-file breakdown), `diagrams.md` (Mermaid architecture). When in doubt, those files win — this graph is the *map*, not the territory.\n","nullexit-knowledge-graph/00-Maps/MOC - Bugs.md":"---\ntags:\n  - moc/bugs\n---\n\n# 🐛 MOC — Bugs & Incident Log\n\nnullexit's defining feature is its **incident log** (`devref.md §15`). Bugs are grouped by subsystem cluster; the most instructive / most-linked incidents are promoted to their own notes.\n\n## Clusters (subsystem groups)\n- [[Bugs - Exit-Node Return Path]] (§15.1) — the `rx 0` blackhole & SOCKS5 origin\n- [[Bugs - Routing Loops]] (§15.2) — infinite loops & subnet takeovers\n- [[Bugs - MTU & Throughput]] (§15.3) — fragmentation, QUIC, PMTUD blackholes\n- [[Bugs - DNS Interception]] (§15.4) — proxy wire format, MagicDNS bypass\n- [[Bugs - Roaming & Sleep-Wake]] (§15.5) — the auto-recovery saga\n- [[Bugs - WARP Liveness & Host Leaks]] (§15.6) — silent egress leaks\n- [[Bugs - Tailscale P2P & SNAT]] (§15.7) — endpoint poisoning, kill-switch conflicts\n- [[Bugs - Docker & Colima Lifecycle]] (§15.8) — VM hangs, startup cost\n- [[Bugs - Permissions & Crypto]] (§15.9) — sudo, integrity, locked files\n- [[Bugs - Tor Container]] (§15.10) — obfs4, ControlPort auth\n- [[Bugs - macOS Platform Quirks]] (§15.11) — AirDrop, airport removal, bash 3.2\n- [[Bugs - Misc Resolved]] (§15.12) — the long tail\n\n## Promoted incidents (high-linkage)\n- [[Bug - SNAT Endpoint Poisoning]] — the same-Wi-Fi P2P blackhole (the flagship bug)\n- [[Bug - Overnight Silent IP Leak]] — 8 hours leaking while \"healthy\"\n- [[Bug - WARP Watcher Race]] — self-inflicted nuclear shutdown on roam\n- [[Bug - STOP-START Live Probe]] — a *disable* that needed the gateway *up* to decide\n- [[Bug - FaceTime Double-Tunnel]] — symmetric NAT kills real-time media\n- [[Bug - bash 3.2 Heisenbug]] — `set -x` + `$(date)` PS4 aborts the script\n- [[Bug - Post-Wake Feedback Loop]] — the watcher re-fires on the change it caused\n- [[Bug - Docker Bridge Collision]] — the `172.17.0.0/16` overlap\n- [[Bug - Shadowed DoT-QUIC REJECT]] — ⚠️ **still latent** (a real open hole)\n\n## Unverified observations (§16)\nNot bugs — behaviors seen but not root-caused. Some are latent *risks*.\n- [[Obs - Dual Sinkhole IPs]] — `0.0.0.0` vs `127.0.0.1` blocking\n- [[Obs - AGY CLI Notifications]] — a CLI's own guardrail, not macOS\n- [[Obs - system_profiler Longevity]] — 🟡 a future-OS risk to LAN-P2P detection\n- [[Obs - Cross-AP P2P]] — cross-AP P2P succeeds where same-AP fails\n\n## Status legend\n- ✅ **resolved** — fixed & verified\n- 🟡 **latent / open** — known, not yet fixed → see [[MOC - Future]]\n- 🔴 **structural** — cannot be fixed in software (physics / platform)\n\nSee also: [[MOC - Tensions & Invalidations]] · [[MOC - Future]] · [[Home]]\n","nullexit-knowledge-graph/00-Maps/MOC - Components.md":"---\ntags:\n  - moc/components\n---\n\n# 🧩 MOC — Components & Scripts\n\nThe host-side orchestration layer. All lifecycle scripts run under macOS `/bin/bash` **3.2** (see [[Bug - bash 3.2 Heisenbug]]) and are HMAC-signed via [[Crypto Integrity]].\n\n## Orchestrators (repo root)\n- [[toggle.sh]] — the main ON/OFF lifecycle (2191 lines, cross-platform via `$OSTYPE`)\n- [[recover.sh]] — nuclear reset **and** `--post-wake` light refresh\n- [[setup.sh]] — one-time install, key generation, `.env` writing\n\n## Shared libraries (`scripts/`)\n- [[common.sh]] — extracted primitives (timeouts, DNS/proxy, WARP routes, marker helpers)\n\n## Daemons & sidecars\n- [[watcher.sh]] — launchd daemon: post-wake / post-roam recovery + [[LAN P2P & DERP|LAN-P2P auto-detection]]\n- [[routing-fix]] — the in-container sidecar (also the `routing-fix` container)\n- [[dns-proxy.py]] — host UDP:53 → TCP:5354 converter for [[SOCKS5 Fallback]]\n\n## Compiled helpers (Go, built in-container)\n- [[rule-compiler]] — DNS + IP threat-feed compiler\n- [[logger]] — structured logging piped from the sidecar\n\n## Firewall / rule files\n- [[pf.conf]] — macOS Packet Filter ruleset ([[PF Kill-Switch]] + [[MSS Clamping & MTU]])\n- [[post-rules.txt]] — Gluetun iptables rules loaded at container start\n\n## Security / integrity\n- [[crypto.sh]] — HMAC-SHA256 script signing/verification\n- [[unlock-files.sh]] — repairs stale `000`/`0444` inodes without `chmod`\n\n## Diagnostics & crisis tools\n- [[sweep.sh]] — automated read-only 6-check health sweep (timestamped report + gating exit code)\n- [[noise.sh]] — opt-in ACTIVE cover-traffic + verifiable-random noise ([[Cover Traffic & Padding]]; `NOISE_ENABLED`)\n- [[diagnose-host-leak.sh]] — 8-check host-egress leak classifier (`--fix`, `--watch`)\n- [[dns_anomaly_detector.py]] — report-only DNS-tunneling/DGA finder ([[DNS Anomaly Detection]]; stdlib, streaming)\n- [[pihole-mode.sh]] — opt-in LAN Pi-hole: serve [[AdGuard DNS Sinkhole]] filtering to non-mesh LAN devices\n- [[profiles.sh]] — config-only profiles (`campus`/`home`/`hardened`) that tame the `.env` flag sprawl\n- [[device-scramble.sh]] — random device identity (MAC + hostname) on Wi-Fi, most useful on open networks\n- [[fix-docker-bridge-collision.sh]] — repairs the [[Bug - Docker Bridge Collision|172.17/16 collision]]\n- [[reinstall-host-tailscale.sh]] — nuke-and-reinstall host Tailscale\n\n## Docs / meta\n- [[generate_tex.py]] — compiles the whole project into a LaTeX \"quine\"\n- [[Sweep Protocol]] — the `/sweep` end-to-end audit verb\n\nSee also: [[MOC - Containers]] · [[MOC - Concepts]] · [[Home]]\n","nullexit-knowledge-graph/00-Maps/MOC - Concepts.md":"---\ntags:\n  - moc/concepts\n---\n\n# 💡 MOC — Concepts, Features & Mechanisms\n\n## Core value proposition\n- [[Double-Tunnel]] — Tailscale (WireGuard) chained through WARP (WireGuard)\n- [[MagicDNS Routing]] — forcing mesh DNS into the sinkhole\n- [[Roaming & Recovery]] — how nullexit mimics commercial VPN roaming\n\n## The 4-layer firewall\n1. [[AdGuard DNS Sinkhole]] — DNS-level ad/tracker blocking\n2. [[Kernel IP Blocklist]] — ~16,700 threat-intel IPs in the FORWARD chain\n3. [[Geo-IP Blocking]] — country CIDR drops\n4. [[PF Kill-Switch]] — macOS default-deny on `en0`\n- ➕ [[DNS Anomaly Detection]] — statistical DNS-tunneling/DGA finder (report-only; catches what the blocklist can't)\n\n## Anonymity extras\n- [[Tor-over-WARP]] — isolated procedural SOCKS proxy\n- [[Transparent Onion Routing]] — `.onion` via the `198.18.0.0/15` benchmark subnet\n- [[Honey-Port Tripwire]] — local malware port-scan IDS\n- [[Procedural Ports]] — per-boot randomized proxy ports\n\n## Resilience & monitoring\n- [[WARP Watcher]] — statistical auto-shutdown on tunnel death\n- [[DNS Watcher]] — re-hijacks host DNS every 30s\n- [[Gateway Active Marker]] — persisted *intent* signal\n- [[SOCKS5 Fallback]] — the failover lane when the exit node is blocked\n\n## Networking internals\n- [[MSS Clamping & MTU]] — the double-tunnel overhead fight\n- [[LAN P2P & DERP]] — direct paths vs relay fallback\n\n## Security posture\n- [[Python Runtime Airgap]] — isolated-mode `python3 -I`\n- [[Crypto Integrity]] — HMAC-signed scripts\n- [[Threat Model]] — trust-shifting & structural limits\n\nSee also: [[MOC - Components]] · [[MOC - Bugs]] · [[Home]]\n","nullexit-knowledge-graph/00-Maps/MOC - Containers.md":"---\ntags:\n  - moc/containers\n---\n\n# 📦 MOC — Containers & VM\n\nAll containers share **one network namespace** — the [[warp (Gluetun)]] container's — via `network_mode: service:warp`. This is the linchpin: recreating `warp` detaches every other service's network stack (see [[recover.sh]] / agent-instruction warning). Everything runs inside the [[Colima VM]].\n\n| Container | Image | Role |\n|---|---|---|\n| [[warp (Gluetun)]] | `qmcgaw/gluetun` | WireGuard → Cloudflare WARP; **owns the namespace**; strict fail-closed firewall |\n| [[tailscale container]] | `tailscale/tailscale` | Advertises exit node; built-in [[SOCKS5 Fallback\\|SOCKS5]] proxy |\n| [[routing-fix]] | `alpine` | Sidecar: routing tables, iptables, [[Geo-IP Blocking]], [[Kernel IP Blocklist]] |\n| [[rule-compiler]] | `golang`/`alpine` | One-shot rule compiler ([[AdGuard DNS Sinkhole]] + IP feeds) |\n| [[adguardhome]] | `adguard/adguardhome` | DNS sinkhole on port 5335 |\n| [[tor container]] | `debian:bookworm-slim` | Isolated [[Tor-over-WARP]] SOCKS/Control/Transparent proxy |\n\n## Host substrate\n- [[Colima VM]] — the Linux VM (600MB RAM + 400MB swap) that runs Docker\n\n## Key namespace facts\n- Fail-closed egress is **inherited** by every container from `warp`'s iptables (see [[Tor-over-WARP]] kill-switch inheritance).\n- [[warp (Gluetun)]] enforces a strict outbound firewall → blocks the [[tailscale container]]'s STUN → cold-boot handshake delay (see [[Bugs - Roaming & Sleep-Wake]]).\n\nSee also: [[MOC - Components]] · [[MOC - Concepts]] · [[Home]]\n","nullexit-knowledge-graph/00-Maps/MOC - Future.md":"---\ntags:\n  - moc/future\n---\n\n# 🔭 MOC — Future Directions & Roadmap\n\nDrawn from `devref.md §18` (TODO/Future Work), `§12` (censorship-resistant transport), and `§9.4` (hardening upgrades).\n\n## Active TODOs\n- [[Future - FaceTime Split-Route]] — narrow opt-in direct route for Apple `/16`s (blocked on a live `tcpdump` capture)\n- [[Future - Fix Shadowed REJECTs]] — close the [[Bug - Shadowed DoT-QUIC REJECT|DoT/QUIC bypass]] hole\n- [[Future - Host-Only Tor Mode]] — DPI-resistant, VPS-free egress via Tor\n\n## Architecture evolution\n- [[Future - Pluggable Egress]] — swap the entire egress layer via one `.env` var\n- [[Future - AmneziaWG]] — DPI-evading WireGuard fork (rips out Gluetun)\n- [[Future - Shadowsocks Hop]] — obfuscation sidecar (Path B1/B2)\n\n## Hardening upgrades\n- [[Future - Mullvad & Headscale]] — replace WARP/Tailscale for stronger anonymity\n- [[Future - Post-Quantum]] — Rosenpass PQC PSKs\n- [[Future - Native Linux]] — Raspberry Pi / NUC deployment (fixes VM P2P limits)\n\n## Known-impossible (documented dead ends)\n- [[Future - Host Lockdown]] — Mode 3 host-blackout is impossible on macOS\n- Aggressive [[Double-Tunnel|IP rotation]] — intentionally excluded (breaks TCP, triggers CAPTCHAs)\n\n> ⚠️ Several of these **would invalidate features that work today** — that tension is mapped in [[MOC - Tensions & Invalidations]].\n\nSee also: [[MOC - Bugs]] · [[Threat Model]] · [[Home]]\n","nullexit-knowledge-graph/00-Maps/MOC - Tensions & Invalidations.md":"---\ntags:\n  - moc/tensions\n  - risk/tension\n---\n\n# ⚔️ MOC — Tensions & Invalidations\n\nThis is the map you asked for: **where a future direction would invalidate a feature that works today, where a bug class threatens a plan, and where two working features are already in tension.** Each row is a directed edge `A ⚠️ B`.\n\n## 1. Future directions that would INVALIDATE working features\n\n| Future direction | ⚠️ Invalidates / breaks | Why |\n|---|---|---|\n| [[Future - AmneziaWG]] | [[warp (Gluetun)]], [[WARP Watcher]], [[Tor-over-WARP]] fail-closed inheritance | Ripping out Gluetun destroys the built-in kill-switch + healthcheck the whole [[Roaming & Recovery]] stack leans on; you'd rebuild them by hand |\n| [[Future - Shadowsocks Hop]] (B2 \"replace\") | Same as above | Swapping `warp` for tun2socks loses Gluetun's namespace ownership; **B1 \"wrap\" is preferred precisely to avoid this** |\n| [[Future - Mullvad & Headscale]] | Cloudflare \"anonymity in a crowd\" ([[Double-Tunnel]] §9.1), static high-trust IP | Trades WARP's CAPTCHA-free shared IP for a flagged VPN ASN; changes the whole fraud-score posture |\n| [[Future - Host-Only Tor Mode]] | [[Double-Tunnel]], [[LAN P2P & DERP]], all UDP apps (FaceTime/QUIC/mDNS) | Tor is TCP-only; pf must **drop all host UDP** — kills the exact media paths [[Bug - FaceTime Double-Tunnel]] is trying to *restore* |\n| [[Future - Native Linux]] | The entire macOS layer: [[pf.conf]] kill-switch, [[watcher.sh]] launchd daemon, [[Colima VM]], SNAT carve-outs | Linux uses OUTPUT/FORWARD split & `resolvectl`; makes [[Future - Host Lockdown]] *possible* but obsoletes half the codebase |\n| [[Future - Pluggable Egress]] | Hardcoded WARP assumptions in [[toggle.sh]] & [[routing-fix]] | Requires abstracting `cdn-cgi/trace` health checks & interface names — a deliberate refactor that touches every monitor |\n| [[Future - Post-Quantum]] | [[tailscale container]] itself | Replaces Tailscale with raw WireGuard + Rosenpass — loses MagicDNS, the SOCKS fallback, coordination |\n\n## 2. Bug classes that THREATEN a plan or a working feature\n\n| Bug / risk | ⚠️ Threatens | Status |\n|---|---|---|\n| [[Bug - Shadowed DoT-QUIC REJECT]] | [[AdGuard DNS Sinkhole]] integrity — a client can bypass filtering via DoT:853 | 🟡 **latent, unfixed** → [[Future - Fix Shadowed REJECTs]] |\n| [[Bug - FaceTime Double-Tunnel]] (symmetric NAT) | Any real-time P2P media; blocks the utility of [[Double-Tunnel]] for calls | 🔴 structural → mitigated only by [[Future - FaceTime Split-Route]] |\n| [[Obs - system_profiler Longevity]] | [[LAN P2P & DERP]] auto-detection in [[watcher.sh]] | 🟡 Apple may lock down `system_profiler` like it killed `airport` |\n| [[Bug - bash 3.2 Heisenbug]] class | Every lifecycle script under `set -e` + traps | 🟡 recurring landmine; each new conditional is a candidate |\n| [[Bug - Overnight Silent IP Leak]] class (silent failure) | The **core promise** that \"your IP is always Cloudflare\" | ✅ mitigated by dual [[WARP Watcher]] + fail-closed kill-switch, but the *class* recurs |\n| [[Bug - STOP-START Live Probe]] design smell | Any control-flow that probes a subsystem it's responsible for starting | ✅ fixed via [[Gateway Active Marker]] intent; pattern worth guarding |\n\n## 3. Features already in TENSION with each other (live trade-offs)\n\n| Feature A | ⚔️ Feature B | The trade |\n|---|---|---|\n| [[LAN P2P & DERP\\|LAN P2P speed]] | [[Bug - SNAT Endpoint Poisoning\\|SNAT poisoning safety]] | Allowing P2P is faster but poisons phone endpoints on AP-isolated Wi-Fi → default is **DROP** and fall back to DERP |\n| [[MSS Clamping & MTU\\|QUIC blocking]] | WebRTC / real-time video latency | Blocking UDP:443 stabilizes weak Wi-Fi but forces calls onto slower TCP TURN |\n| [[PF Kill-Switch]] | [[SOCKS5 Fallback]] | Kill-switch bricks the host in SOCKS5 mode → kill-switch is now **exit-node-only** ([[Bugs - Tailscale P2P & SNAT|§15.7.3]]) |\n| [[Double-Tunnel]] anonymity | Banking / streaming access, CRD latency | Datacenter-IP fraud flags & UDP NAT relay are the \"tax\" for anonymity |\n| [[Honey-Port Tripwire]] / [[Procedural Ports]] | Real threat model | Only defeat *blind* scanners; a targeted local process reads `/tmp/nullexit-ports.env` → real fix is [[PF Kill-Switch\\|host firewall]] |\n| [[WARP Watcher]] auto-recovery | [[watcher.sh]] post-wake recovery | Two recovery daemons collided → needed lock + inhibit markers ([[Bug - WARP Watcher Race]]) |\n| Rule freshness | [[Colima VM]] battery/RAM | [[rule-compiler]] moved off the critical path; 30s polling chosen over netlink to save battery |\n\n## 4. Chains worth tracing in Graph View\n- **Same-Wi-Fi failure → cascade:** [[Bug - Docker Bridge Collision]] → [[LAN P2P & DERP|DERP saturation]] → [[Bug - SNAT Endpoint Poisoning]] → [[LAN P2P & DERP|RFC1918 DROP policy]]\n- **Silent-leak family:** [[Bug - Overnight Silent IP Leak]] ↔ [[WARP Watcher]] ↔ [[Bug - WARP Watcher Race]] ↔ [[Bug - Post-Wake Feedback Loop]]\n- **The `set -e` minefield:** [[Bug - bash 3.2 Heisenbug]] ↔ [[Bug - STOP-START Live Probe]] ↔ [[Gateway Active Marker]]\n\nSee also: [[MOC - Bugs]] · [[MOC - Future]] · [[Home]]\n","nullexit-knowledge-graph/Bugs/Bug - Docker Bridge Collision.md":"---\ntags:\n  - type/bug\n  - status/resolved\n  - severity/high\n---\n\n# 🐛 Bug — Docker Bridge vs Wi-Fi Subnet Collision (172.17.0.0/16)\n\n**§15.2.3.** When the local Wi-Fi router hands out IPs in **`172.17.0.0/16`** — the same range Docker uses for its default `docker0` bridge — pinging a local client or the gateway returns `No route to host`, and Tailscale drops to slow DERP relays.\n\n## Mechanism\nColima's Linux VM creates `docker0` on `172.17.0.0/16`; packets to `172.17.x.x` are captured by the VM's internal (empty) bridge and blackholed. macOS marks the route `REJECT` (`!`) when ARP fails. Local Tailscale P2P discovery is blackholed → DERP saturation → the client shows offline ([[LAN P2P & DERP]]).\n\n## The fix\n[[fix-docker-bridge-collision.sh]] — auto-detects the Wi-Fi subnet, picks a non-colliding `docker.bip` (default `172.26.0.1/24`), edits `~/.colima/default/colima.yaml` (timestamped backup), restarts [[Colima VM|Colima]], rebinds DHCP, verifies, and re-runs [[toggle.sh]] + [[diagnose-host-leak.sh]].\n\n## Why it's in the graph\nIt's the *first domino* in the same-Wi-Fi failure cascade that also involves DERP saturation and [[Bug - SNAT Endpoint Poisoning]].\n\n## Relationships\n- 🔧 **fixed by:** [[fix-docker-bridge-collision.sh]]\n- 🔗 **root cause:** [[Colima VM]] Docker bridge\n- ⚠️ **cascade partner:** [[LAN P2P & DERP]], [[Bug - SNAT Endpoint Poisoning]]\n- 🧭 **cluster:** [[Bugs - Routing Loops]]\n","nullexit-knowledge-graph/Bugs/Bug - FaceTime Double-Tunnel.md":"---\ntags:\n  - type/bug\n  - status/structural\n  - severity/medium\n---\n\n# 🐛 Bug — FaceTime (Real-Time P2P Media) Over the Double-Tunnel\n\n**§15.12.22 (July 15, 2026).** A FaceTime call placed while nullexit is up **fails to connect**. Zoom/WhatsApp *calls* hit the same wall.\n\n## Diagnosis — nullexit is NOT blocking it\nEvery layer was verified to pass the traffic live: no Apple domain is sinkholed, the exit-path `FORWARD` rule carries ~203K pkts, all country/threat blocklists dropped **0**, and WARP egress MASQUERADEs all outbound UDP.\n\n## Root cause — double symmetric NAT ending at WARP 🔴\nPath: `host → Tailscale MASQUERADE → WARP MASQUERADE → Cloudflare shared egress`. WARP is CGNAT-style with **no inbound UDP mappings**, and the double-MASQUERADE presents as **symmetric NAT** — exactly what defeats FaceTime's STUN/ICE UDP hole-punching. No P2P path can form; Apple relay is unreliable through the stacked tunnel; the 1280→1200 MTU squeeze degrades media. This is **inherent to routing real-time P2P through WARP**, not a firewall rule.\n\n## Live packet proof (2026-07-17)\nCaptured `tcpdump` on the exit-node interface `utun6` during a real call:\n- **UDP P2P media: 0 packets** — `avconferenced` bound to the tunnel (the host Tailscale IP) but its media socket showed 0 bytes and a placeholder peer. Hole-punching never formed — the symmetric NAT above, confirmed live.\n- **TCP-443 relay fallback: active** — FaceTime relayed media over TLS to an Apple relay in `17.249.0.0/16`, 899 pkts / 15 s. This is the degraded path that keeps the call barely up (extra latency, MSS-clamped, aggravated by the UDP:443 block).\n\n## The fix — now implemented ✅ (opt-in)\n[[Future - FaceTime Split-Route]] — route FaceTime's Apple `/16`s **direct** via the physical gateway (longest-prefix beats the exit-node `0.0.0.0/1`), so media hole-punches from the real IP. Built 2026-07-17 in [[common.sh]] (`add_apple_split_routes`) + [[pf.conf]] (`<apple_direct>` table so the kill-switch passes it), gated on `FACETIME_SPLIT_ROUTE` (default OFF). Default direct subnet = the captured `17.249.0.0/16`.\n\n## Same physics elsewhere\nThe STUN/hairpin analysis mirrors [[Bug - SNAT Endpoint Poisoning]] and [[Obs - Cross-AP P2P]].\n\n## Relationships\n- 🔴 **structural to:** [[Double-Tunnel]]\n- 🩹 **mitigated by:** [[Future - FaceTime Split-Route]] (implemented, opt-in)\n- ⚔️ **aggravated by:** [[MSS Clamping & MTU|QUIC/UDP handling]]\n- 🔬 **surfaced:** [[Bug - Shadowed DoT-QUIC REJECT]] (found during the same audit)\n- 🧭 **cluster:** [[Bugs - Misc Resolved]]\n","nullexit-knowledge-graph/Bugs/Bug - Overnight Silent IP Leak.md":"---\ntags:\n  - type/bug\n  - status/resolved\n  - severity/critical\n---\n\n# 🐛 Bug — The Overnight Silent IP Leak\n\n**§15.6.3.** The host leaked traffic over its raw ISP IP for **~8 hours** while every state check reported the gateway \"healthy and active.\" The canonical example of the *silent-failure* class — \"a security mechanism that fails silently is worse than none.\"\n\n## Investigation\n1. `pmset -g log` → the laptop **never slept** (ruled out sleep/wake)\n2. docker-compose was **missing `WIREGUARD_PERSISTENT_KEEPALIVE_INTERVAL`** → router NAT garbage-collected the UDP mapping overnight (30–120s idle timeout)\n3. WireGuard is stateless → the [[warp (Gluetun)|warp]] container stayed \"Up\" and every healthcheck passed while the tunnel inside was dead\n\n## The fix (defense in depth)\n1. `WIREGUARD_PERSISTENT_KEEPALIVE_INTERVAL=25s` — pins the UDP tunnel open past the 30s NAT timeout\n2. A **fail-closed kill-switch** in [[routing-fix]] — 30s `curl` over `tun0`; 3 fails → blackhole the default route\n3. A [[watcher.sh]] listener that pushes a macOS desktop notification on the fail-closed event\n\n## Two complementary failure systems\n- **Container-aware** ([[WARP Watcher]]) — fires when warp *knows* it's off\n- **Silent-failure** (routing-fix fail-closed) — fires when warp *thinks* it's on but NAT died\n\n## Relationships\n- 🔧 **fixed in:** docker-compose keepalive, [[routing-fix]] fail-closed, [[watcher.sh]] notify\n- 🛡️ **guards:** [[Double-Tunnel]] core promise / [[Threat Model]]\n- 🤝 **class:** [[Bug - STOP-START Live Probe]] (both \"make it fail loudly first\")\n- 🧭 **cluster:** [[Bugs - WARP Liveness & Host Leaks]]\n","nullexit-knowledge-graph/Bugs/Bug - Post-Wake Feedback Loop.md":"---\ntags:\n  - type/bug\n  - status/resolved\n  - severity/low\n---\n\n# 🐛 Bug — Post-Wake Self-Feedback Loop\n\n**§15.12.21 (July 14, 2026).** After a container restart/wake, `recover.sh --post-wake` launched **~6 times in a row** (~one per 40s), each exiting `0` — recovery *worked* every time yet kept re-firing \"until it worked.\" Every launch was triggered by `NET: changedKey State:/Network/Global/IPv4`.\n\n## Root cause — a self-feedback loop (NOT PF)\n[[watcher.sh]] Listener 2 watches `State:/Network/Global/IPv4`. But `recover.sh --post-wake` re-asserts the exit node (`tailscale set --exit-node`), which **rewrites the host default route** — and the default route *is* `State:/Network/Global/IPv4`. So each run mutates the exact key the watcher triggers on. The self-triggered change landed ~15–45s later, well past the old 10s debounce (which only ever caught macOS's rapid duplicate notifications). The loop self-terminated only once `tailscale set` became a no-op.\n\n## The fix\n`run_recover()` now arms a **post-recovery settle cooldown** (`/tmp/nullexit-watcher.settle-until`, `NULLEXIT_POSTWAKE_SETTLE_SECONDS` default 45s) *after* each run, skipping launches while `now < settle-until`. A genuine first wake/roam is still handled immediately; only the change the run *caused* is absorbed. Watcher-side only; [[recover.sh]] unchanged.\n\n## Severity note\nLow — self-correcting, healthy every iteration, no leak/outage. Cost was wasted ~28s runs + log noise. Explicitly **not** a PF issue (the `No ALTQ support` warning is benign macOS noise).\n\n## Relationships\n- 🔧 **fixed in:** [[watcher.sh]] settle cooldown\n- 🤝 **loop family:** [[Bug - WARP Watcher Race]], [[Bugs - Routing Loops]] §15.2.9\n- 🔗 **concept:** [[Roaming & Recovery]]\n- 🧭 **cluster:** [[Bugs - Misc Resolved]]\n","nullexit-knowledge-graph/Bugs/Bug - SNAT Endpoint Poisoning.md":"---\ntags:\n  - type/bug\n  - status/resolved\n  - severity/critical\naliases:\n  - P2P Blackhole\n  - gvproxy SNAT\n---\n\n# 🐛 Bug — SNAT Endpoint Poisoning (P2P Blackhole)\n\n**§15.7.1 — the flagship incident.** A Tailscale phone on the *same Wi-Fi* as the gateway lost **100% of its internet**, yet the same phone on a PC hotspot worked flawlessly. Counterintuitive and mechanistically deep.\n\n## The mechanism\n1. Phone sends a UDP hole-punch to the Mac's `192.168.1.5:41641`\n2. [[routing-fix]] forces the reply out `eth0` (bypassing WARP), so it crosses the [[Colima VM]] bridge → `en0`\n3. macOS applies **SNAT and randomizes the source port** (`41641 → 58291`)\n4. Tailscale's `magicsock` sees an authenticated packet from `:58291`, assumes the Mac *roamed* there, and updates the phone's endpoint\n5. macOS has **no forward for `:58291`** → drops 100% of the phone's data → dead\n\n**Why the hotspot worked:** the PC's strict NAT dropped the mangled reply, so the phone never poisoned its endpoint and cleanly fell back to DERP.\n\n## The fix (3 phases)\n- **Phase 1:** move the container Tailscale port `41641 → 41642` (avoid host bind conflict)\n- **Phase 2:** [[routing-fix]] **DROPs** container→RFC1918 Tailscale UDP when `TAILSCALE_ALLOW_LAN_P2P=false` — kills the hole-punch *before* SNAT can mangle it → clean DERP fallback\n- **Phase 3:** auto-detection in [[watcher.sh]] (`detect_lan_p2p_mode`) writes `.lan_p2p_detected`\n\n## Why it matters to the graph\nThis single bug is the reason [[LAN P2P & DERP]] defaults to DROP — a permanent **speed-vs-safety tension**. The `.host_ips` RETURN carve-out later re-permitted the one safe case (host↔container).\n\n## 🔬 Known unknown\nThe `gvproxy` SNAT theory is mechanistically sound but **not yet confirmed** via `tcpdump` on `en0` during a handshake.\n\n## Relationships\n- 🔧 **fixed in:** [[routing-fix]], [[watcher.sh]], docker-compose (port 41642)\n- 🔗 **root cause:** [[Colima VM]] `gvproxy`\n- ⚔️ **drives policy:** [[LAN P2P & DERP]] default DROP\n- 🔬 **refined by:** [[Obs - Cross-AP P2P]]; same physics as [[Bug - FaceTime Double-Tunnel]]\n- 🧭 **cluster:** [[Bugs - Tailscale P2P & SNAT]]\n","nullexit-knowledge-graph/Bugs/Bug - STOP-START Live Probe.md":"---\ntags:\n  - type/bug\n  - status/resolved\n  - severity/high\n---\n\n# 🐛 Bug — Toggle Decided STOP/START From a Live Probe\n\n**§15.12.19.** Running `./toggle.sh` while [[Colima VM|Colima]]/Docker was **down** hung ~15s then aborted during START *without ever booting Colima*. Happened silently **57×** historically.\n\n## Root cause (a design smell that *was* the bug)\n[[toggle.sh]] decided STOP-vs-START via `is_gateway_active()`, which **live-probes** the system (`docker compose ps`). With Docker down, that call blocked the full 15s `run_with_timeout` and returned non-zero → under `set -e` + `ERR` trap, the script aborted *at the `if` boundary, before the START body ran* — the very branch whose job is to start Docker.\n\nThe deeper flaw: **a *disable* should not depend on whether the gateway is currently healthy** — it should act on whether the gateway is *supposed* to be running. Inverted dependency + false symmetry (enable and disable ran identical expensive probes).\n\n## The fix\n`gateway_should_be_running()` in [[common.sh]] reads persisted **intent** from the [[Gateway Active Marker]] (captured into `GATEWAY_MARKER_AT_STARTUP` before the defensive stale-marker clear). It only consults `is_gateway_active` when the marker is absent **and** the Docker socket is actually reachable — a dead socket short-circuits to \"stopped\", so `set -e` can never trip. STOP's `docker compose down` is now `|| true`-guarded.\n\n## Methodology lesson\nThe team first fixed the **observability gap** (EXEC/EXIT breadcrumbs + `DEBUG_TRACE`) to make the invisible abort *loud*, then reproduced it. \"A mechanism that fails silently is worse than one that fails loudly.\"\n\n## ⚠️ Follow-up it spawned\nThe first fix wrote the capture as `if…else…fi` and hit → [[Bug - bash 3.2 Heisenbug]].\n\n## Relationships\n- 🔧 **fixed by:** [[Gateway Active Marker]] / `gateway_should_be_running` in [[common.sh]]\n- ⚠️ **spawned:** [[Bug - bash 3.2 Heisenbug]]\n- 💡 **design principle:** persisted intent > live probe\n- 🧭 **cluster:** [[Bugs - Misc Resolved]]\n","nullexit-knowledge-graph/Bugs/Bug - Shadowed DoT-QUIC REJECT.md":"---\ntags:\n  - type/bug\n  - status/latent\n  - severity/medium\naliases:\n  - DoT bypass\n  - Shadowed REJECT\n---\n\n# 🐛 Bug — Shadowed DoT/QUIC REJECT Rules (LATENT, UNFIXED)\n\n**§15.12.22 latent finding.** ⚠️ **This is a real, currently-open hole** — the only actively-tracked unfixed security bug in the graph.\n\n## The defect\nThe `FORWARD` chain's exit-path rule `-i tailscale0 -o tun0 -j ACCEPT` **shadows** the later `-i tailscale0 -p udp --dport 443` (QUIC) and `--dport 853` (DoT) REJECT rules. iptables is first-match-wins, so the REJECTs are never reached — verified **0 packets** on each.\n\n## Impact\nThe intended QUIC-block and force-through-[[AdGuard DNS Sinkhole|AdGuard]] (block DoT) on the exit path are **not enforced**. A mesh client can use **DoT (port 853) to bypass AdGuard filtering entirely** — undermining [[MagicDNS Routing]] and the whole DNS-sinkhole layer.\n\n## The fix (planned)\nInsert the port-REJECT rules **before** the `tailscale0 → tun0` ACCEPT (or scope them `-o tun0`). Tracked as [[Future - Fix Shadowed REJECTs]].\n\n## Why it matters to the tension map\nThis bug **threatens a feature that appears to work today** — AdGuard filtering looks effective, but a determined client evades it. It's the archetype of \"a working feature quietly invalidated.\" See [[MOC - Tensions & Invalidations]].\n\n## Relationships\n- ⚠️ **threatens:** [[AdGuard DNS Sinkhole]], [[MagicDNS Routing]]\n- 🔧 **fixed by (planned):** [[Future - Fix Shadowed REJECTs]]\n- 🔗 **lives in:** [[routing-fix]] / [[post-rules.txt]] FORWARD chain\n- 🔬 **found during:** [[Bug - FaceTime Double-Tunnel]] audit\n- 🧭 **cluster:** [[Bugs - Misc Resolved]]\n","nullexit-knowledge-graph/Bugs/Bug - WARP Watcher Race.md":"---\ntags:\n  - type/bug\n  - status/resolved\n  - severity/high\n---\n\n# 🐛 Bug — WARP Watcher Race vs Post-Wake\n\n**§15.2.7.** After switching Wi-Fi, the host IP appeared as the raw ISP IP (`132.x`) on *every* roam. Post-wake recovery logged success — then a nuclear shutdown fired immediately after and killed everything.\n\n## The race\n1. Wi-Fi roam → [[watcher.sh]] fires `recover.sh --post-wake`\n2. Post-wake finds warp dead → `docker compose up -d --force-recreate` (~35s)\n3. **Meanwhile**, the [[WARP Watcher]] (child of [[toggle.sh]]) polls warp every 5s during failures\n4. During the 35s recreate it reads `warp=off` → 6 consecutive → **WARP SHUTDOWN fires nuclear [[recover.sh]]**\n5. Nuclear teardown kills the gateway that post-wake was in the middle of rebuilding → IP exposed\n\n## The fix\nA **WARP Watcher inhibit marker** (`/tmp/nullexit-warp-inhibit.marker`): `recover.sh --post-wake` writes it *before* any container op; the watcher resets its counter and skips polling while it exists; `recover.sh` removes it at the end (via `trap ... EXIT`). The watcher never counts failures during the intentional container-down window.\n\n## Why it belongs in the tension map\nTwo independent recovery daemons ([[WARP Watcher]] + [[watcher.sh]]) can fight each other — this plus the shared toggle-lock ([[Bugs - Routing Loops|§15.2.8]]) and the marker-leak loop (§15.2.9) form a coordination trilogy.\n\n## Relationships\n- 🔧 **fixed via:** inhibit marker in [[recover.sh]] + [[WARP Watcher]]\n- ⚔️ **daemon collision:** [[WARP Watcher]] vs [[watcher.sh]]\n- 🤝 **loop family:** [[Bug - Post-Wake Feedback Loop]]\n- 🧭 **cluster:** [[Bugs - Routing Loops]]\n","nullexit-knowledge-graph/Bugs/Bug - bash 3.2 Heisenbug.md":"---\ntags:\n  - type/bug\n  - status/resolved\n  - severity/high\naliases:\n  - set -e landmine\n  - PS4 heisenbug\n---\n\n# 🐛 Bug — macOS bash 3.2 + `set -e` Heisenbug\n\n**§15.11.8.** The nastiest class of bug in the codebase. All lifecycle scripts run under macOS `/bin/bash` **3.2.57 (2007)** (Apple won't ship bash 4+ due to GPLv3) with `set -e` + ERR/INT/TERM/HUP traps.\n\n## The flagship instance\nA plain `if [ -f \"$X\" ]; then A; else B; fi` **aborted the script at init** whenever the file was absent — but only with `DEBUG_TRACE=true`. Confirmed root cause: `set -x` + a `PS4` containing a command substitution (`$(date)`). The subshell runs on *every* traced command; while tracing the `if`-condition it perturbs `$?`, so the false condition's status leaks past the normal `if`-exemption and trips the `ERR` trap. **Enabling tracing is what causes the abort** — a true heisenbug, invisible to `bash -n`, `shellcheck`, and isolated `bash -c` repros.\n\n**Fix:** `PS4` now uses subshell-free `${SECONDS}` instead of `$(date)`. **Safe pattern:** default-assign + an `if` with **no `else`**.\n\n## The other landmines documented\n- **B.** `BASH_XTRACEFD` / `exec {var}>>` are 4.1+ → hard-fail on 3.2 (gate on `BASH_VERSINFO`)\n- **C.** `$LINENO` in an ERR trap misattributes the failing line to the closing `fi`\n- **D.** `set -e` is suppressed inside `if`/`&&`/`||` conditions but fatal as a bare statement\n- **E.** process substitution (`>(…)`) can truncate last-gasp log lines\n- **F.** GNU-vs-BSD userland divergence (`sed -i ''`, `jot` vs `shuf`, no `timeout`)\n\n## Why it's a permanent risk\nEvery new conditional under `set -e` is a candidate. `bash -n`/`shellcheck` can't catch runtime trap interactions → **a live run is mandatory** for lifecycle-script changes.\n\n## Relationships\n- ⚠️ **haunts:** [[toggle.sh]], [[recover.sh]], [[common.sh]]\n- 🤝 **spawned by:** [[Bug - STOP-START Live Probe]] follow-up\n- 💡 **drove:** the `DEBUG_TRACE` + breadcrumb observability tooling\n- 🧭 **cluster:** [[Bugs - macOS Platform Quirks]]\n","nullexit-knowledge-graph/Bugs/Bugs - DNS Interception.md":"---\ntags:\n  - type/bug-cluster\n  - status/resolved\n---\n\n# Bugs — DNS Interception & Proxy (§15.4)\n\n## 15.4.1 — DNS proxy TCP wire format ✅\n`socat` forwards raw bytes (no 2-byte length prefix); `dnsmasq` won't fall back to TCP. Both broke over [[Colima VM]]'s TCP-only tunnel. **Fix:** the hand-rolled [[dns-proxy.py]] that handles the DNS-over-TCP framing.\n\n## 15.4.2 — MagicDNS bypasses PREROUTING ✅\nClients querying `100.100.100.100` → `tailscaled` inside the container resolves it locally, and the new request bypasses PREROUTING → skips [[adguardhome|AdGuard]]. **Fix:** force `tailscaled` upstream to AdGuard (Custom nameserver) + REJECT DoT:853. See [[MagicDNS Routing]]. ⚠️ The DoT REJECT is now **shadowed** → [[Bug - Shadowed DoT-QUIC REJECT]].\n\n## 15.4.3 — macOS DNS wipeout on roam ✅\nmacOS wipes custom DNS on BSSID change → host DNS dumped on public internet → total failure. **Fix:** the [[DNS Watcher]].\n\n## 15.4.4 — `docker compose exec` `\\r` injection ✅\nAll exec output piped through `tr -d '\\r'`.\n\n## 15.4.5 — Stderr swallowed ✅\nCritical commands now show errors inline.\n\n## Relationships\n- 🔧 **produced:** [[dns-proxy.py]], [[DNS Watcher]]\n- 🎯 **concept:** [[MagicDNS Routing]], [[AdGuard DNS Sinkhole]]\n- ⚠️ **reopened gap:** [[Bug - Shadowed DoT-QUIC REJECT]]\n- 🧭 **index:** [[MOC - Bugs]]\n","nullexit-knowledge-graph/Bugs/Bugs - Docker & Colima Lifecycle.md":"---\ntags:\n  - type/bug-cluster\n  - status/resolved\n---\n\n# Bugs — Docker / Colima Lifecycle (§15.8)\n\nQuirks of running Docker inside the [[Colima VM]].\n\n## 15.8.1 — VM swap thrashing ✅\n512MB RAM → slow cache creep → swap I/O thrashing → seconds-long DNS. **Fix:** bump to 600MB RAM / 400MB swap.\n\n## 15.8.2 — Missing iptables ✅ (`apk add iptables iproute2`)\n## 15.8.3 — DOCKER_GW parsing ✅ (`head -1`)\n\n## 15.8.4 — Stale docker.sock after hard reboot ✅\n\"Colima already running\" + \"cannot connect to Docker daemon\". **Fix:** Step 4b tests `docker ps`, auto-`colima restart` on a stale socket.\n\n## 15.8.5 — 24s WARP startup delay 🔴 (expected)\nCloudflare rate-limits rapid same-key reconnects (WireGuard has no disconnect packet). Unavoidable; misattributed to the rule-compiler.\n\n## 15.8.6 — Go ports + teardown hang ✅\nPorted logger/rule-compiler to Go multi-stage builds; `stop_grace_period: 1s` killed the 30s [[routing-fix]] teardown hang.\n\n## 15.8.7 — Colima `start` post-provision hang ✅\n`colima start` hangs ~2 min *after* the VM is usable. **Fix:** `colima_start_until_ready()` polls `docker info` and reaps the hung starter (~120s → ~12s).\n\n## 15.8.8 — Rule-compiler off the critical path ✅\n[[rule-compiler]] re-deduped 340k rules every toggle (~28s). **Fix:** hash-gated on-demand run; `compose up` 45s → 9s.\n\n## Relationships\n- 🔗 **concept:** [[Colima VM]]\n- 🔧 **produced:** `colima_start_until_ready` in [[common.sh]], hash-gated [[rule-compiler]]\n- 🧭 **index:** [[MOC - Bugs]]\n","nullexit-knowledge-graph/Bugs/Bugs - Exit-Node Return Path.md":"---\ntags:\n  - type/bug-cluster\n  - status/resolved\n---\n\n# Bugs — Exit-Node Return Path & SOCKS5 (§15.1)\n\nThe founding incident. This cluster is *why* [[SOCKS5 Fallback]] exists.\n\n## 15.1.1 — The `rx 0` blackhole ✅\n**Symptom:** `tx 936 rx 0` — the exit node transmitted but never received return traffic for days.\n**Root cause:** `FIREWALL_OUTBOUND_SUBNETS=100.64.0.0/10` in docker-compose made Gluetun add `ip rule ... lookup 199` (pref 99) that forced Tailscale CGNAT **return** packets out the Docker bridge (`eth0`) to the host, which had no idea what to do with them.\n**Fix:** Removed `FIREWALL_OUTBOUND_SUBNETS`; [[routing-fix]] now injects `lookup 52` so returns flow back into `tailscale0`. The SOCKS5 proxy built during the panic was **repurposed** into [[SOCKS5 Fallback]] (it dodges the FORWARD chain by originating from the container's own IP).\n\n## 15.1.2 — Container default route bypasses WARP ✅\nSOCKS traffic from the container IP hit rule 100 → table 200 defaulted via `eth0`, not `tun0`. Fix: [[routing-fix]] sets table 200 default → `tun0` + a WARP-endpoint exception route.\n\n## 15.1.3 — Hardcoded Docker subnet ✅\n`172.18.0.0/16` was hardcoded. Fix: dynamic detection via `ip route show dev eth0`.\n\n## Relationships\n- ⬆️ **created:** [[SOCKS5 Fallback]]\n- 🔧 **fixed in:** [[routing-fix]] (table 52, table 200)\n- 🔗 **subsystem:** [[Double-Tunnel]] return path\n- 🧭 **cluster index:** [[MOC - Bugs]]\n","nullexit-knowledge-graph/Bugs/Bugs - MTU & Throughput.md":"---\ntags:\n  - type/bug-cluster\n  - status/mostly-resolved\n---\n\n# Bugs — MTU, Fragmentation & Throughput (§15.3)\n\nThe double-tunnel overhead fight. See [[MSS Clamping & MTU]] for the concept.\n\n## 15.3.1 — Double-VPN UDP crash 🟡 (partial)\nAggressive UDP tests (`networkQuality`/QUIC) push packets past 1500B → the Apple `vz` framework silently drops fragmented UDP → tunnel crashes (6000ms bufferbloat). **Fix (partial):** TCP MSS clamp via [[pf.conf]] + `TS_DEBUG_MTU=1200`. **Unresolved:** the UDP crash under extreme load — SQM (`fq_codel`) autorate was rejected because its 100ms polling kills laptop battery.\n\n## 15.3.2 — MSS clamp too large ✅\nDefault 1180 still fragmented on strict endpoints → lowered to **1120**.\n\n## 15.3.3 — QUIC edge packet loss ✅ (trade-off)\nQUIC blasts 1280B UDP that fragments on the 1200-MTU inner interface; losing one fragment kills the whole frame on weak Wi-Fi. **Fix:** block UDP:443 → apps fall back to HTTP/2 (TCP, which is MSS-clamped). ⚔️ Cost: WebRTC video may fall to TCP TURN (relevant to [[Bug - FaceTime Double-Tunnel]]).\n\n## 15.3.4 — Cellular/DERP 1280B PMTUD blackhole ✅\nEmpirically: 1280B total succeeds, 1281B silently vanishes. Validates the MSS clamp necessity.\n\n## 15.3.5 — Low throughput (DERP + fragmentation) ✅\nHost↔container P2P was collateral of the RFC1918 DROP → `.host_ips` RETURN carve-out restores direct bridge P2P; host `utun` MTU → 1200.\n\n## Relationships\n- 🔗 **concept:** [[MSS Clamping & MTU]]\n- ⚔️ **QUIC block hurts:** [[Bug - FaceTime Double-Tunnel]] / real-time media\n- 🔧 **implemented in:** [[pf.conf]], [[post-rules.txt]], [[toggle.sh]]\n- 🧭 **index:** [[MOC - Bugs]]\n","nullexit-knowledge-graph/Bugs/Bugs - Misc Resolved.md":"---\ntags:\n  - type/bug-cluster\n  - status/resolved\n---\n\n# Bugs — Misc Resolved (§15.12)\n\nThe long tail. Selected high-signal entries (see devref §15.12 for all).\n\n- **15.12.1** Gluetun resets nftables FORWARD → [[routing-fix]] re-adds every 30s to both backends\n- **15.12.2** Native SSH/SFTP zero-attack-surface: `tailscale up --ssh=true` lets you disable macOS Remote Login\n- **15.12.6** IPv6 exit-node leak → `ip6tables DROP FORWARD` in [[post-rules.txt]]\n- **15.12.11** `TS_AUTH_ONCE` cloud footgun → recommend ephemeral keys\n- **15.12.12** Hardcoded AdGuard creds `admin/nullexit` — safe behind NAT, a cloud risk\n- **15.12.13** 30s polling vs netlink — chose polling for reliability (1–4s stutter window)\n- **15.12.14** Cache poisoning / URL-rot → [[rule-compiler]] aborts overwrite if <10 domains\n- **15.12.15** Gluetun parser crash on bash var in [[post-rules.txt]] → `sed`-inject the MSS integer from [[toggle.sh]]\n- **15.12.16** AdGuard filter redundancy → dedup vs native filters (~83k rules purged)\n- **15.12.17** Kernel IP blocklist pipeline → [[Kernel IP Blocklist]]\n- **15.12.18** Discarded docker-exec errors → stderr now → `output.log`\n- **15.12.19** STOP/START from live probe ✅ → [[Bug - STOP-START Live Probe]]\n- **15.12.20** Honey-port accumulation → reap-before-arm ([[Honey-Port Tripwire]])\n- **15.12.21** Post-wake feedback loop ✅ → [[Bug - Post-Wake Feedback Loop]]\n- **15.12.22** FaceTime over the double-tunnel ✅ diagnosed → [[Bug - FaceTime Double-Tunnel]] + the **latent** [[Bug - Shadowed DoT-QUIC REJECT]]\n\n## Relationships\n- ⭐ **promoted:** [[Bug - STOP-START Live Probe]], [[Bug - Post-Wake Feedback Loop]], [[Bug - FaceTime Double-Tunnel]], [[Bug - Shadowed DoT-QUIC REJECT]]\n- 🧭 **index:** [[MOC - Bugs]]\n","nullexit-knowledge-graph/Bugs/Bugs - Permissions & Crypto.md":"---\ntags:\n  - type/bug-cluster\n  - status/resolved\n---\n\n# Bugs — Permissions, Crypto & Security Hardening (§15.9)\n\n## 15.9.1 — Sudo credential caching removed ✅\n`sudo -v` + a keeper loop prompted even with NOPASSWD. **Fix:** all privileged calls use `sudo -n` against scoped `/etc/sudoers.d/nullexit`.\n\n## 15.9.2 — Background sudo failures ✅ (documented)\n`--post-wake` runs headless (no TTY) → must rely entirely on `sudo -n`; a mis-configured sudoers silently fails all routing.\n\n## 15.9.3 — Tailscale hijacking default route (PHYSICAL_GW bug) ✅\n`route get default` returned no `gateway:` field when Tailscale already owned the route → empty `PHYSICAL_GW` → route never restored. **Fix:** query the DHCP lease directly (`ipconfig getpacket en0`).\n\n## 15.9.4 — Core script consolidation ✅\n~200 duplicated lines → [[common.sh]]; `stop_*` daemons collapsed into `stop_pidfile_daemon()`; WARP IPs `.env`-driven.\n\n## 15.9.5 — Threat model: local proxy discovery 🔴 (structural)\nPort secrecy ([[Procedural Ports]]/[[Honey-Port Tripwire]]) can't stop a targeted local process; `chown`/`chmod` on `/tmp/nullexit-ports.env` has a TOCTOU race. Real fix: [[PF Kill-Switch|loopback host firewall]] + the \"rogue binary\" test.\n\n## 15.9.6 — Unlocking mode-locked files without chmod ✅ → [[unlock-files.sh]]\nAtomic rename swaps `000`/`0444` inodes for `0644` ones. The no-`chmod` policy.\n\n## Relationships\n- 🔧 **produced:** [[unlock-files.sh]], [[common.sh]], scoped sudoers\n- 🛡️ **concepts:** [[Crypto Integrity]], [[Python Runtime Airgap]], [[PF Kill-Switch]]\n- 🧭 **index:** [[MOC - Bugs]]\n","nullexit-knowledge-graph/Bugs/Bugs - Roaming & Sleep-Wake.md":"---\ntags:\n  - type/bug-cluster\n  - status/resolved\n---\n\n# Bugs — Roaming, Sleep/Wake & Auto-Recovery (§15.5)\n\nThe saga that produced [[watcher.sh]] and [[Roaming & Recovery]].\n\n## 15.5.1 — Gateway breakage on lid close / roam ✅ (best-effort on wake)\nNo daemon watched sleep/wake or network events. `caffeinate -i` blocks *idle* not *forced* (lid) sleep. **Fix:** the launchd [[watcher.sh]] + `recover.sh --post-wake` + [[Gateway Active Marker]]. Honest caveat: the **roam path is reliable**; the **lid-wake path is best-effort** (launchd suspends the agent; live log events during suspension are dropped).\n\n## 15.5.2 — Watcher event mismatch + background sudo crash + loop ✅\nPattern matched `n.state` but macOS emits `changedKey`; `sudo -v` crashed headless; the run's own route changes re-triggered it. **Fix:** match `changedKey`/`State:/Network/Global/IPv*`, `--auto` TTY-skip, write the *completion* timestamp to the debounce file.\n\n## 15.5.3 — Pre-flight Tailscale race ✅\n`tailscale ping` ran before the netmap propagated. Fix: 5-attempt retry.\n\n## 15.5.4 — STUN-block cold-boot false negative ✅\n[[warp (Gluetun)|warp]]'s firewall blocks the container's STUN → 30–45s DERP-assisted handshake. Fix: raised pre-flight retries 15 → 45.\n\n## 15.5.5 — Docker build DNS race on `--restart` ✅\nWi-Fi power-cycle left `en0` mid-DHCP when Docker tried to pull. Fix: `wait_for_dhcp_settle` in [[common.sh]].\n\n## 15.5.6 — Watcher suppressed exit code ✅ (`|| true` removed)\n## 15.5.7 — Network readiness race ✅ (`route get default | grep gateway`)\n\n## Relationships\n- 🔧 **produced:** [[watcher.sh]], `wait_for_dhcp_settle`\n- ⚠️ **later loops:** [[Bug - Post-Wake Feedback Loop]], [[Bug - WARP Watcher Race]]\n- 🔗 **concept:** [[Roaming & Recovery]]\n- 🧭 **index:** [[MOC - Bugs]]\n","nullexit-knowledge-graph/Bugs/Bugs - Routing Loops.md":"---\ntags:\n  - type/bug-cluster\n  - status/resolved\n---\n\n# Bugs — Routing Loops & Subnet Collisions (§15.2)\n\nInfinite loops and subnet takeovers that break host egress entirely.\n\n## 15.2.1 — Hotspot Paradox 🔴 (physical, not software)\nIf a hotspot device feeding the gateway *also* uses the gateway as its exit node, packets bounce forever. Only fix: disable \"Use Exit Node\" on the upstream, or inject a static WARP-endpoint bypass route on the upstream OS.\n\n## 15.2.2 — Host-VM tunnel loop & subnet takeover ✅\n(1) Host default route → `utun*` sent WARP-endpoint packets back into the tunnel → loop. Fix: static bypass routes via the resolved physical gateway IP + `setup_exit_node_routing`. (2) Docker Compose reclaimed freed `172.17/16` → host couldn't reach containers. Fix: lock `10.200.1.0/24`.\n\n## 15.2.3 — Docker bridge 172.17/16 collision ✅ → [[Bug - Docker Bridge Collision]]\n\n## 15.2.4 — \"Network Unreachable\" host leak ✅\n`grep -B4 \"inet 100.\"` grabbed the wrong `utun`; `sudo route add` silently failed. Fix: strict AWK parser. Also: gluetun Alpine dropped `curl` → health check used `wget`.\n\n## 15.2.5 — DERP relay deadlock ✅\nForcing `0.0.0.0/1` through `utun*` sent the Mac's own DERP probes into the tunnel → daemon dropped them. Fix: live-fetch ~80 DERP IPs and bypass each.\n\n## 15.2.6 — Hardcoded WARP endpoint in compose ✅\nFix: `${WARP_ENDPOINT_1:-162.159.192.1}` so host + container agree.\n\n## 15.2.7 — WARP Watcher race ✅ → [[Bug - WARP Watcher Race]]\n## 15.2.8 — Nuclear/post-wake concurrency ✅ (shared toggle lock)\n## 15.2.9 — Infinite auto-recovery loop ✅\nNuclear [[recover.sh]] left the [[Gateway Active Marker]] on disk → [[watcher.sh]] resurrected the gateway. Fix: delete the marker in nuclear mode.\n\n## Relationships\n- 🔗 **fixed across:** [[toggle.sh]], [[recover.sh]], [[routing-fix]], [[common.sh]]\n- ⚠️ **loop family:** [[Bug - Post-Wake Feedback Loop]], [[Bug - WARP Watcher Race]]\n- 🧭 **index:** [[MOC - Bugs]]\n","nullexit-knowledge-graph/Bugs/Bugs - Tailscale P2P & SNAT.md":"---\ntags:\n  - type/bug-cluster\n  - status/resolved\n---\n\n# Bugs — Tailscale P2P, SNAT & Control Plane (§15.7)\n\n## 15.7.1 — SNAT endpoint poisoning ✅ → [[Bug - SNAT Endpoint Poisoning]]\nThe flagship P2P blackhole on same-Wi-Fi. Drives the whole [[LAN P2P & DERP]] DROP policy.\n\n## 15.7.2 — pf LAN rules default to TCP-only ✅\nAn implicit `pass` compiles with `keep state`/`flags S/SA` → drops UDP → Tailscale can't hole-punch → 500ms DERP latency. **Fix:** split into explicit `proto tcp`/`udp`/`icmp` in [[pf.conf]].\n\n## 15.7.3 — PF kill-switch bricks SOCKS5 fallback ✅\nThe [[PF Kill-Switch]] blocks all non-`utun*` egress, but [[SOCKS5 Fallback]] keeps `tailscaled` on `en0` → host bricked, control plane unreachable. **Fix:** kill-switch is now **exit-node-only**.\n\n## 15.7.4 — Host logouts from `--reset` ✅\nHost-side `tailscale up --reset` (no `TS_AUTHKEY`) logged the user out. **Fix:** removed `--reset` from all host-side calls.\n\n## 15.7.5 — Missing-flags abort ✅\nAfter removing `--reset`, `tailscale up` with a flag subset aborted (strict CLI check). **Fix:** two-step `tailscale up` (no flags) → `tailscale set --exit-node=...`.\n\n## Relationships\n- 🔗 **concept:** [[LAN P2P & DERP]], [[PF Kill-Switch]]\n- ⚔️ **tension:** kill-switch vs [[SOCKS5 Fallback]]\n- ⭐ **promoted:** [[Bug - SNAT Endpoint Poisoning]]\n- 🧭 **index:** [[MOC - Bugs]]\n","nullexit-knowledge-graph/Bugs/Bugs - Tor Container.md":"---\ntags:\n  - type/bug-cluster\n  - status/resolved\n---\n\n# Bugs — Tor Container (§15.10)\n\n## 15.10.1 — obfs4proxy missing + fragile bridge validation ✅\n`bullseye-slim` dropped `obfs4proxy` → crash loop with `TOR_USE_BRIDGES=true`. And the `[ -s ]` file check let comments/blank lines slip into `torrc` → instant exit. **Fix:** base image → `bookworm-slim`; strict `grep -vE '^\\s*(#|$)'` validation (falls back to public relays instead of crashing); pinned `nullexit-tor:v1.0.0`.\n\n## 15.10.2 — ControlPort dynamic password auth ✅\nDocker/Colima needs the ControlPort on `0.0.0.0`, but Tor **self-closes** an unauthenticated non-local ControlPort. **Fix:** `entrypoint.sh` reads `TOR_PASSWORD` (sourced from `ADGUARD_PASSWORD`) and generates `HashedControlPassword` via `tor --hash-password`; `check_circuits.py` authenticates. This unlocked live circuit inspection in the [[Sweep Protocol]].\n\n## Relationships\n- 🔗 **container:** [[tor container]]\n- ⬆️ **enabled:** [[Sweep Protocol]] circuit lookup\n- 🌱 **feeds:** [[Future - Host-Only Tor Mode]]\n- 🧭 **index:** [[MOC - Bugs]]\n","nullexit-knowledge-graph/Bugs/Bugs - WARP Liveness & Host Leaks.md":"---\ntags:\n  - type/bug-cluster\n  - status/resolved\n---\n\n# Bugs — WARP Tunnel Liveness & Host Leaks (§15.6)\n\nThe class that threatens nullexit's **core promise** (\"your IP is always Cloudflare\").\n\n> **Mostly closed by [[sweep.sh]]** (2026-07-15): check 2 (double-tunnel / leak) compares the container's WARP egress IP against the host's and requires `warp=on` on both, so every silent-leak mechanism below now surfaces as a FAIL in a routine sweep instead of going unnoticed. The sweep is detection-only (read-only by design) — [[diagnose-host-leak.sh]] `--fix` remains the remediation step.\n\n## 15.6.1 — Host-side leak while remote clients route fine ✅\nThree mechanisms produce the *same* symptom (host on raw ISP IP, phones fine):\n- **A — SOCKS5 fallback:** browsers ignore the macOS SOCKS proxy → HTTP exits direct ([[SOCKS5 Fallback]])\n- **B — IPv6 leak:** dual-stack AP; IPv4-only tunnel can't catch AAAA\n- **C — route freeze / `--accept-routes` reset:** default route stays on Wi-Fi\n**Fix:** [[diagnose-host-leak.sh]] classifies A/B/C/OK and prints the exact remediation (`--fix`, `--watch`). Uses `cdn-cgi/trace` (Cloudflare's own endpoint) as the truth, since `whatismyip.com` mislabels campus IPs.\n\n## 15.6.2 — In-flight WARP Watcher + statistical auto-shutdown ✅\n→ the [[WARP Watcher]] concept. Never fails silently; nuclear-recovers at N consecutive `warp=off`.\n\n## 15.6.3 — Overnight silent IP leak ✅ → [[Bug - Overnight Silent IP Leak]]\nMissing WireGuard keepalive let NAT expire the tunnel while the container stayed \"Up\". **Fix:** `WIREGUARD_PERSISTENT_KEEPALIVE_INTERVAL=25s` + a fail-closed blackhole kill-switch in [[routing-fix]] + a desktop-notification listener in [[watcher.sh]].\n\n> Note: the old continuous `host-leak-probe.sh` was **removed** (2026-07-15); its role is now covered by [[PF Kill-Switch]] + [[WARP Watcher]], with [[diagnose-host-leak.sh]] for on-demand audits.\n\n## Relationships\n- 🛡️ **guards:** [[Double-Tunnel]] core promise / [[Threat Model]]\n- 🔧 **tools:** [[diagnose-host-leak.sh]], [[WARP Watcher]]\n- 🔬 **caught by:** [[sweep.sh]] (check 2 — double-tunnel / leak)\n- ⚠️ **leak source:** [[SOCKS5 Fallback]] (Scenario A)\n- 🧭 **index:** [[MOC - Bugs]]\n","nullexit-knowledge-graph/Bugs/Bugs - macOS Platform Quirks.md":"---\ntags:\n  - type/bug-cluster\n  - status/resolved\n---\n\n# Bugs — macOS Platform Quirks (§15.11)\n\n## 15.11.1 — App Firewall silently blocks AirDrop/Continuity ✅\n`sharingd`/`rapportd` get added to the block list. Fix: `socketfilterfw --unblockapp`.\n\n## 15.11.2 / 15.11.5 — tailscaled daemon freeze on wake ✅\nHomebrew `tailscaled` hangs after sleep/wake. Fix: `run_with_timeout 5 tailscale status` detection → `brew services restart tailscale`. See [[reinstall-host-tailscale.sh]] for the nuclear option.\n\n## 15.11.3 — Sharing services freeze on network transitions ✅\nRoute/Wi-Fi cycling wedges `sharingd`/`rapportd`. Fix: `killall sharingd rapportd` at both START and STOP.\n\n## 15.11.4 — Chrome Remote Desktop fails with Tailscale on remote ✅\nCRD's WebRTC conflicts with Tailscale interfaces on the *remote* machine. Fix: use Tailscale-native RDP/RustDesk.\n\n## 15.11.6 — Apple removed the `airport` binary (14.4) ✅\n`detect_lan_p2p_mode()` silently fell back to \"no-wifi\". Fix: `system_profiler SPAirPortDataType`. ⚠️ Longevity risk → [[Obs - system_profiler Longevity]].\n\n## 15.11.7 — Changing macOS hostname ✅ (info: MagicDNS name changes, IP stays)\n\n## 15.11.8 — bash 3.2 + set -e landmines ✅ → [[Bug - bash 3.2 Heisenbug]]\nThe definitive field notes: the `set -x`+`PS4` heisenbug, `BASH_XTRACEFD` 4.1+ hard-fail, `$LINENO` misattribution, `set -e` suppression rules, process-substitution lifecycle, GNU-vs-BSD divergence.\n\n## Relationships\n- ⭐ **promoted:** [[Bug - bash 3.2 Heisenbug]]\n- ⚠️ **longevity risk:** [[Obs - system_profiler Longevity]] → [[watcher.sh]]\n- 🩹 **crisis tool:** [[reinstall-host-tailscale.sh]]\n- 🧭 **index:** [[MOC - Bugs]]\n","nullexit-knowledge-graph/Components/Sweep Protocol.md":"---\ntags:\n  - type/component\n  - type/protocol\n  - status/active\n---\n\n# Sweep Protocol (`/sweep`)\n\nA full end-to-end **connectivity, health, security, and performance audit** of a live gateway. Read-only. Two tiers: the `/sweep` **agent verb** (below — adds Tor circuits, DNS-leak and benchmark auditing) and the automated **[[sweep.sh]]** script (6 infrastructure checks, timestamped report, exit code).\n\n## The agent-verb audit steps\n1. **WARP validation** — `cdn-cgi/trace` must say `warp=on` ([[warp (Gluetun)]])\n2. **Tor proxy & control** — SOCKS5 via `check.torproject.org`, ControlPort `PROTOCOLINFO`, and **circuit lookup** (Guard/Middle/Exit IPs + countries via [[tor container|Tor GeoIP]]); `.onion` resolves into `198.18.0.0/15` ([[Transparent Onion Routing]])\n3. **DNS leak** — `edns.ip-api.com` resolver must be Cloudflare/WARP, not raw ISP ([[MagicDNS Routing]])\n4. **Performance** — `benchmarks/test_load.py` load speed + block ratio ([[AdGuard DNS Sinkhole]], [[MSS Clamping & MTU]])\n5. **Mesh** — ping the gateway, then `tailscale ping` (TSMP — survives ICMP-dropping phones) every online peer ([[LAN P2P & DERP]]); automated as [[sweep.sh]] check 6/6\n6. **Log audit** — `grep -iE 'error|fail|warn' output.log`\n\n## Relationships\n- 🤖 **automated core:** [[sweep.sh]] — containers / leak / P2P / AdGuard / PF / tailnet as one PASS-WARN-FAIL verdict\n- 🔬 **audits:** [[warp (Gluetun)]], [[tor container]], [[adguardhome]], [[LAN P2P & DERP]]\n- 🔗 **reads:** `/tmp/nullexit-ports.env` ([[Procedural Ports]])\n- 🗣️ **agent verb:** `/sweep`\n- 🧰 **helper:** `scripts/check_circuits.py` (ControlPort auth via [[Bugs - Tor Container|dynamic password]])\n","nullexit-knowledge-graph/Components/common.sh.md":"---\ntags:\n  - type/component\n  - status/active\n---\n\n# common.sh\n\n**Shared script primitives** (~1051 lines), sourced by every orchestrator across macOS and Linux. Product of the July-2026 refactor that eliminated ~200 lines of duplication between [[toggle.sh]] and [[recover.sh]] ([[Bugs - Permissions & Crypto|§15.9.4]]).\n\n## What it centralizes\n- **Formatters:** `step`/`ok`/`warn`/`fail`/`die` (timestamped)\n- **Timeout:** `run_with_timeout()` — pure-bash watchdog (macOS has no GNU `timeout`)\n- **Daemon lifecycle:** `stop_pidfile_daemon()`, `restart_tailscaled_daemon()`\n- **Networking:** `get_active_service()`, `add_warp_bypass_routes()`, `setup_exit_node_routing()`, `colima_start_until_ready()`\n- **DNS/proxy:** `force_dns_to_gateway()`, `enable/disable_socks_proxy()`, `reset_dns()`, `start/stop_local_dns_proxy()`\n- **Decision:** `gateway_should_be_running()` — reads the [[Gateway Active Marker]] (the fix for [[Bug - STOP-START Live Probe]])\n- **Config:** `get_warp_endpoint_1/2()` — centralizes the once-hardcoded `162.159.192.1/.193.1`\n\n## Why it exists\nDuplicated logic drifted when one script was patched but not the other. Centralizing also made the [[MSS Clamping & MTU|WARP endpoints]] and PID paths single-source.\n\n## Relationships\n- 🔗 **sourced by:** [[toggle.sh]], [[recover.sh]], [[setup.sh]], [[watcher.sh]], [[diagnose-host-leak.sh]], [[sweep.sh]]\n- 🔧 **home of:** `gateway_should_be_running()` → [[Gateway Active Marker]]\n- ⚠️ **subject to:** [[Bug - bash 3.2 Heisenbug]] (all its helpers run under `set -e`)\n","nullexit-knowledge-graph/Components/crypto.sh.md":"---\ntags:\n  - type/component\n  - status/active\n---\n\n# crypto.sh\n\n**Cryptographic integrity enforcement** (~68 lines). Uses `NULLEXIT_SEED` from `.env` to HMAC-SHA256 the core bash scripts and store signatures in `.signatures`. On every [[toggle.sh|toggle]]/[[recover.sh|recover]] start, `crypto.sh --verify` runs first; a mismatch **loudly fails to boot**. `--sign` re-signs after intentional edits.\n\n## Threat model scope (honest)\nThis is **tamper-evidence**, not a hard boundary. An attacker with repo write access can read the seed and re-sign. It's a *footgun-catcher* against accidental edits, logic bugs, and non-privileged malware — see [[Crypto Integrity]] and [[Threat Model]].\n\n## Signed set (12 files)\n`toggle.sh`, `recover.sh`, `scripts/common.sh`, `scripts/routing-fix.sh`, `scripts/diagnose-host-leak.sh`, `scripts/sweep.sh` (since 2026-07-15), `scripts/watcher.sh`, `scripts/pf.conf`, `post-rules.txt`, `docker-compose.yml`, and `black_list.txt` / `white_list.txt` — the lists because editing them is a security input that should trigger a re-sign *and* a [[rule-compiler]] recompile. (The old `toggle-linux.sh` entry is gone — Linux support was unified into the cross-platform root `toggle.sh`.)\n\n## Fail-closed detail\nUses `[ -f ]` not `[ -x ]` so it still runs even if git strips the `+x` bit ([[Bugs - Permissions & Crypto|§17 hardening]]).\n\n## Relationships\n- 🛡️ **secures:** [[toggle.sh]], [[recover.sh]], [[common.sh]], [[sweep.sh]], [[watcher.sh]], [[routing-fix]], [[diagnose-host-leak.sh]], [[pf.conf]], [[post-rules.txt]], the compose file + block/allow lists\n- 🔗 **seeded by:** [[setup.sh]] (`NULLEXIT_SEED`)\n- 💡 **concept:** [[Crypto Integrity]]\n- 🤝 **agent rule:** always `crypto.sh --sign` after editing signed scripts\n","nullexit-knowledge-graph/Components/device-scramble.sh.md":"---\ntags:\n  - type/component\n  - status/active\n---\n\n# device-scramble.sh\n\n**Random, anonymous device identity on Wi-Fi** (added 2026-07-18). Randomizes the identifiers a network or co-located observer uses to fingerprint your machine: the **hostname** (ComputerName / LocalHostName / HostName — i.e. the DHCP hostname *and* the mDNS `.local` name broadcast on the LAN) and, optionally, the **MAC address**.\n\n## Where it helps — and where it doesn't\n- ✅ **Open / no-auth Wi-Fi** (café, hotel, airport): MAC + hostname are the *only* handle on you, so randomizing them is real anonymity.\n- ✅ **Co-located sniffers** on any network: they see your MAC in the clear but not your RADIUS identity, so rotation stops device tracking by *them*.\n- ⛔ **The network you 802.1X-authenticate to**: your login ties every session to your account regardless of MAC — device-scramble does **not** hide you from the institution. (Same anchor as the [[Threat Model]] auth point.)\n\n## What it actually fixes (and doesn't)\nYour MAC is a **license plate on your device** — normally the *same* plate everywhere you go, so any network/tracker can recognise your device across cafés, airports, campuses, and over time. Scramble = a fresh random plate at each network.\n- ✅ Fixes **cross-network / cross-location / over-time device tracking** and gives real anonymity on **open Wi-Fi** (where the MAC is the only handle on you).\n- ✅ Fixes **tracking by other devices on the same network** (they see your MAC in the clear, not your login).\n- ⛔ Does **not** hide you from a network you **log into** (802.1X) — the login is the ID; the plate is irrelevant there.\n\n## Confirmed on Apple Silicon (neo, A18 Pro)\n`ifconfig ether` **works** — but only **disassociated first** (`networksetup -setairportpower off` → set MAC → on). Setting it while associated is a silent no-op (the bug in the first attempt). Tested live: random MAC accepted, got an IP; this enterprise network binds the session to the 802.1X user, not the MAC.\n\n## Safety\n`scramble` saves your real identity to `.device-identity.orig` (gitignored); `restore` puts it back. **`test-mac` is fail-safe** — always restores the original MAC, and it sets the [[WARP Watcher]] inhibit marker during the brief Wi-Fi blip so a healthy gateway isn't auto-shutdown. Privileged actions need `sudo`.\n\n## Across the mesh (phones)\nThe script is macOS-only (iOS/Android are sandboxed — no shell). But the phones **randomize natively**: iPhone → *Private Wi-Fi Address → Rotating*; Android → *Randomized MAC (per-connection)*. Do **not** randomize the Tailscale identity (node key / `100.x` IP / tailnet name) — that's a separate, load-bearing mesh layer.\n\n## Commands\n`status` (no sudo) · `--dry-run` (print the random values, no change) · `scramble [--mac]` · `restore` · `test-mac` (is this network MAC-gated? auto-reverts).\n\n## Relationships\n- 🕶️ **reduces:** device linkability — the metadata gap the [[Threat Model]] admits, complementing [[noise.sh|traffic-pattern cover]] (which hides *when*, this hides *which device*)\n- 🔗 **most useful on:** untrusted open networks; least useful behind 802.1X auth\n- 🧭 **index:** [[MOC - Components]]\n","nullexit-knowledge-graph/Components/diagnose-host-leak.sh.md":"---\ntags:\n  - type/component\n  - status/active\n---\n\n# diagnose-host-leak.sh\n\n**One-shot host-routing diagnostic** (~717 lines). Runs 8 checks and classifies the host into one of four known leak scenarios or OK, then prints the exact fix command.\n\n## The four scenarios (from [[Bugs - WARP Liveness & Host Leaks|§15.6.1]])\n- **A — SOCKS5 fallback active:** browsers ignore the macOS SOCKS proxy → HTTP exits direct while DNS is filtered\n- **B — IPv6 leak:** dual-stack AP; IPv4-only [[Double-Tunnel]] can't catch AAAA traffic\n- **C — route-table freeze / `--accept-routes` reset:** default route still on physical Wi-Fi\n\n## Modes\n- `--fix` — apply the matched remediation and re-verify egress\n- `--watch [N]` — baseline then continuously poll warp/IPv6/default-route, alerting on state change\n- Check 5 uses `route -n get 1.1.1.1` (more accurate than `netstat -rn | grep default` on macOS — the fix for the old false-positive)\n\n## Now the surviving host-leak tool\nThe old continuous `host-leak-probe.sh` was **removed**; its fail-closed role is covered by the [[PF Kill-Switch]] + [[WARP Watcher]]. This script is the only on-demand host-leak auditor left.\n\n## Relationships\n- 🔬 **diagnoses:** [[Bugs - WARP Liveness & Host Leaks]], [[Bug - Overnight Silent IP Leak]]\n- 🔗 **sources:** [[common.sh]]\n- 🤝 **complements:** [[WARP Watcher]] (container view) — this is the host-NIC view; [[sweep.sh]] (broad PASS/WARN/FAIL sweep) — this is the deep leak classifier\n- 🩹 **can trigger:** [[fix-docker-bridge-collision.sh]] class fixes\n","nullexit-knowledge-graph/Components/dns-proxy.py.md":"---\ntags:\n  - type/component\n  - status/active\n---\n\n# dns-proxy.py\n\nLocal **DNS proxy** (~91 lines, zero third-party deps). Reads a UDP:53 query from the host, prepends the 2-byte DNS-over-TCP length prefix, forwards over **TCP:5354** to [[adguardhome|AdGuard]], strips the prefix from the response, returns it over UDP.\n\n## Why it exists\n[[Colima VM|Colima]]'s SSH tunnel is **TCP-only** — UDP ports aren't reachable from the host. During [[SOCKS5 Fallback]] the host needs a way to reach AdGuard; `socat` and `dnsmasq` both failed on the wire format ([[Bugs - DNS Interception|§15.4.1]]), so a hand-rolled Python proxy was the answer.\n\n## Why Python (and why it stays Python)\nIntermittent, tiny UDP queries (a few bytes/min) → ~0.001W overhead. Rewriting in Go would force users to install a Go toolchain on the host for zero battery gain. Runs via `python3 -I` — see [[Python Runtime Airgap]]. (If ever scaled to serve thousands of clients, it must be rewritten in Go.)\n\n## Relationships\n- 🔗 **spawned by:** [[toggle.sh]] (`start_local_dns_proxy`)\n- ⬆️ **part of:** [[SOCKS5 Fallback]]\n- 🛡️ **hardened by:** [[Python Runtime Airgap]] (`-I`), scoped NOPASSWD sudoers\n- 🎯 **forwards to:** [[adguardhome]]\n","nullexit-knowledge-graph/Components/dns_anomaly_detector.py.md":"---\ntags:\n  - type/component\n  - status/active\n---\n\n# dns_anomaly_detector.py\n\n**Report-only DNS-tunneling / DGA / C2 detector** (v2, added 2026-07-17). The implementation of [[DNS Anomaly Detection]]. Pure Python 3 stdlib (no ML deps — [[Python Runtime Airgap]]), reads the [[adguardhome]] querylog, never mutates DNS.\n\n## Footprint (measured)\nSingle **streaming** pass over the querylog — never loads it into RAM. On a real 46 MB log: **~0.6 s, ~14 MB RSS**, model file **~6 KB**. Per-domain state is a few ints + a subdomain set capped at 64.\n\n## Commands\n- `learn` — trains from `adguard/work/data/querylog.json` → writes `.dns_baseline.json` (gitignored): a compact character-bigram table, a `median + 6·MAD` robust threshold, and a data-driven allowlist of the user's frequent domains.\n- `scan [--recent N] [--quiet]` — streams the log, aggregates per registered domain, flags via three tunneling-shaped signatures (any one): **encoded-payload volume** (hex/base32/base64 labels × unique-subdomain count), **TXT/NULL abuse**, or **improbable naming + volume**. Prints a confidence-ranked table. Report-only.\n- `selftest` — proves the detection logic works (flags hex/base32 payloads + improbable labels, clears known-good); exit **3** if broken.\n- `demo` — human-readable showcase.\n\n## Fails loud (never falsely \"clean\")\nA security detector that silently reports clean while blind is worse than none, so failure is unmissable: `scan` exits **0** ran-clean / **1** anomalies-found / **2** could-not-run (absent or corrupt model, unreadable or **empty** querylog — a 0-record scan is a FAILURE, not a pass). [[sweep.sh]] runs `selftest` first, does **not** swallow stderr, and renders a red ✗ (with the reason) on any non-clean exit; an untrained detector is announced, not silently skipped.\n\n## Why it beats the v1 it replaced\nSee [[DNS Anomaly Detection]] for the full rationale. Key fix: the **encoding-shape** signal is checked independently of the bigram t
