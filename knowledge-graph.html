hreshold, because encoded payloads score like CDN hashes under the model — training on a CDN-heavy log inflates the threshold above real tunneling, so shape + per-domain multiplicity carry the detection. Validated: **0 false positives** on real traffic (Netflix/Google/VS-Code CDNs cleared) while catching injected hex-TXT, base32-A, and base64-CNAME tunnels.\n\n## Relationships\n- 🛠️ **implements:** [[DNS Anomaly Detection]]\n- 📥 **reads:** [[adguardhome]] querylog (`QH`/`QT` fields)\n- 🎯 **complements:** [[AdGuard DNS Sinkhole]] (blocklist vs. this statistical unknown-tunnel finder), [[DNS Watcher]]\n- 🔗 **surfaced by:** [[sweep.sh]] (informational, read-only line when a baseline exists)\n- 🧭 **index:** [[MOC - Components]]\n","nullexit-knowledge-graph/Components/fix-docker-bridge-collision.sh.md":"---\ntags:\n  - type/component\n  - status/active\n---\n\n# fix-docker-bridge-collision.sh\n\n**One-shot fix** (~389 lines) for the Docker bridge subnet collision. If your Wi-Fi router hands you an IP in `172.17.0.0/16`, it collides violently with Docker's default bridge and kills your internet + local [[LAN P2P & DERP|Tailscale P2P]].\n\n## What it does\nAuto-detects the host Wi-Fi subnet, picks a non-colliding `docker.bip` (default `172.26.0.1/24`), idempotently edits `~/.colima/default/colima.yaml` with a timestamped backup, restarts [[Colima VM|Colima]], rebinds Wi-Fi DHCP, verifies the default route is no longer Docker's bridge, then re-runs [[toggle.sh]] + [[diagnose-host-leak.sh]]. Supports `--dry` and `--skip-toggle`.\n\n## Relationships\n- 🔧 **fixes:** [[Bug - Docker Bridge Collision]] (§15.2.3)\n- 🔗 **patches:** [[Colima VM]] config\n- 🤝 **re-runs:** [[toggle.sh]], [[diagnose-host-leak.sh]]\n- ⬆️ **restores:** [[LAN P2P & DERP]] direct paths\n","nullexit-knowledge-graph/Components/generate_tex.py.md":"---\ntags:\n  - type/component\n  - status/active\n---\n\n# generate_tex.py\n\nCompiles the **entire project** — source, configs, docs, and its own generator code — into a single unified LaTeX document (`nullexit_unified.tex` / `.pdf`). Run via the `/latex` agent verb: `python3 -I scripts/generate_tex.py` ([[Python Runtime Airgap|isolated mode]]).\n\n## The \"quine\" property\nThe output encapsulates its own source and the exact code needed to regenerate itself — a self-contained, long-term archival snapshot from which the whole system can be reconstructed.\n\n## Notes\n- The agent runs the generator but does **not** compile the PDF (the user handles that locally).\n- Runs on the stdlib only (no third-party TeX/Python deps).\n\n## Relationships\n- 🔗 **archives:** the whole repo (all [[MOC - Components]] + docs)\n- 🛡️ **runs under:** [[Python Runtime Airgap]] (`-I`)\n- 🗣️ **agent verb:** `/latex`\n","nullexit-knowledge-graph/Components/logger.md":"---\ntags:\n  - type/component\n  - status/active\n---\n\n# logger\n\nInternal **Go logger** (~100 lines), built via Docker multi-stage build, piped from [[routing-fix]] inside the [[warp (Gluetun)|warp]] container. Ported from Python for a smaller footprint and concurrency.\n\n## Role\nWrites structured, timestamped events (blocked connections, geo drops) to `blocked.log` on the host side. Part of the segmented logging architecture where host scripts write to `output.log` and container components emit structured logs ([[Bugs - Misc Resolved|§15.12.3]]).\n\n## Relationships\n- 🔗 **fed by:** [[routing-fix]]\n- ⬆️ **writes:** `blocked.log`\n- 🤝 **sibling of:** [[rule-compiler]] (both Go multi-stage ports)\n","nullexit-knowledge-graph/Components/noise.sh.md":"---\ntags:\n  - type/component\n  - status/active\n---\n\n# noise.sh\n\n**Opt-in, ACTIVE cover-traffic + verifiable-random noise tool** (added 2026-07-17). The deliberate inverse of [[sweep.sh]]: where sweep is read-only, `noise.sh` **puts traffic on the wire**. It stays completely inert unless `NOISE_ENABLED=true` in `.env`, so the default posture — and sweep's read-only guarantee — is unchanged. Implements the [[Cover Traffic & Padding]] defence the [[Threat Model]] flags as the countermeasure to metadata / traffic-flow correlation.\n\n## Two jobs, one primitive\nThe primitive is CSPRNG bytes (`os.urandom` → `/dev/urandom`), used two ways:\n\n1. **`verify [BYTES]`** — proves a freshly generated buffer is statistically random with three standard tests, so we only ever emit noise we can *mathematically* stand behind:\n   - **Shannon entropy** (bits/byte, ideal 8.0; PASS ≥ 7.99 at ≥64 KiB)\n   - **NIST monobit** (1-bit balance; PASS |z| < 5)\n   - **chi-square** over the 256 byte values (df=255; PASS window 185–345)\n   A broken/patterned source (constant, biased, low-entropy) fails hard; true CSPRNG output passes ~always. Harmless — allowed even when `NOISE_ENABLED=false`.\n2. **`pad` / `start` / `stop` / `status`** — a cover-traffic daemon that emits verified-random UDP datagrams toward the exit at a configured rate + jitter, so a passive on-path observer sees a continuously varying encrypted flow instead of your real traffic envelope. `start` re-runs `verify` and refuses to arm if it fails. PID at `/tmp/nullexit-noise.pid`.\n\n## .env knobs\n`NOISE_ENABLED` (master switch, default false), `NOISE_PAD_TARGET` (blank ⇒ the gateway Tailscale IP, so padding rides the tunnel exactly like real traffic and is dropped at the gateway — no listener needed), `NOISE_PAD_PORT`, `NOISE_PAD_RATE_KBPS` (default 64), `NOISE_PAD_PACKET_BYTES` (1024), `NOISE_PAD_JITTER_MS` (40).\n\n## Rate control: constant vs top-up\n`NOISE_PAD_MODE`:\n- **`constant`** (default) — always emit the target rate. Simple, predictable battery cost.\n- **`topup`** — each second, measure real egress on `NOISE_PAD_IFACE` (default en0, via `netstat -ib`) and inject only `max(0, target − real)`. The **observed total rate stays flat whether you're idle or busy** — the strong anti-correlation property — and no bandwidth is wasted when you're already sending. It subtracts its own prior-window padding so it doesn't chase itself; if the counter can't be read it fails toward *more* cover (full target).\n\nTarget rate is `NOISE_PAD_RATE_KBPS` (absolute) unless **`NOISE_PAD_PCT`** is set, in which case it's that percentage of `NOISE_LINK_MBPS` (link **capacity**). Deliberately a % of capacity, **not** of current throughput — scaling with current traffic would collapse padding to zero exactly when you're idle, which is when cover matters most.\n\n## Persistence (one switch, not a new option)\n`launchd/com.nullexit.noise.plist` (installed like [[watcher.sh]]'s wake-recovery plist: `cp` → `sed __NULLEXIT_HOME__` → `launchctl load`) runs `noise.sh __boot` at every boot/login. `__boot` is governed by the **same** `NOISE_ENABLED` flag — it exits 0 cleanly when disabled (so `KeepAlive` never tight-loops) and runs the padding loop when enabled. So there is deliberately **no** \"persistent vs one-shot\" toggle to reason about: loading the plist once means \"auto-start whenever `NOISE_ENABLED=true`\". `KeepAlive {SuccessfulExit:false, Crashed:false}` mirrors wake-recovery so `launchctl bootout` stops it without a relaunch loop. Both manual `start` and launchd `__boot` share the PID file, so `status`/`stop` behave identically either way.\n\n## Honest limits\nConstant/random **one-way** padding, not a full traffic-analysis-resistant shaper: it blurs uplink volume + timing, but does not mimic a specific protocol, pad bidirectionally, or defeat a global active adversary. Costs bandwidth + battery — hence opt-in and a modest default rate. The DNS/IP anomaly detector is deliberately **not** here (left for later).\n\n## Relationships\n- 🕶️ **implements:** [[Cover Traffic & Padding]] — the anti-correlation defence\n- 🔀 **inverse of:** [[sweep.sh]] (read-only) — this one is active; sweep prints an *informational* line when `NOISE_ENABLED=true` (still read-only, not a scored check)\n- 🔗 **sources:** [[common.sh]] (`read_env_var`, `read_adguard_ip`)\n- 🛡️ **signed:** in `.signatures` via [[crypto.sh]] — always re-sign after editing it\n- 🛡️ **mitigates:** the metadata / traffic-flow correlation gap in [[Threat Model]]\n- 🧭 **index:** [[MOC - Components]]\n","nullexit-knowledge-graph/Components/pf.conf.md":"---\ntags:\n  - type/component\n  - status/active\n---\n\n# pf.conf\n\nThe **macOS Packet Filter ruleset** (~35 lines). Two jobs:\n\n1. **[[PF Kill-Switch]]** — default-deny on the physical interface (`en0`); only WARP endpoints, Tailscale DERP/control plane, `utun*`, and local LAN survive.\n2. **[[MSS Clamping & MTU|TCP MSS clamping]]** — `scrub out all max-mss 1160` shrinks TCP headers so the [[Double-Tunnel]] never fragments.\n\n## Hard-won subtleties\n- LAN `pass` rules **must** split into explicit `proto tcp`/`udp`/`icmp` — an implicit `pass` compiles to TCP-only and silently drops [[LAN P2P & DERP|Tailscale UDP]] ([[Bugs - Tailscale P2P & SNAT|§15.7.2]])\n- The kill-switch is **exit-node-only**; enabling it during [[SOCKS5 Fallback]] bricks the host and locks tailscaled out of its control plane ([[Bugs - Tailscale P2P & SNAT|§15.7.3]])\n- `No ALTQ support` / `Could not capture PF reference token` warnings are benign macOS noise\n\n## Relationships\n- ⬆️ **implements:** [[PF Kill-Switch]], [[MSS Clamping & MTU]]\n- 🔗 **loaded by:** [[toggle.sh]] (exit-node path only)\n- ⚠️ **conflicts with:** [[SOCKS5 Fallback]] (must stay disabled there)\n- 🔬 **needs passwordless sudo:** `/sbin/pfctl` in `/etc/sudoers.d/nullexit`\n","nullexit-knowledge-graph/Components/pihole-mode.sh.md":"---\ntags:\n  - type/component\n  - status/active\n---\n\n# pihole-mode.sh\n\n**LAN Pi-hole mode** (opt-in, added 2026-07-18). nullexit is already a Pi-hole for **mesh** devices — [[AdGuard DNS Sinkhole]] filters DNS for everything that routes through the gateway over Tailscale. This mode extends that filtering to **non-Tailscale** devices on the same LAN (a smart TV, a guest laptop, IoT): the classic \"point your DNS at this box.\" Default OFF (`PIHOLE_LAN_MODE`).\n\n## Mechanism\nReuses the tested [[dns-proxy.py]] but binds it on the **LAN interface** (this Mac's en0 IP) instead of loopback, forwarding to AdGuard at `127.0.0.1:<DNS_PROXY_PORT>`. Any LAN device that sets its DNS server to this Mac's IP then gets the same ad/tracker/threat filtering.\n\nTwo subtleties it gets right:\n- **The AdGuard host port is [[Procedural Ports|procedural]]** (randomized per boot), so it's discovered from Docker (`docker compose port warp 5335`), then the ports file, then the compose default — never assumed `5354`.\n- **AdGuard is probed over TCP**, because Colima user-mode networking forwards UDP-to-container unreliably (the very reason `dns-proxy.py` relays over TCP) — a UDP probe false-negatives even when AdGuard is healthy.\n\nNo kill-switch change is needed: [[pf.conf]] has no inbound-53 block and already permits DNS responses out to RFC1918 LAN clients.\n\n## Commands\n`enable` / `disable` / `status` / `test`. `test` digs the listener locally and confirms it resolves clean domains **and** sinkholes blocked ones (validated: `github.com` resolves, `doubleclick.net` → `0.0.0.0`). `enable` needs root to bind `:53` (same `sudo -n bash -c` pattern [[common.sh]] uses for the gateway's own proxy).\n\n## ⚠️ Honest limits\n- **Only works on a TRUSTED, non-isolated network.** On AP-isolated WPA2-Enterprise (the [[LAN P2P & DERP|same isolation]] that forces phones onto DERP), other devices can't reach this Mac at all — the listener runs but serves no one.\n- **DNS filtering only** — it does **not** route those devices' traffic through WARP; their IP is still their own. For full tunneling a device must join the Tailscale mesh.\n\n## Relationships\n- 🧩 **extends:** [[AdGuard DNS Sinkhole]] to non-mesh LAN devices\n- 🔗 **reuses:** [[dns-proxy.py]] (LAN-bound), reads [[Procedural Ports]] port from Docker\n- ⚠️ **gated by network:** [[LAN P2P & DERP]] isolation blocks it on enterprise Wi-Fi\n- 🧭 **index:** [[MOC - Components]]\n","nullexit-knowledge-graph/Components/post-rules.txt.md":"---\ntags:\n  - type/component\n  - status/active\n---\n\n# post-rules.txt\n\n**Gluetun iptables rules** (~18 lines) loaded by [[warp (Gluetun)|warp]] at container start. Applied once by Gluetun's own parser — **not a shell** (so bash variables do NOT expand; see below).\n\n## Rules\n- FORWARD ACCEPT for `tailscale0` in/out; INPUT ACCEPT for `tailscale0`\n- NAT POSTROUTING MASQUERADE on `tun0`\n- MANGLE: TCP MSS clamp → see [[MSS Clamping & MTU]]\n- NAT PREROUTING: redirect DNS:53 → 5335 ([[adguardhome]])\n- `ip6tables` DROP FORWARD on `tailscale0` (the [[Bugs - Misc Resolved|IPv6 leak]] fix)\n\n## Static-parser gotcha\nPutting `--set-mss ${GATEWAY_MSS:-1120}` here **crashes Gluetun** — the parser injects the literal string. So [[toggle.sh]] `sed`-rewrites the integer in this file *before* boot ([[Bugs - Misc Resolved|§15.12.15]]).\n\n## post-rules vs routing-fix\nUse this **only for static** rules. Dynamic rules go in [[routing-fix]] — Gluetun flushes `post-rules.txt` on every VPN reconnect.\n\n## Relationships\n- 🔗 **loaded by:** [[warp (Gluetun)]]\n- ⬆️ **implements:** DNS redirect → [[adguardhome]], IPv6 drop, [[MSS Clamping & MTU]]\n- ⚠️ **flushed on reconnect** → dynamic rules must live in [[routing-fix]]\n- 🔧 **MSS injected by:** [[toggle.sh]] (`sed`)\n","nullexit-knowledge-graph/Components/profiles.sh.md":"---\ntags:\n  - type/component\n  - status/active\n---\n\n# profiles.sh\n\n**Config profiles that tame the `.env` flag sprawl** (added 2026-07-18). The toolkit grew ~7 interacting intent-level switches (LAN-P2P, FaceTime split-route, LAN Pi-hole, cover traffic, Tor bridges, WARP threshold…), which is the real complexity cost — not the features themselves but reasoning about the combinations. This collapses them into **3 named intents** so you pick one instead of hand-tuning switches.\n\n## Config-only by design (cannot break the network)\nIt **only reads/writes `.env`** — never routing, PF, containers, or a restart. So it is physically incapable of disrupting the live gateway; changes take effect only on the next `./toggle.sh --restart`. `apply` backs up `.env` first (`.env.bak.<ts>`, gitignored — it holds secrets), touches only the managed keys (every secret and tuning line is preserved verbatim), and **forces `KILL_SWITCH=true`** in every profile — the fail-closed invariant is never negotiable.\n\n## Commands\n- `show` — the whole current config, grouped + explained, and which profile (if any) matches. Read-only. This alone answers \"what state am I even in.\"\n- `list` — the profiles and what each sets (marks where you currently differ).\n- `preview <name>` — the exact diff `apply` would make. Read-only.\n- `apply <name>` — write it (backup + diff + \"restart to apply\").\n\n## Profiles\n- **campus** — AP-isolated enterprise/campus: DERP (avoids gvproxy SNAT poisoning), everything conservative, no real-IP exposure.\n- **home** — trusted network: direct [[LAN P2P & DERP|LAN P2P]] (fast), [[Future - FaceTime Split-Route|FaceTime split-route]] + [[pihole-mode.sh|LAN Pi-hole]] on, no cover-traffic battery cost.\n- **hardened** — hostile net: [[noise.sh|cover traffic]] (topup) + [[Tor-over-WARP|Tor bridges]], fail-fast WARP, never expose the real IP.\n\n## Relationships\n- 🧹 **tames:** the `.env` surface of [[noise.sh]], [[Future - FaceTime Split-Route]], [[pihole-mode.sh]], [[LAN P2P & DERP]]\n- 🛡️ **preserves invariant:** [[PF Kill-Switch]] forced on in every profile\n- 🧭 **index:** [[MOC - Components]]\n","nullexit-knowledge-graph/Components/recover.sh.md":"---\ntags:\n  - type/component\n  - status/active\n---\n\n# recover.sh\n\nThe **recovery script** (~742 lines, cross-platform). Two modes:\n\n- **Nuclear (default):** disconnect Tailscale, reset DNS → `1.1.1.1`, disable proxies, flush routes, `docker compose down`, power-cycle Wi-Fi. Used by the [[WARP Watcher]] when the tunnel is declared dead.\n- **`--post-wake` (light):** keeps the gateway **live** while re-hijacking DNS, refreshing the exit-node pref, and force-recreating [[warp (Gluetun)|warp]] only if unhealthy. Fired by [[watcher.sh]] on every sleep/wake or Wi-Fi roam.\n\n## Why two modes matter\nThe `--post-wake` mode is the heart of [[Roaming & Recovery]]. It uses `tailscale set` (not `--reset`) to minimize churn — but re-asserting the exit node rewrites the default route, which *is* the key the watcher triggers on → [[Bug - Post-Wake Feedback Loop]].\n\n## Coordination hazards\n- Shares `/tmp/nullexit-toggle.lock` with [[toggle.sh]] to prevent concurrent teardown+rebuild ([[Bug - WARP Watcher Race]])\n- Must delete the [[Gateway Active Marker]] in nuclear mode or [[watcher.sh]] resurrects the gateway ([[Bugs - Routing Loops|§15.2.9]])\n- Runs headless (no TTY) → all sudo is `sudo -n`, no `sudo -v`\n\n## Relationships\n- 🔗 **sources:** [[common.sh]]\n- 🤝 **invoked by:** [[watcher.sh]] (post-wake), [[WARP Watcher]] (nuclear)\n- ⚠️ **causes:** [[Bug - Post-Wake Feedback Loop]]\n- 🔧 **coordinated via:** [[Gateway Active Marker]], toggle lock\n- 🔬 **verify:** roaming end-to-end recovery (open TODO §18.1)\n","nullexit-knowledge-graph/Components/reinstall-host-tailscale.sh.md":"---\ntags:\n  - type/component\n  - status/active\n  - severity/destructive\n---\n\n# reinstall-host-tailscale.sh\n\n**Nuke-and-reinstall tool** (~739 lines) for host Tailscale. Crisis-recovery only.\n\n## What it purges\nCompletely removes Tailscale, its settings, macOS Background Items (`.btm`), and stale System Extensions. Wipes **all** Login Items via `sfltool reset-login-items` (needs sudo) — so it is **destructive to other login items**, not just Tailscale.\n\n## When to reach for it\nWhen the standalone `tailscaled` daemon is wedged beyond `brew services restart` (see [[Bugs - macOS Platform Quirks|daemon freeze §15.11.2/5]]) or a System Extension conflict is causing host leaks ([[diagnose-host-leak.sh]] scenario detection).\n\n## Relationships\n- 🩹 **last-resort repair for:** [[tailscale container|host tailscaled]] wedge\n- 🤝 **related diagnostic:** [[diagnose-host-leak.sh]]\n- ⚠️ **side effect:** wipes unrelated Login Items — use deliberately\n","nullexit-knowledge-graph/Components/routing-fix.md":"---\ntags:\n  - type/component\n  - type/container\n  - status/active\n---\n\n# routing-fix\n\nBoth the **sidecar container** (`alpine`) and the **script it runs** (`scripts/routing-fix.sh`, ~309 lines). Runs a **30-second loop inside [[warp (Gluetun)|warp]]'s network namespace** — the ultimate choke point for network-wide rules.\n\n## What it maintains every 30s\n- Routing table 200 (SOCKS5 → tun0) and table 52 (CGNAT return path — the fix for [[Bugs - Exit-Node Return Path|the `rx 0` bug]])\n- FORWARD rules in **both** iptables backends (nftables + legacy) — Gluetun resets them on reconnect\n- [[Geo-IP Blocking]] country CIDR drops + the [[Kernel IP Blocklist|ipset threat blocklist]]\n- The **RFC1918 DROP** rule for [[LAN P2P & DERP]] (re-read from `.lan_p2p_detected`) — kills the [[Bug - SNAT Endpoint Poisoning|SNAT poisoning]] hole-punch\n- The `.host_ips` RETURN carve-out that re-permits direct host↔container P2P\n- [[Transparent Onion Routing|`.onion` NAT redirect]] for `198.18.0.0/15` → Tor port 9040\n- Fail-closed kill-switch: `curl` over tun0; 3 fails → blackhole the default route\n\n## Why polling, not netlink\nA pure-bash netlink listener on Alpine is brittle; 30s polling is bulletproof. Trade-off: a 1–4s stutter window on Gluetun reconnect ([[Bugs - Misc Resolved|§15.12.13]]).\n\n## ⚠️ Latent hole it currently has\nThe exit-path `-i tailscale0 -o tun0 ACCEPT` **shadows** the DoT:853 / QUIC:443 REJECT rules (first-match wins) → [[Bug - Shadowed DoT-QUIC REJECT]].\n\n## Relationships\n- 🔗 **runs inside:** [[warp (Gluetun)]] namespace\n- ⬆️ **enforces:** [[Geo-IP Blocking]], [[Kernel IP Blocklist]], [[Transparent Onion Routing]]\n- 🔧 **fixes:** [[Bugs - Exit-Node Return Path]] (table 52), [[Bug - SNAT Endpoint Poisoning]] (RFC1918 DROP)\n- 🔗 **reads:** `.lan_p2p_detected` (from [[watcher.sh]]), `.host_ips`\n- ⚠️ **currently vulnerable:** [[Bug - Shadowed DoT-QUIC REJECT]] → [[Future - Fix Shadowed REJECTs]]\n","nullexit-knowledge-graph/Components/rule-compiler.md":"---\ntags:\n  - type/component\n  - type/container\n  - status/active\n---\n\n# rule-compiler\n\nA **Go one-shot container** (`golang:1.22-alpine` builder → raw `alpine`) that compiles threat lists. Ported from Python (`sync-rules.py`) for speed. Two pipelines:\n\n- **DNS pipeline:** fetches remote blocklists, deduplicates against [[adguardhome|AdGuard]]'s native filters (~83k redundant rules purged), squashes subdomains (~50%), compiles to AdGuard syntax → [[AdGuard DNS Sinkhole]] (~342k rules)\n- **IP pipeline:** fetches Spamhaus DROP, Feodo, Emerging Threats, CINS; strips RFC1918/Tailscale ranges; writes an atomic `ipset restore` file (16,721 entries) → [[Kernel IP Blocklist]]\n\n## Off the critical path (July-2026 optimization)\nNo longer part of `docker compose up`. [[toggle.sh]] runs it **on-demand, hash-gated** on `black_list.txt` + `white_list.txt` (via `compute_rules_hash()`), or when artifacts are missing/stale (>7 days). A compile failure is **non-fatal** — old rules are kept ([[Bugs - Docker & Colima Lifecycle|§15.8.8]]). Cut `compose up` from 45s → 9s.\n\n## Why it stays in-container\nRunning natively would need Go on the host (a toolchain dependency drift) **or** a trusted binary blob, and would make the *host* write into the `./adguard/work` bind-mount — violating the \"single writer = the rule-compiler container\" invariant.\n\n## Relationships\n- ⬆️ **produces:** `compiled_rules.txt` → [[AdGuard DNS Sinkhole]]; `ip_blocklist.ipset` → [[Kernel IP Blocklist]]\n- 🔗 **gated by:** [[toggle.sh]] rules-hash; inputs `black_list.txt`/`white_list.txt` are [[Crypto Integrity|signed]]\n- 🤝 **consumed by:** [[routing-fix]] (watches ipset mtime), [[adguardhome]]\n- 🔧 **defends against:** stale cache / URL-rot ([[Bugs - Misc Resolved|§15.12.14]])\n","nullexit-knowledge-graph/Components/setup.sh.md":"---\ntags:\n  - type/component\n  - status/active\n---\n\n# setup.sh\n\n**One-time installer** (macOS; Linux sibling is `scripts/setup-linux.sh`, ~95% identical). Sources `scripts/setup-common.sh` for the heavy shared logic.\n\n## What it does\n- Installs deps (Docker, Colima, standalone Tailscale via Homebrew)\n- Downloads `wgcf`, generates fresh Cloudflare WARP WireGuard keys\n- Prompts for a Tailscale Auth Key and an AdGuard rule profile\n- Injects a 256-bit `NULLEXIT_SEED` for [[Crypto Integrity]]\n- Writes `.env` (secrets + all tunables)\n\n## Notes\n- Targets Apple's stock **Python 3.9.6** deliberately — see [[Python Runtime Airgap]]\n- `RECOMMENDED_TS_VERSION = 1.98.5`\n- Default creds: `admin` / `nullexit` (safe behind NAT; a cloud footgun — see [[Bugs - Misc Resolved]])\n\n## Relationships\n- ⬆️ **produces:** `.env`, `.signatures` (via [[crypto.sh]])\n- 🔗 **depends on:** [[Colima VM]], Homebrew Tailscale\n- 🔗 **shares logic with:** `setup-linux.sh` (Linux path)\n- 🤝 **precedes:** [[toggle.sh]]\n","nullexit-knowledge-graph/Components/sweep.sh.md":"---\ntags:\n  - type/component\n  - status/active\n---\n\n# sweep.sh\n\n**Automated read-only health sweep** (~331 lines, added 2026-07-15). Answers one question after a toggle/restart/wake: *is the gateway actually healthy end-to-end?* It never mutates routing, PF, DNS, or containers — safe to run against a live gateway at any time, including from a remote session. `errexit` is deliberately **OFF**: probes are *expected* to fail on an unhealthy gateway, and each recorded exit status is the diagnostic signal.\n\n## The 6 checks (each PASS / WARN / FAIL)\n1. **Containers** — `docker compose ps`: [[warp (Gluetun)]], [[adguardhome]], [[tailscale container]], [[tor container]], [[routing-fix]] all up; warp + adguardhome additionally `healthy`\n2. **Double-tunnel / leak** — container WARP egress IP == host egress IP, both `warp=on` ([[Double-Tunnel]] core promise; gluetun ships `wget` not `curl`, so the in-container trace falls back)\n3. **Host↔container path** — the gateway peer in `tailscale status` must be `direct <ip:port>`; WARNs on a DERP relay ([[LAN P2P & DERP]])\n4. **AdGuard filtering** — `compiled_rules.txt` block counts present **and** live interception via `dig @` the gateway IP ([[AdGuard DNS Sinkhole]], [[rule-compiler]])\n5. **PF kill-switch** — `pfctl` reports Enabled **and** anchor `com.apple/nullexit` carries rules ([[PF Kill-Switch]]; needs passwordless sudo, else WARN)\n6. **Tailnet reachability** (added 2026-07-17) — every peer `tailscale status` reports online (self and `offline` peers skipped; `-` = online-but-idle is kept) must answer `tailscale ping --timeout=3s --c 1 --until-direct=false`. TSMP probes the WireGuard data path, so it works even on phones that drop ICMP. All pong → PASS; some unreachable → WARN; none → FAIL. DERP-relayed pongs count as reachable — direct-only enforcement stays in check 3.\n\n## Verdict & report\nA timestamped `sweep-<UTC>.txt` lands in the repo root per run (so runs can be diffed); exit code is 0 only when nothing FAILs, so it can gate launchd hooks or CI. `--quiet` prints only the verdict line. Launchable as `Sweep Gateway.app` (osacompiled `Sweep-Gateway.applescript`), which refuses to run if the [[Crypto Integrity]] verify fails.\n\n## Relationships\n- 📋 **automates:** the infra core of the [[Sweep Protocol]] (checks 1–5 mirror `sweep.md §1`)\n- 🔗 **sources:** [[common.sh]] (`run_with_timeout`, `read_adguard_ip`)\n- 🔬 **verifies:** [[Double-Tunnel]], [[PF Kill-Switch]], [[AdGuard DNS Sinkhole]], [[LAN P2P & DERP]]\n- 🩹 **mostly closes:** [[Bugs - WARP Liveness & Host Leaks]] — check 2 catches every §15.6.1 silent-leak scenario in a routine sweep (detection; remediation stays with [[diagnose-host-leak.sh]] `--fix`)\n- 🛡️ **signed:** in `.signatures` via [[crypto.sh]] — always re-sign after editing it\n- 🤝 **complements:** [[diagnose-host-leak.sh]] (deep leak classifier), [[WARP Watcher]] (continuous in-flight monitor)\n- 🔀 **inverse of:** [[noise.sh]] — the active (traffic-emitting) counterpart; sweep prints an informational cover-traffic line when `NOISE_ENABLED=true` (still read-only, unscored)\n- 🧭 **index:** [[MOC - Components]]\n","nullexit-knowledge-graph/Components/toggle.sh.md":"---\ntags:\n  - type/component\n  - status/active\naliases:\n  - toggle\n---\n\n# toggle.sh\n\nThe **main lifecycle orchestrator** (2191 lines, cross-platform). Dispatches on `$OSTYPE` at L20: a self-contained Linux path (L63–848) runs and `exit`s before the macOS body (L878–2191). Running it toggles the gateway ON ↔ OFF.\n\n## What it does\n- Verifies HMAC signatures ([[Crypto Integrity]]) before anything runs\n- Decides STOP vs START from the [[Gateway Active Marker]] (persisted intent, **not** a live probe — see [[Bug - STOP-START Live Probe]])\n- START critical path: [[Colima VM]] readiness poll → [[rule-compiler]] (hash-gated, off critical path) → `docker compose up` → host `tailscale set --exit-node` → [[MSS Clamping & MTU|WARP bypass routes]] → [[MagicDNS Routing|force DNS to gateway]] → [[SOCKS5 Fallback|SOCKS verify]]\n- Spawns background daemons: [[DNS Watcher]], [[WARP Watcher]], `caffeinate`, [[Honey-Port Tripwire]], [[dns-proxy.py]]\n- The **true commit point** is `SUCCESS_RUN=true` (L2164), *not* the \"STARTED in Ns\" print — a TERM in that window fires the fail-closed `cleanup_handler`\n\n## Sharp edges\n- Never pipe it through a reader (`| tail`) — disowned children keep stdout open and the pipe hangs\n- Never `docker compose restart warp` on a live gateway — it detaches the shared namespace\n- Delegates most helpers to [[common.sh]] since the July-2026 refactor\n\n## Relationships\n- 🔗 **sources / depends on:** [[common.sh]], [[Colima VM]], [[crypto.sh]]\n- ⬆️ **spawns:** [[DNS Watcher]], [[WARP Watcher]], [[dns-proxy.py]], [[Honey-Port Tripwire]]\n- ⬆️ **arms:** [[PF Kill-Switch]], [[MSS Clamping & MTU]], [[Procedural Ports]]\n- 🔧 **decision hardened by:** [[Gateway Active Marker]] (fixes [[Bug - STOP-START Live Probe]])\n- ⚠️ **haunted by:** [[Bug - bash 3.2 Heisenbug]]\n- ⚠️ **would be refactored by:** [[Future - Pluggable Egress]]\n- 🤝 **paired with:** [[recover.sh]], [[watcher.sh]]\n","nullexit-knowledge-graph/Components/unlock-files.sh.md":"---\ntags:\n  - type/component\n  - status/active\n---\n\n# unlock-files.sh\n\n**Stale-permission repair** (~25 lines). Replaces mode-`000`/`0444` locked inodes with fresh `0644` ones using **atomic rename** (`cp` + `mv`) — never calls `chmod`.\n\n## Why this exists\nThe project has a strict *no-chmod-from-scripts* policy. Older versions of `sync-rules.py`/`toggle.sh` used `chmod 0444`/`000` locks that could strand a file unreadable if the script died mid-flight. Those leftovers throw `PermissionError` on the next run — and a `000` `.env` even blocks `mv`/`rm` of the parent `adguard/work/` tree at the VFS layer. This script swaps the locked inode for a writable one (mode lives in the inode, not the dentry). Full rationale in [[Bugs - Permissions & Crypto|§15.9.6]].\n\n## Covers\n`.env` (000), `compiled_rules.txt`, `ip_blocklist.ipset`, `cache/*.txt`, `data/filters/*.txt` (0444).\n\n## Relationships\n- 🔧 **repairs:** [[rule-compiler]] outputs, `.env` for [[setup.sh]]/[[toggle.sh]]\n- 💡 **embodies:** the no-`chmod` policy → [[Bugs - Permissions & Crypto]]\n","nullexit-knowledge-graph/Components/watcher.sh.md":"---\ntags:\n  - type/component\n  - status/active\n---\n\n# watcher.sh\n\n**Long-running launchd daemon** (~291 lines) for post-wake / post-roam self-healing. Installed as the LaunchAgent `com.nullexit.wake-recovery`. Runs independently of [[toggle.sh]] — toggle does **not** spawn it.\n\n## Two listeners\n1. **Wake listener** — `log stream` predicate on `didWake`/`DarkWake` → `recover.sh --post-wake`\n2. **Network listener** — `scutil n.watch` on `State:/Network/Global/IPv4` → `recover.sh --post-wake`\n\nBoth are gated by the [[Gateway Active Marker]] (no-op if the gateway isn't supposed to be up) and debounced.\n\n## detect_lan_p2p_mode()\nRuns on every network change to decide [[LAN P2P & DERP|LAN-P2P safety]]:\n- WPA2-Enterprise detection via `system_profiler SPAirPortDataType` (the `airport` binary was removed in macOS 14.4 — see [[Bugs - macOS Platform Quirks]] and [[Obs - system_profiler Longevity]])\n- AP-isolation probe by pinging the default gateway\n- Writes `true`/`false` to `.lan_p2p_detected`, consumed by [[routing-fix]] every 30s\n\n## Known failure modes it caused/fixed\n- [[Bug - WARP Watcher Race]] — post-wake force-recreate tripped the [[WARP Watcher]] into nuclear shutdown\n- [[Bug - Post-Wake Feedback Loop]] — re-fired on the route change its own recovery caused (fixed with a settle cooldown)\n- Lid-wake path is **best-effort** on Sonoma+ (launchd suspends the agent; live `log stream` events during suspension are dropped)\n\n## Relationships\n- ⬆️ **fires:** [[recover.sh]] (`--post-wake`)\n- 🔗 **reads/writes:** [[Gateway Active Marker]], `.lan_p2p_detected`\n- ⬆️ **feeds:** [[routing-fix]] (LAN-P2P signal), [[LAN P2P & DERP]]\n- ⚠️ **detection threatened by:** [[Obs - system_profiler Longevity]]\n- ⚠️ **caused:** [[Bug - Post-Wake Feedback Loop]], [[Bug - WARP Watcher Race]]\n","nullexit-knowledge-graph/Concepts/AdGuard DNS Sinkhole.md":"---\ntags:\n  - type/concept\n  - concept/firewall-layer\n---\n\n# AdGuard DNS Sinkhole (Layer 1)\n\nThe first of the 4-layer firewall. [[adguardhome|AdGuard Home]] blocks ad/tracker domains before they load — ~22% faster Time-to-Interactive, ~20% faster Speed Index on ad-heavy sites. Rules compiled by [[rule-compiler]] (~342k), customizable via `black_list.txt`/`white_list.txt` and `light`/`medium`/`heavy` profiles.\n\n## How mesh DNS is forced here\nEvery mesh device's DNS is routed to the gateway via [[MagicDNS Routing]] (Custom nameserver + \"Override local DNS\"). PREROUTING redirects :53 → 5335. Android Private DNS (DoT) must be disabled.\n\n## Gaps\n- ⚠️ **DoT:853 bypass** is currently possible — [[Bug - Shadowed DoT-QUIC REJECT]]\n- Dedup vs native filters saves ~83k redundant rules; subdomain squash ~50%\n- Dual sinkhole IPs observed — [[Obs - Dual Sinkhole IPs]]\n\n## Relationships\n- 🔗 **runs on:** [[adguardhome]], fed by [[rule-compiler]]\n- 🎯 **enforced by:** [[MagicDNS Routing]], [[post-rules.txt]] (PREROUTING)\n- ⚠️ **bypassable via:** [[Bug - Shadowed DoT-QUIC REJECT]] → [[Future - Fix Shadowed REJECTs]]\n- 🧱 **layer above:** [[Kernel IP Blocklist]] (catches IP-direct malware DNS can't see)\n- 🔬 **complemented by:** [[DNS Anomaly Detection]] — statistical finder for the *unknown* tunneling/DGA a blocklist can't match\n- 📡 **extended to LAN by:** [[pihole-mode.sh]] — serves this filtering to non-mesh LAN devices (opt-in)\n","nullexit-knowledge-graph/Concepts/Cover Traffic & Padding.md":"---\ntags:\n  - type/concept\n  - concept/security\n---\n\n# Cover Traffic & Padding\n\nThe countermeasure to **traffic-flow / metadata correlation** — the structural limitation the [[Threat Model]] admits the double-tunnel does *not* solve. Encryption hides *what* you send; it does not hide *that*, *when*, or *how much*. A passive on-path observer (residence, campus, or hostile network) can correlate two encrypted flows by timing and volume alone — e.g. a device's upload burst matched against a correlated burst on another link a few ms later links them, without decrypting anything.\n\n## The idea\nContinuously emit **plausibly-encrypted-looking** filler so the observed flow is always busy and always varying, drowning the real traffic envelope in noise. High-entropy random bytes are the right payload precisely because encrypted traffic *is* high-entropy — which is why the filler is [[noise.sh|verifiably random]] before it is ever sent.\n\n## Why it is honest but partial\nThe [[Threat Model]] is blunt: mixing ([[Tor-over-WARP|Tor]]) or dummy padding are the only real answers here, and **both crush performance**. nullexit's implementation ([[noise.sh]]) is deliberately a first-order version:\n- **One-way** uplink padding — blurs volume + timing an observer sees leaving the host.\n- **Not** a protocol-mimicking or bidirectional shaper; **not** proof against a global active adversary.\n- Costs bandwidth + battery → strictly **opt-in** (`NOISE_ENABLED`), modest default rate.\n\n## Interaction with the network reality\nOn an AP-isolated network ([[LAN P2P & DERP]], `TAILSCALE_ALLOW_LAN_P2P=false`) all peer traffic already detours through a DERP relay, so there is no device-to-device LAN flow to correlate — but each device's encrypted flow to the relay is still fingerprintable. Padding raises the cost of that correlation; it does not eliminate it.\n\n## Relationships\n- 🛠️ **implemented by:** [[noise.sh]] (`pad`, verified-random payload)\n- 🩹 **patches limitation in:** [[Threat Model]] (traffic analysis / metadata)\n- 🤝 **alternative defence:** [[Tor-over-WARP]] (mixing, at higher latency)\n- 🧭 **index:** [[MOC - Concepts]]\n","nullexit-knowledge-graph/Concepts/Crypto Integrity.md":"---\ntags:\n  - type/concept\n  - concept/security\n---\n\n# Crypto Integrity (HMAC script signing)\n\nTamper-**evidence** for the core bash scripts. [[crypto.sh]] HMAC-SHA256s each signed script using `NULLEXIT_SEED` (injected by [[setup.sh]]) and stores signatures in `.signatures`. On every start, `crypto.sh --verify` runs first; mismatch → loud boot failure.\n\n## What it is and isn't\n- ✅ Catches accidental edits, logic bugs, non-privileged malware tampering\n- ❌ **Not** a boundary against an attacker with repo write access (they read the seed and re-sign) — it's a *footgun-catcher*\n- Uses `[ -f ]` not `[ -x ]` so it survives git stripping the `+x` bit (fail-closed)\n\n## Signed set (12 files)\n`toggle.sh`, `recover.sh`, `common.sh`, `routing-fix.sh`, `diagnose-host-leak.sh`, `sweep.sh`, `watcher.sh`, `pf.conf`, `post-rules.txt`, `docker-compose.yml`, and `black_list.txt`/`white_list.txt` (the lists are security inputs — editing them requires a re-sign, which is also when you'd want a [[rule-compiler]] recompile). `toggle-linux.sh` left the set when Linux support was unified into the root `toggle.sh`.\n\n## Relationships\n- 🛡️ **implemented by:** [[crypto.sh]]\n- 🔗 **seeded by:** [[setup.sh]]\n- 🔒 **guards:** [[toggle.sh]], [[recover.sh]], [[common.sh]], the block/allow lists\n- 🧩 **part of:** [[Threat Model]]\n","nullexit-knowledge-graph/Concepts/DNS Anomaly Detection.md":"---\ntags:\n  - type/concept\n  - concept/security\n---\n\n# DNS Anomaly Detection\n\nStatistical, local-only detection of **DNS tunneling / DGA / C2** that the blocklist-based [[AdGuard DNS Sinkhole]] can't catch — those match *known-bad* names; tunneling hides in *never-seen* subdomains of an otherwise-innocuous domain. Implemented in [[dns_anomaly_detector.py]] (v2), report-only, stdlib-only (respects [[Python Runtime Airgap]]).\n\n## Why the naive version fails\nThe v1 attempt (whole-FQDN Shannon entropy + `mean ± 3σ`) was a demo, not a detector:\n- **Wrong scope** — entropy over the whole name dilutes the encoded-label signal.\n- **Short-string blind spot** — Shannon entropy is capped at `log2(len)`, so a 12-char base64 label can score *below* a normal long word.\n- **Wrong distribution** — DNS-name entropy is non-normal and heavy-tailed (CDN/cloud hashes), so `mean+3σ` either floods false positives or lets tunneling through.\n- **No aggregation** — a single odd name is weak; a *stream* of them under one domain is the real tell.\n\n## What actually works (v2)\n- **n-gram (bigram) improbability** of the subdomain labels, trained on the user's *own* querylog — robust on short strings, scores \"doesn't look like real naming.\"\n- **Encoding-shape signal** — pure hex/base32/base64 payload labels (the strongest discriminator: CDN names are structured, tunneling labels are encoded). Base32 requires digits so long dictionary words don't false-match.\n- **Per-registered-domain aggregation** — unique-subdomain count, volume, suspicious record types (TXT/NULL/CNAME).\n- **Robust thresholds** — `median + k·MAD`, resistant to CDN outliers, plus a data-driven allowlist of the user's frequent domains + a tiny static CDN suffix list.\n- **Multi-signal, report-only** — flags only when improbable/encoded naming meets a volumetric corroborator; never auto-drops DNS (a false positive would break the user's internet). Verified: 0 false positives on a real 46 MB querylog, catches injected hex/base32/base64 tunnels.\n\n## Relationships\n- 🛠️ **implemented by:** [[dns_anomaly_detector.py]]\n- 🎯 **complements:** [[AdGuard DNS Sinkhole]] (blocklist) — this catches the *unknown* tunneling the list can't\n- 🔗 **feeds:** a report-only line in [[sweep.sh]] (informational, unscored)\n- 🧱 **respects:** [[Python Runtime Airgap]] (stdlib only, no ML deps)\n- 🧭 **index:** [[MOC - Concepts]]\n","nullexit-knowledge-graph/Concepts/DNS Watcher.md":"---\ntags:\n  - type/concept\n  - concept/resilience\n---\n\n# DNS Watcher\n\nAn in-process polling loop (child of [[toggle.sh]], PID at `/tmp/nullexit-dns-watcher.pid`) that checks the active service's DNS every ~30s and **re-injects** the gateway IP if macOS drifts it.\n\n## Why it's needed\nmacOS **wipes custom DNS** and reverts to DHCP nameservers whenever the Wi-Fi BSSID changes — and captive portals DHCP-replace DNS mid-handshake. Since the host is locked to the exit node, its DNS requests get swallowed by WARP and dumped onto the public internet → total DNS failure ([[Bugs - DNS Interception|§15.4.3]]). The watcher re-hijacks within 5s, enabling seamless roaming.\n\n## Interface independence\nDetects the active interface via `get_active_service()` rather than hardcoding \"Wi-Fi\", so it works on Ethernet/USB-C too (§17 hardening).\n\n## Relationships\n- 🔗 **spawned by:** [[toggle.sh]]; helper `start_dns_watcher` in [[common.sh]]\n- 🎯 **re-forces:** [[MagicDNS Routing]] host DNS\n- 🤝 **complements:** [[watcher.sh]] (the DNS path self-heals even when lid-wake events are missed)\n","nullexit-knowledge-graph/Concepts/Double-Tunnel.md":"---\ntags:\n  - type/concept\n  - concept/core\n---\n\n# Double-Tunnel (Tailscale over WARP)\n\nThe **core value proposition**: every packet is wrapped twice — once by Tailscale (WireGuard mesh) and again by Cloudflare WARP (WireGuard exit). Path:\n\n`Phone → Tailscale mesh → Mac → [[tailscale container]] → [[warp (Gluetun)]] tun0 → Cloudflare → Internet`\n\nYour ISP sees only an encrypted tunnel to a Cloudflare IP; WARP sees traffic with no account identity; Tailscale sees topology but not content ([[Threat Model]] trust-shifting).\n\n## Design decision: no aggressive IP rotation\nWARP gives \"anonymity in a crowd\" + a **static, high-trust** shared IP (few CAPTCHAs). Aggressive rotation was intentionally excluded — it breaks long-lived TCP, triggers CAPTCHA/2FA hell, and fights WireGuard's stateless model (§9.1).\n\n## The cost of double-wrapping\n- ~120–160 bytes overhead → [[MSS Clamping & MTU]] is mandatory\n- Datacenter-IP fraud flags → banking/streaming friction\n- **Symmetric NAT** ending at WARP kills real-time P2P → [[Bug - FaceTime Double-Tunnel]]\n- UDP hole-punch to external peers fails → [[LAN P2P & DERP|DERP fallback]]\n\n## Relationships\n- 🔗 **built from:** [[warp (Gluetun)]] + [[tailscale container]] + [[Colima VM]]\n- 🛡️ **part of:** [[Threat Model]]\n- ⚠️ **requires:** [[MSS Clamping & MTU]]\n- ⚠️ **breaks:** real-time media ([[Bug - FaceTime Double-Tunnel]])\n- ⚠️ **would be replaced by:** [[Future - AmneziaWG]], [[Future - Mullvad & Headscale]], [[Future - Host-Only Tor Mode]]\n","nullexit-knowledge-graph/Concepts/Gateway Active Marker.md":"---\ntags:\n  - type/concept\n  - concept/resilience\n---\n\n# Gateway Active Marker\n\n`/tmp/nullexit-gateway-active.marker` — an ISO-8601 timestamp file that records **persisted intent**: \"the gateway is *supposed* to be up.\" Written at the end of a successful START, cleared on STOP / nuclear recovery.\n\n## Why intent beats a live probe\nDeciding STOP-vs-START from a **live probe** (`docker compose ps`) means a *disable* depends on the gateway being reachable — which hangs and aborts under `set -e` when Docker is down ([[Bug - STOP-START Live Probe]], seen 57× historically). Reading a marker file is instant and can't hang. `gateway_should_be_running()` in [[common.sh]] consults the marker first, falling back to a live probe only if the marker is absent **and** the Docker socket is reachable.\n\n## Also the watcher's only signal\n[[watcher.sh]] only fires recovery if the marker exists — so a stopped gateway isn't resurrected. But a nuclear [[recover.sh]] that forgot to delete it caused an infinite auto-recovery loop ([[Bugs - Routing Loops|§15.2.9]]).\n\n## Relationships\n- 🔧 **fixes:** [[Bug - STOP-START Live Probe]]\n- 🔗 **read/written by:** [[toggle.sh]], [[recover.sh]], [[common.sh]] (`gateway_should_be_running`)\n- 🎯 **gates:** [[watcher.sh]] recovery\n- 💡 **design lesson:** prefer persisted state over live probes ([[Bug - bash 3.2 Heisenbug]] family)\n","nullexit-knowledge-graph/Concepts/Geo-IP Blocking.md":"---\ntags:\n  - type/concept\n  - concept/firewall-layer\n---\n\n# Geo-IP Blocking (Layer 3)\n\nDynamically drops traffic to/from specific countries. [[routing-fix]] downloads country CIDR ranges from `ipdeny.com` and adds `FORWARD` drops. Configured via `BLOCKED_COUNTRIES=\"kp il cn ru\"` in `.env`.\n\n## Known limitation (important)\nIP-based blocking stops servers/apps **physically registered** in a country (e.g. `www.gov.il`). It does **not** block high-profile sites behind global CDNs (Cloudflare/Google/Fastly) — the CDN's IP is US/global, so traffic never routes to the blocked country. A structural gap, not a bug.\n\n## Relationships\n- ⬆️ **enforced by:** [[routing-fix]]\n- 🧱 **peer layer:** [[Kernel IP Blocklist]]\n- 🛡️ **part of:** [[Threat Model]]\n","nullexit-knowledge-graph/Concepts/Honey-Port Tripwire.md":"---\ntags:\n  - type/concept\n  - concept/anonymity\n---\n\n# Honey-Port Tripwire\n\nA fake trap port (a `nc -l` listener on localhost) armed by [[toggle.sh]] on every START. If local malware sequentially port-scans `localhost` to find the [[Tor-over-WARP]] proxy, it trips the honey-port → macOS desktop notification + critical `output.log` alert. An early-warning IDS for local malware.\n\n## Scope (honest threat model)\nOnly defeats **blind/generic** scanners. Useless against a targeted process that reads `/tmp/nullexit-ports.env`, greps memory, or runs `lsof -i`. The real mitigation is the [[PF Kill-Switch|host loopback firewall]] (see the \"rogue binary test\" in §15.9.5).\n\n## Incident\nEach START armed a fresh listener that never got reaped → a pile of idle `nc` subshells. Fixed by `pkill` before arming ([[Bugs - Misc Resolved|§15.12.20]]).\n\n## Relationships\n- 🔗 **armed by:** [[toggle.sh]]\n- 🛡️ **protects:** [[Tor-over-WARP]] / [[Procedural Ports]]\n- ⚠️ **weaker than:** [[PF Kill-Switch]] (the real boundary)\n- 🔧 **leak fixed:** §15.12.20 reap-before-arm\n","nullexit-knowledge-graph/Concepts/Kernel IP Blocklist.md":"---\ntags:\n  - type/concept\n  - concept/firewall-layer\n---\n\n# Kernel IP Blocklist (Layer 2)\n\nThe second firewall layer. [[rule-compiler]] fetches four threat-intel feeds — **Spamhaus DROP, Feodo Tracker, Emerging Threats, CINS** — and compiles **~16,721** unique malicious IPs/CIDRs into an `ipset`. [[routing-fix]] injects `FORWARD DROP` rules (both `src` and `dst`, both iptables backends) and reloads on file-mtime change.\n\n## Why it's needed\nDNS sinkholing can't stop malware that hardcodes IPs to bypass DNS (C2 traffic). This layer blocks those at the kernel, both outbound and inbound.\n\n## Safety details\n- RFC1918, loopback, link-local, and Tailscale CGNAT (`100.64.0.0/10`) are **stripped** so you don't lock yourself out of your own LAN/mesh\n- Atomic `ipset` swap so the live set is never empty during reload\n- Costs only ~1.6 MiB kernel memory in the 600MB VM\n\n## Relationships\n- 🔗 **compiled by:** [[rule-compiler]] (IP pipeline)\n- ⬆️ **enforced by:** [[routing-fix]] (dual-backend FORWARD DROP)\n- 🧱 **layer below:** [[AdGuard DNS Sinkhole]]; 🧱 **peer:** [[Geo-IP Blocking]]\n","nullexit-knowledge-graph/Concepts/LAN P2P & DERP.md":"---\ntags:\n  - type/concept\n  - concept/networking\n---\n\n# LAN P2P & DERP\n\nTailscale prefers a fast **direct P2P** path on the same network and falls back to slow **DERP relays** (~80–200ms) otherwise. nullexit deliberately manages this trade-off because P2P on the wrong network is *dangerous*.\n\n## The core tension\nOn AP-isolated / WPA2-Enterprise Wi-Fi, letting the gateway attempt local P2P triggers macOS `gvproxy` **SNAT port mangling** → poisons the phone's WireGuard endpoint → 100% traffic blackhole ([[Bug - SNAT Endpoint Poisoning]]). So the policy is:\n\n- `TAILSCALE_ALLOW_LAN_P2P=false` (default) → [[routing-fix]] **DROPs** container→LAN Tailscale UDP → phone cleanly falls back to DERP\n- Auto-managed: [[watcher.sh]] `detect_lan_p2p_mode()` writes `.lan_p2p_detected` per network\n- A `.host_ips` **RETURN carve-out** re-permits direct host↔container P2P (the one path that always works, even in user-mode networking)\n\n## Observations refining this\n- [[Obs - Cross-AP P2P]] — cross-AP P2P *succeeds* where same-AP fails (per-AP VLAN segmentation vs client isolation)\n- External-peer hole-punching is impossible on the [[Colima VM]] → [[Future - Native Linux]]\n\n## Relationships\n- ⚠️ **P2P danger:** [[Bug - SNAT Endpoint Poisoning]] → default DROP policy\n- 🔗 **auto-detected by:** [[watcher.sh]] → [[routing-fix]]\n- 🔬 **refined by:** [[Obs - Cross-AP P2P]], [[Obs - system_profiler Longevity]]\n- 🔬 **audited by:** [[sweep.sh]] — check 3 requires the gateway peer DIRECT (WARNs on DERP); check 6 TSMP-pings every online peer (DERP pongs count as reachable)\n- ⚔️ **speed vs safety trade** — see [[MOC - Tensions & Invalidations]]\n","nullexit-knowledge-graph/Concepts/MSS Clamping & MTU.md":"---\ntags:\n  - type/concept\n  - concept/networking\n---\n\n# MSS Clamping & MTU\n\nThe [[Double-Tunnel]] adds ~120–160 bytes of overhead per packet, so without help large packets fragment or blackhole. nullexit fights this on several fronts.\n\n## The mechanisms\n- **TCP MSS clamp** to `1120` (`GATEWAY_MSS`, raise to 1180 on healthy paths) — applied natively via [[pf.conf]] `scrub out all max-mss 1160` **and** in [[post-rules.txt]]\n- **Host Tailscale MTU → 1200** (`HOST_MTU`) so host packets fit inside the container's WARP tunnel\n- **`TS_DEBUG_MTU=1200`** to minimize internal fragmentation\n\n## The bugs that forced this\n- Double-VPN UDP crash (6000ms bufferbloat) under QUIC load — [[Bugs - MTU & Throughput|§15.3.1]]\n- QUIC (UDP:443) amplifies edge Wi-Fi packet loss → **blocked**, forcing HTTP/2 (TCP) — §15.3.3\n- Cellular/DERP enforces a strict **1280-byte** PMTUD blackhole — §15.3.4\n- ⚠️ Unresolved: UDP fragmentation crash under extreme `networkQuality` load (SQM rejected for battery reasons)\n\n## Relationships\n- 🔗 **implemented by:** [[pf.conf]], [[post-rules.txt]], [[toggle.sh]] (`setup_exit_node_routing`)\n- ⚠️ **required by:** [[Double-Tunnel]]\n- ⚔️ **trade-off:** QUIC block hurts [[Bug - FaceTime Double-Tunnel|WebRTC/real-time video]]\n","nullexit-knowledge-graph/Concepts/MagicDNS Routing.md":"---\ntags:\n  - type/concept\n  - concept/networking\n---\n\n# MagicDNS & DNS Routing\n\nHow mesh DNS is forced into the [[AdGuard DNS Sinkhole]] and kept out of leaks. Requires Tailscale Admin config: enable MagicDNS, add the gateway's Tailscale IP as the **sole Custom nameserver**, enable \"Use with exit node\" + \"Override local DNS\", delete other global nameservers.\n\n## The MagicDNS bypass it defeats\nWhen clients use \"Tailscale DNS settings\", they query `100.100.100.100`. `tailscaled` **inside** the gateway container resolves this locally and its new request bypasses the PREROUTING intercept — gliding straight to Cloudflare, skipping AdGuard. The fix: force `tailscaled`'s upstream to be AdGuard (via the Custom nameserver config), and REJECT outbound DoT:853 ([[Bugs - DNS Interception|§15.4.2]]).\n\n## Why raw IP, not MagicDNS hostname, for host routing\nThe host's `pf`/`route` need raw IPs (Layer 3). But the first boot step *hijacks the host's DNS to point at the gateway* — so it can't resolve the gateway's MagicDNS name to find the gateway's IP (chicken-and-egg). Hence `.gateway_ip` is fetched dynamically via `tailscale ip -4` ([[Bugs - macOS Platform Quirks|§14.4]]).\n\n## ⚠️ Current gap\nThe DoT REJECT is **shadowed** on the exit path → [[Bug - Shadowed DoT-QUIC REJECT]].\n\n## Relationships\n- 🎯 **forces DNS into:** [[AdGuard DNS Sinkhole]]\n- 🔗 **re-forced by:** [[DNS Watcher]], [[toggle.sh]] `force_dns_to_gateway`\n- ⚠️ **bypass reopened by:** [[Bug - Shadowed DoT-QUIC REJECT]]\n","nullexit-knowledge-graph/Concepts/PF Kill-Switch.md":"---\ntags:\n  - type/concept\n  - concept/firewall-layer\n---\n\n# PF Kill-Switch (Layer 4)\n\nA native macOS Packet Filter default-deny on the physical interface (`en0`), enabled by `KILL_SWITCH=true`. If the VPN tunnel or Docker dies, the host **loses internet** rather than leaking its real IP. Defined in [[pf.conf]].\n\n## Failsafe design\nWhitelists Cloudflare WARP endpoints, Tailscale DERP relays + control plane (`192.200.0.0/24`), `utun*` tunnel traffic, and local LAN — so remote SSH and AirDrop survive when it engages.\n\n## Hard-won constraints\n- LAN rules must be split per-protocol or they compile TCP-only ([[Bugs - Tailscale P2P & SNAT|§15.7.2]])\n- **Exit-node-only**: enabling it in [[SOCKS5 Fallback]] bricks the host + locks tailscaled out ([[Bugs - Tailscale P2P & SNAT|§15.7.3]])\n- It is also the *real* mitigation for local malware reaching the [[Tor-over-WARP]] proxy — the [[Honey-Port Tripwire]] only catches blind scanners\n\n## Relationships\n- ⬆️ **implemented by:** [[pf.conf]], armed by [[toggle.sh]]\n- 🔬 **verified by:** [[sweep.sh]] check 5/6 (`pfctl` Enabled + anchor `com.apple/nullexit` armed)\n- ⚠️ **conflicts with:** [[SOCKS5 Fallback]] (must stay off there)\n- 🔧 **the real fix for:** local proxy discovery (vs [[Honey-Port Tripwire]])\n- 🔴 **cannot achieve:** [[Future - Host Lockdown]] (VM traffic indistinguishable)\n","nullexit-knowledge-graph/Concepts/Procedural Ports.md":"---\ntags:\n  - type/concept\n  - concept/anonymity\n---\n\n# Procedural Ports\n\nRather than hardcoding proxy ports (`9050`, `1080`), [[toggle.sh]] randomizes all internal proxy ports into the ephemeral range (10000–65000) **every boot** and writes them to `/tmp/nullexit-ports.env`. Defeats static fingerprinting by local malware.\n\n## Collision avoidance\n`get_free_port()` queries the kernel socket table (`netstat -an`) to guarantee the port is free before assigning — so the randomizer never crashes the gateway by grabbing a port a root daemon already owns.\n\n## Consumers\n`$TOR_SOCKS_PORT`, `$TOR_CONTROL_PORT`, SOCKS, and DNS ports are all read from `/tmp/nullexit-ports.env` by the [[Sweep Protocol]] and the user.\n\n## Relationships\n- 🔗 **generated by:** [[toggle.sh]] `get_free_port()`\n- 🛡️ **paired with:** [[Honey-Port Tripwire]] (both fingerprint defenses)\n- 🎯 **serve:** [[Tor-over-WARP]], [[SOCKS5 Fallback]]\n- ⚠️ **doesn't stop:** a process that reads `/tmp/nullexit-ports.env` (→ [[PF Kill-Switch]])\n","nullexit-knowledge-graph/Concepts/Python Runtime Airgap.md":"---\ntags:\n  - type/concept\n  - concept/security\n---\n\n# Python Runtime Airgap (Isolated Mode)\n\nAll Python in the repo ([[dns-proxy.py]], [[generate_tex.py]], `check_circuits.py`) runs on the **stdlib only** and is executed with **`python3 -I`** (Isolated Mode), which blinds the interpreter to `PYTHONPATH`, `PYTHONHOME`, and user `site-packages`.\n\n## Why\n[[dns-proxy.py]] binds a privileged UDP:53 socket via `sudo -n`. A single compromised global `pip` package (`requests`, `pyyaml`) could hook the runtime and exploit that sudo to gain root. Isolated Mode permanently air-gaps the gateway from PyPI supply-chain attacks. The NOPASSWD sudoers entry is scoped to exactly `/usr/bin/python3 -I .../scripts/dns-proxy.py`.\n\n## The zero-dependency rule\n**Never** `pip install` anything into the system Python nullexit uses. Targets Apple's stock Python 3.9.6.\n\n## Relationships\n- 🛡️ **protects:** [[dns-proxy.py]] (privileged), [[generate_tex.py]]\n- 🔗 **enforced by:** scoped NOPASSWD sudoers + `-I` flag\n- 🧩 **part of:** [[Threat Model]] (supply-chain surface)\n","nullexit-knowledge-graph/Concepts/Roaming & Recovery.md":"---\ntags:\n  - type/concept\n  - concept/resilience\n---\n\n# Roaming & Recovery\n\nnullexit replicates the mechanics premium VPN clients (Mullvad/Nord) use to survive Wi-Fi transitions. Closing the lid or roaming APs otherwise leaves the gateway half-dead.\n\n## The 4-step transition cycle\n1. **Firewall lock** — the [[PF Kill-Switch]] stays locked on `en0` so the real IP never leaks while rebuilding\n2. **Event interception** — [[watcher.sh]] catches `State:/Network/Global/IPv4` in <500ms → `recover.sh --post-wake`\n3. **Bypass routing** — resolve the new gateway IP, clean stale routes, re-add WARP/DERP bypass routes\n4. **NAT re-negotiation** — force-recreate [[warp (Gluetun)|warp]] if the WireGuard binding is wedged (~15s)\n\n## Asymmetric reliability (honest)\n- **Roam/network path: reliable** (`scutil n.watch` catches every event)\n- **Lid-wake path: best-effort** on Sonoma+ — launchd suspends the agent, so live `log stream` wake events are dropped. Mitigated because [[DNS Watcher]] re-hijacks within 5s and gluetun/tailscaled self-heal in ~30s.\n\n## Relationships\n- 🔗 **driven by:** [[watcher.sh]] + [[recover.sh]] (`--post-wake`)\n- 🛡️ **protected by:** [[PF Kill-Switch]], [[Gateway Active Marker]]\n- ⚠️ **caused loops:** [[Bug - Post-Wake Feedback Loop]], [[Bug - WARP Watcher Race]]\n- 🤝 **complements:** [[DNS Watcher]], [[WARP Watcher]]\n","nullexit-knowledge-graph/Concepts/SOCKS5 Fallback.md":"---\ntags:\n  - type/concept\n  - concept/resilience\n---\n\n# SOCKS5 Fallback\n\nThe **failover lane** when the Tailscale exit node is unavailable (e.g. restrictive Wi-Fi blocks Tailscale UDP, or pre-flight checks flake). Born from the [[Bugs - Exit-Node Return Path|`rx 0` blackhole]] investigation, then repurposed into a bulletproof fallback.\n\n## The two failover paths\n- **DNS:** Browser → host `127.0.0.1:53` → [[dns-proxy.py]] → TCP:5354 → [[adguardhome]] → WARP\n- **TCP:** Apps → macOS SOCKS5 (`127.0.0.1:1080`) → [[tailscale container]] → tun0 → WARP\n\n## Its dangerous edges\n- ⚠️ **macOS browsers ignore the system SOCKS proxy** → HTTP exits direct while DNS is filtered → the \"Scenario A\" host leak ([[Bugs - WARP Liveness & Host Leaks|§15.6.1A]])\n- ⚠️ The [[PF Kill-Switch]] must **not** run in this mode or it bricks the host ([[Bugs - Tailscale P2P & SNAT|§15.7.3]])\n\n## Relationships\n- 🔗 **uses:** [[dns-proxy.py]], [[tailscale container]] built-in SOCKS\n- ⚠️ **conflicts with:** [[PF Kill-Switch]]\n- ⚠️ **can leak:** [[Bug - Overnight Silent IP Leak|host leak class]] (Scenario A)\n- 🔬 **detected by:** [[diagnose-host-leak.sh]]\n","nullexit-knowledge-graph/Concepts/Tor-over-WARP.md":"---\ntags:\n  - type/concept\n  - concept/anonymity\n---\n\n# Tor-over-WARP\n\nAn **isolated procedural Tor SOCKS5 proxy** ([[tor container]]) for extreme OPSEC. Your ISP/enterprise sees only a Cloudflare WireGuard tunnel (blind to Tor use); Cloudflare sees encrypted TCP to a Guard node; the Tor exit sees your traffic but not your real IP.\n\n## The \"transparent proxy trap\" (what NOT to do)\nA system-wide transparent Tor proxy destroys anonymity — background iCloud/Apple Mail syncs and browser fingerprints leak identity through the exit. So nullexit uses an **opt-in isolated proxy**: you consciously point a hardened browser at it.\n\n## Hardening layers\n- [[Procedural Ports]] — randomized per boot, defeats static fingerprinting\n- [[Honey-Port Tripwire]] — IDS for blind local port scans\n- obfs4 bridges (`TOR_USE_BRIDGES=true`) — DPI evasion; user must supply bridge lines (the \"bootstrapping paradox\" — no auto-fetch)\n- Fail-closed egress inherited from [[warp (Gluetun)|warp]]'s namespace\n\n## Threat-model honesty\nPort randomization + honey-port only defeat *blind* scanners. A targeted local process reads `/tmp/nullexit-ports.env` or runs `lsof -i`. Real mitigation = [[PF Kill-Switch|loopback-filtering host firewall]] (LuLu/Little Snitch).\n\n## Relationships\n- 🔗 **runs on:** [[tor container]] (inside [[warp (Gluetun)]] namespace)\n- ⬆️ **hardened by:** [[Procedural Ports]], [[Honey-Port Tripwire]]\n- 🤝 **enables:** [[Transparent Onion Routing]]\n- 🌱 **basis for:** [[Future - Host-Only Tor Mode]]\n- ⚠️ **real security boundary:** [[PF Kill-Switch]], not port secrecy\n","nullexit-knowledge-graph/Concepts/Transparent Onion Routing.md":"---\ntags:\n  - type/concept\n  - concept/anonymity\n---\n\n# Transparent .onion Routing\n\nSeamless, zero-config `.onion` browsing for **all** mesh devices. [[adguardhome|AdGuard]] intercepts `.onion` queries and maps them into the **`198.18.0.0/15`** benchmark subnet (RFC 2544); [[routing-fix]] NAT-redirects that range's TCP into [[tor container|Tor]]'s transparent port 9040.\n\n## Why the benchmark subnet\nTwo earlier ranges failed:\n- `10.192.0.0/10` collided with Colima's Docker subnet → routing loop\n- `10.123.0.0/16` was dropped locally because macOS Tailscale **excludes RFC1918** from exit-node routing\n\n`198.18.0.0/15` is not private, so Tailscale's exit node auto-routes it to the gateway — no manual static routes ([[Bugs - Tor Container|§11.4]]).\n\n## Relationships\n- 🔗 **maps into:** [[tor container]] via [[routing-fix]] NAT\n- 🎯 **resolution by:** [[AdGuard DNS Sinkhole]]\n- 🤝 **sibling of:** [[Tor-over-WARP]]\n- 🔬 **validated by:** [[Sweep Protocol]] (`.onion` → 198.18/15 check)\n","nullexit-knowledge-graph/Concepts/WARP Watcher.md":"---\ntags:\n  - type/concept\n  - concept/resilience\n---\n\n# WARP Watcher\n\nThe **innermost safety layer** — a background daemon (child of [[toggle.sh]]) polling `cdn-cgi/trace` every 30s from inside the [[warp (Gluetun)|warp]] container. Applies a **statistically calibrated threshold**: `WARP_FAIL_THRESHOLD` consecutive `warp=off` reads (default 6 = 30s) before acting. `P(6 consecutive false positives) ≈ 0.0001%`.\n\n## What it does\n- **Always logs** every on↔off transition (`grep WARP output.log`) — the \"never fail silently\" mandate\n- At threshold → runs nuclear [[recover.sh]], reverting the host to normal internet so no traffic leaks through a dead tunnel\n- Complements (doesn't replace) [[watcher.sh]] (roam/wake) and [[diagnose-host-leak.sh]] (manual)\n\n## Its own hazards\n- Raced [[recover.sh|post-wake]]'s force-recreate → self-inflicted nuclear shutdown ([[Bug - WARP Watcher Race]]) → fixed with an inhibit marker\n- Its nuclear teardown left a marker → infinite recovery loop ([[Bugs - Routing Loops|§15.2.9]])\n\n## Blind spot\nIt asks the *container* if it sees `warp=on`; it can't see **host-NIC** leaks. That's why [[diagnose-host-leak.sh]] exists (host view). Together they close the [[Bug - Overnight Silent IP Leak]] class.\n\n## Relationships\n- 👁️ **watches:** [[warp (Gluetun)]]; ⬆️ **fires:** [[recover.sh]] (nuclear)\n- ⚠️ **raced:** [[Bug - WARP Watcher Race]]\n- 🤝 **complements:** [[watcher.sh]], [[diagnose-host-leak.sh]], [[sweep.sh]] (on-demand full-gateway sweep)\n- 🛡️ **guards the core promise** against [[Bug - Overnight Silent IP Leak]]\n","nullexit-knowledge-graph/Containers/Colima VM.md":"---\ntags:\n  - type/container\n  - type/infrastructure\n  - status/active\n---\n\n# Colima VM\n\nThe lightweight Linux VM (Apple `Virtualization.framework` `vz`) that runs Docker on macOS. **600MB RAM + 400MB swap.** Everything containerized lives here. This VM boundary is the source of many of nullexit's hardest quirks.\n\n## VM-induced constraints\n- **TCP-only SSH tunnel** → UDP ports unreachable from host → [[dns-proxy.py]] exists to bridge UDP:53→TCP\n- **`gvproxy` SNAT mangling** → [[Bug - SNAT Endpoint Poisoning]] (the flagship P2P blackhole)\n- **No true UDP hole-punching to external peers** → remote peers fall back to DERP ([[Future - Native Linux]] is the only full fix)\n- **[[Future - Host Lockdown]] is impossible** — pf can't distinguish the VM app's traffic from host traffic\n- Bridged networking (`--network-mode bridged`) is gated on trusted LAN — needs `socket_vmnet`\n\n## Lifecycle hazards\n- `colima start` **hangs ~2 min** after provisioning → `colima_start_until_ready()` polls Docker instead ([[Bugs - Docker & Colima Lifecycle|§15.8.7]])\n- Hard reboots leave a stale `docker.sock` → auto-heal via `colima restart` (§15.8.4)\n- RAM too tight (512MB) → swap thrashing → DNS latency; bumped to 600MB (§15.8.1)\n\n## Relationships\n- 🔗 **hosts:** [[warp (Gluetun)]], [[tailscale container]], [[adguardhome]], [[routing-fix]], [[tor container]], [[rule-compiler]]\n- ⚠️ **root cause of:** [[Bug - SNAT Endpoint Poisoning]], VM P2P limits, [[Future - Host Lockdown]] impossibility\n- 🔧 **collision-repaired by:** [[fix-docker-bridge-collision.sh]]\n- ⬆️ **obsoleted by:** [[Future - Native Linux]]\n","nullexit-knowledge-graph/Containers/adguardhome.md":"---\ntags:\n  - type/container\n  - status/active\n---\n\n# adguardhome\n\n`adguard/adguardhome` — the **DNS sinkhole**. Listens on port 5335, upstream `127.0.0.1:53` (through [[warp (Gluetun)|WARP]]). Web UI at `http://<gateway-ts-ip>:3000` (`admin`/`nullexit`). Loads the ~342k-rule blocklist compiled by [[rule-compiler]].\n\n## Role in the stack\nLayer 1 of the 4-layer firewall ([[AdGuard DNS Sinkhole]]). Every mesh device's DNS is forced here via [[MagicDNS Routing]]. Provides per-client blocking keyed by Tailscale IP (REST API).\n\n## Facts & hazards\n- No `depends_on: rule-compiler` anymore — boots instantly on the already-compiled file ([[rule-compiler|§15.8.8]])\n- The bind-mounted `adguard/work/` is **off-limits** to outside writers — only the [[rule-compiler]] container writes it (UID/perms mismatch corrupts its BoltDB)\n- Dual sinkhole IPs (`0.0.0.0` vs `127.0.0.1`) — [[Obs - Dual Sinkhole IPs]]\n- ⚠️ A client can currently **bypass** it via DoT:853 → [[Bug - Shadowed DoT-QUIC REJECT]]\n\n## Relationships\n- ⬆️ **implements:** [[AdGuard DNS Sinkhole]]\n- 🔗 **fed by:** [[rule-compiler]]; reached via [[dns-proxy.py]] in fallback\n- 🎯 **DNS forced here by:** [[MagicDNS Routing]]\n- ⚠️ **bypassable via:** [[Bug - Shadowed DoT-QUIC REJECT]] → [[Future - Fix Shadowed REJECTs]]\n","nullexit-knowledge-graph/Containers/tailscale container.md":"---\ntags:\n  - type/container\n  - status/active\n---\n\n# tailscale (container)\n\n`tailscale/tailscale` — advertises this gateway as an **exit node** on the mesh, and provides the built-in **SOCKS5 proxy** (`TS_SOCKS5_SERVER=:1080`) used by [[SOCKS5 Fallback]]. Runs inside [[warp (Gluetun)|warp]]'s namespace, so all its egress goes through WARP → the [[Double-Tunnel]].\n\n## Distinct from host tailscaled\nThe **host** runs a separate standalone `tailscaled` (Homebrew). The container advertises the exit node; the host *joins* it as its own exit node. The host daemon has its own failure modes ([[Bugs - macOS Platform Quirks|freeze on wake]]).\n\n## Key facts\n- Listen port moved `41641 → 41642` to avoid colliding with host tailscaled ([[Bug - SNAT Endpoint Poisoning]] Phase 1)\n- `TS_AUTH_ONCE=true` — a cloud footgun if the key expires ([[Bugs - Misc Resolved|§15.12.11]])\n- Userspace `tailscaled` intercepts MagicDNS internally → bypasses PREROUTING → the [[MagicDNS Routing]] fix\n\n## Relationships\n- ⬆️ **provides:** exit node, [[SOCKS5 Fallback]]\n- 🔗 **runs inside:** [[warp (Gluetun)]] namespace → [[Double-Tunnel]]\n- ⚠️ **STUN blocked by** warp firewall → cold-boot delay ([[Bugs - Roaming & Sleep-Wake]])\n- ⚠️ **replaced by:** [[Future - Post-Quantum]] (raw WireGuard + Rosenpass), [[Future - Mullvad & Headscale]] (Headscale)\n- 🔬 **P2P quirks:** [[LAN P2P & DERP]], [[Obs - Cross-AP P2P]]\n","nullexit-knowledge-graph/Containers/tor container.md":"---\ntags:\n  - type/container\n  - status/active\n---\n\n# tor (container)\n\n`debian:bookworm-slim` — an **isolated, headless Tor infrastructure proxy** inside [[warp (Gluetun)|warp]]'s namespace, giving a **Tor-over-WARP** topology. Exposes SOCKS5 (9050), Control (9051), Transparent (9040), and DNSPort (5353) — all mapped to host localhost via [[Procedural Ports|randomized ports]].\n\n## What it powers\n- [[Tor-over-WARP]] — opt-in SOCKS proxy for hardened browsers / CLI tools\n- [[Transparent Onion Routing]] — mesh-wide `.onion` browsing via `198.18.0.0/15`\n- Optional `obfs4` bridges for DPI evasion (`TOR_USE_BRIDGES=true`)\n\n## Fail-closed for free\nBecause it shares [[warp (Gluetun)|warp]]'s namespace, it **inherits** the WARP kill-switch — if `tun0` drops, Tor egress fails closed, never leaking to `eth0`.\n\n## Incidents\n- obfs4proxy missing on `bullseye` → base image bumped to `bookworm` ([[Bugs - Tor Container|§15.10.1]])\n- ControlPort on `0.0.0.0` with no auth → Tor self-closed it → dynamic HMAC password ([[Bugs - Tor Container|§15.10.2]])\n\n## Relationships\n- ⬆️ **implements:** [[Tor-over-WARP]], [[Transparent Onion Routing]]\n- 🔗 **inherits fail-closed from:** [[warp (Gluetun)]]\n- 🔗 **ports via:** [[Procedural Ports]] + [[Honey-Port Tripwire]]\n- 🌱 **central to future:** [[Future - Host-Only Tor Mode]]\n- 🔬 **inspected by:** [[Sweep Protocol]] (circuit lookup)\n","nullexit-knowledge-graph/Containers/warp (Gluetun).md":"---\ntags:\n  - type/container\n  - status/active\n---\n\n# warp (Gluetun)\n\n`qmcgaw/gluetun` — the WireGuard client to **Cloudflare WARP**. It **owns the shared network namespace**; every other container (`tailscale`, `routing-fix`, `adguardhome`, `tor`) joins it via `network_mode: service:warp`. This makes it the single most load-bearing container in the stack.\n\n## Why it's central\n- Provides the outer tunnel of the [[Double-Tunnel]] (`tun0`)\n- Its strict fail-closed firewall is **inherited** by all namespace tenants — this is how [[Tor-over-WARP]] fails closed for free\n- Recreating it detaches everyone's network stack → **never `docker compose restart warp`** on a live gateway\n\n## Known incidents tied to warp\n- [[Bug - Overnight Silent IP Leak]] — missing `WIREGUARD_PERSISTENT_KEEPALIVE_INTERVAL` let NAT expire the tunnel silently\n- [[Bugs - Docker & Colima Lifecycle|24s startup delay]] — Cloudflare rate-limits rapid same-key reconnects\n- Its outbound firewall blocks the [[tailscale container]]'s STUN → 30–45s cold-boot handshake ([[Bugs - Roaming & Sleep-Wake|§15.5.4]])\n- Health check must use `wget` (Alpine dropped `curl`) — [[Bugs - Routing Loops|§15.2.4]]\n\n## Endpoints\n`WIREGUARD_ENDPOINT_IP=${WARP_ENDPOINT_1:-162.159.192.1}:2408` — now `.env`-driven so host bypass routes and the container agree ([[Bugs - Routing Loops|§15.2.6]]).\n\n## Relationships\n- 🔗 **owns namespace for:** [[tailscale container]], [[routing-fix]], [[adguardhome]], [[tor container]]\n- ⬆️ **provides:** [[Double-Tunnel]] outer tunnel, fail-closed egress\n- 👁️ **watched by:** [[WARP Watcher]], [[diagnose-host-leak.sh]]\n- ⚠️ **would be removed by:** [[Future - AmneziaWG]], [[Future - Shadowsocks Hop]] (B2), [[Future - Host-Only Tor Mode]]\n- 🔧 **rules from:** [[post-rules.txt]], [[routing-fix]]\n","nullexit-knowledge-graph/Future/Future - AmneziaWG.md":"---\ntags:\n  - type/future\n  - status/research\n  - priority/low\n---\n\n# 🔭 Future — AmneziaWG (High-Speed DPI Evasion)\n\n**§12.7.** A WireGuard fork that pads the handshake with randomized junk, destroying the 148-byte DPI signature firewalls look for (Egypt/Russia-grade blocking). Keeps bare-metal WireGuard UDP speed — no TCP-over-TCP \"meltdown\" of Shadowsocks/V2Ray wrappers.\n\n## ⚠️ What it invalidates\n- **You cannot use Cloudflare WARP** — must self-host a server (see [[Future - Shadowsocks Hop]] on VPS/privacy costs)\n- Requires **ripping [[warp (Gluetun)|Gluetun]] out** of the stack and building a custom container → **loses Gluetun's built-in kill-switch + healthcheck** that [[WARP Watcher]], [[Roaming & Recovery]], and [[Tor-over-WARP]]'s fail-closed inheritance all rely on\n\n## Precondition\nOnly sane with [[Future - Pluggable Egress]] in place, or it's a stack-wide rewrite.\n\n## Relationships\n- ⚠️ **removes:** [[warp (Gluetun)]], the kill-switch → breaks [[WARP Watcher]], [[Tor-over-WARP]] fail-closed\n- ⬆️ **needs:** [[Future - Pluggable Egress]]\n- 🤝 **alternative to:** [[Future - Shadowsocks Hop]] (SS is TCP-based, slower)\n- 🧭 **index:** [[MOC - Future]] · tension: [[MOC - Tensions & Invalidations]]\n","nullexit-knowledge-graph/Future/Future - FaceTime Split-Route.md":"---\ntags:\n  - type/future\n  - status/implemented\n  - priority/high\n---\n\n# 🔭 Future — FaceTime / Real-Time P2P Split-Route\n\n**§18.1 / §15.12.22.** The mitigation for [[Bug - FaceTime Double-Tunnel]]. **Implemented 2026-07-17, opt-in, default OFF.**\n\n## Mechanism (Option 2 — narrow, opt-in)\nAdd more-specific host routes for FaceTime's Apple `/16`s via the **physical** gateway. Longest-prefix match beats Tailscale's exit-node `0.0.0.0/1` + `128.0.0.0/1`, so only those `/16`s leave **direct** while everything else stays double-tunneled. Mirrors `add_warp_bypass_routes`. The physical gateway is resolved from the surviving `default` route (`netstat -rn` — it coexists with the `/1` override).\n\n## Wiring (built)\n`add_apple_split_routes()` / `remove_apple_split_routes()` in [[common.sh]] — called in [[toggle.sh]] START **after `enable_killswitch`** (so the anchor + table exist) + [[recover.sh]] `--post-wake` (survives roam) + removed in STOP cleanup. Gated on `FACETIME_SPLIT_ROUTE` in `.env` (default false); subnets in `FACETIME_DIRECT_SUBNETS` (default `17.249.0.0/16`).\n\n**The part the original plan missed — PF.** A route alone is dropped by the kill-switch's `block out on en0 all`. So [[pf.conf]] gains a `table <apple_direct> persist` + `pass out quick on en0 proto { tcp udp } to <apple_direct>`; the table is **empty unless enabled**, so the kill-switch posture is byte-identical by default. `add_apple_split_routes` populates it via `pfctl -a com.apple/nullexit -t apple_direct -T add`.\n\n## Enable\n`FACETIME_SPLIT_ROUTE=true` in `.env`, then re-apply routing (`./toggle.sh --restart`, or `./recover.sh --post-wake`). Verify: `route -n get 17.249.0.1` → interface `en0` (not `utun`), and `sudo pfctl -a com.apple/nullexit -t apple_direct -T show`.\n\n## Verified live (2026-07-18) ✅\nEnabled + `--restart`: `17.249.0.0/16` → `en0` via the physical gateway while `8.8.8.8` still → `utun6` (narrow split holds); the `<apple_direct>` PF table populated and a **TCP connect to a real Apple relay in `17.249.0.0/16` port 443 succeeded** with the kill-switch still `Enabled` — so the route + PF pass work together and the fail-closed posture for all non-Apple traffic is intact.\n\n## ⚠️ Privacy trade-off (the invalidation edge)\nThe direct `/16`s expose the **real ISP IP** (not WARP) for that traffic — a deliberate, narrow hole in [[Double-Tunnel]] anonymity for Apple infra in exchange for working calls. Apple already ties traffic to the Apple ID, so scope is \"Apple-direct.\" Default is **narrow** (`17.249.0.0/16`); broaden to `17.0.0.0/8` at the cost of wider exposure.\n\n## Capture that unblocked it (2026-07-17)\nLive `tcpdump` during a real call confirmed the double-tunnel failure and the relay range: UDP P2P media = **0 packets** (symmetric-NAT hole-punch dead), while FaceTime fell back to a **TCP-443 media relay in `17.249.0.0/16`** — 899 pkts / 15 s. That `/16` is now the default direct subnet. See [[Bug - FaceTime Double-Tunnel]].\n\n## Relationships\n- 🩹 **mitigates:** [[Bug - FaceTime Double-Tunnel]]\n- ⚠️ **weakens:** [[Double-Tunnel]] anonymity (opt-in, narrow)\n- 🔗 **wires into:** [[common.sh]], [[toggle.sh]], [[recover.sh]]\n- 🧭 **index:** [[MOC - Future]]\n","nullexit-knowledge-graph/Future/Future - Fix Shadowed REJECTs.md":"---\ntags:\n  - type/future\n  - status/todo\n  - priority/high\n---\n\n# 🔭 Future — Fix the Shadowed DoT/QUIC REJECTs\n\n**§18.1 TODO.** Close the currently-open [[Bug - Shadowed DoT-QUIC REJECT]] hole.\n\n## The change\nThe `FORWARD` `-i tailscale0 -p udp --dport 853` (DoT) and `--dport 443` (QUIC) REJECT rules are dead because the earlier `-i tailscale0 -o tun0 -j ACCEPT` matches first (0 pkts on each). **Re-order the REJECTs before the ACCEPT** (or scope them `-o tun0`) in [[routing-fix]] / [[post-rules.txt]].\n\n## Why it's high priority\nUntil fixed, a mesh client can **bypass [[AdGuard DNS Sinkhole|AdGuard]] filtering via DoT:853** — a working feature is silently defeated ([[MOC - Tensions & Invalidations]]).\n\n## Watch out\nAny FORWARD-chain re-ordering must be applied to **both** iptables backends (nftables + legacy) and be idempotent under [[routing-fix]]'s 30s loop (`-C` before `-A`).\n\n## Relationships\n- 🔧 **fixes:** [[Bug - Shadowed DoT-QUIC REJECT]]\n- 🛡️ **restores:** [[AdGuard DNS Sinkhole]], [[MagicDNS Routing]] enforcement\n- 🔗 **edits:** [[routing-fix]], [[post-rules.txt]]\n- 🧭 **index:** [[MOC - Future]]\n","nullexit-knowledge-graph/Future/Future - Host Lockdown.md":"---\ntags:\n  - type/future\n  - status/impossible\n  - priority/none\n---\n\n# 🔭 Future — Host Lockdown Mode (Impossible on macOS)\n\n**§14.6.** A documented **dead end**, kept because it's a frequently-requested feature that cannot work. \"Mode 3\": keep the Docker exit node fully functional for remote devices while **completely blocking the host machine itself** from the internet (so not even encrypted host traffic leaks metadata).\n\n## Why it's impossible on macOS\nDocker runs inside the [[Colima VM]], which is a **standard macOS user-space application**. If [[pf.conf|pf]] drops all host outbound traffic, it indiscriminately drops the VM app's traffic too — instantly killing the WARP tunnel and the exit node. Writing pf rules to \"allow the VM app, allow WARP IPs, allow DERP IPs, block everything else\" is fragile and discouraged.\n\n## Where it becomes possible\nOn native Linux, host traffic uses the `OUTPUT` chain and Docker uses `FORWARD` — you can drop `OUTPUT` and Docker keeps routing. → [[Future - Native Linux]].\n\n## Consolation\nThe current default mode **already** encrypts host traffic through WARP, so the host is already ISP-leak-protected ([[Double-Tunnel]]).\n\n## Relationships\n- 🔴 **blocked by:** [[Colima VM]] (VM-as-userspace-app)\n- ⬆️ **unlocked only by:** [[Future - Native Linux]]\n- 🔗 **already-good-enough:** [[Double-Tunnel]] host encryption\n- 🧭 **index:** [[MOC - Future]] · tension: [[MOC - Tensions & Invalidations]]\n","nullexit-knowledge-graph/Future/Future - Host-Only Tor Mode.md":"---\ntags:\n  - type/future\n  - status/todo\n  - priority/medium\n---\n\n# 🔭 Future — Host-Only Tor Mode (Pluggable Egress)\n\n**§18.1 TODO.** An `EGRESS_TYPE=tor_host_only` mode for heavily-censored (DPI) environments: skip [[warp (Gluetun)|warp]] + [[tailscale container|tailscale]], boot [[adguardhome]] + [[tor container]] (via obfs4 bridges), set AdGuard upstream to Tor's DNSPort, and use the [[PF Kill-Switch]] to force **all host traffic** through Tor. A 100%-free, VPS-free DPI-evasion path.\n\n## ⚠️ What it invalidates (major tension)\n- **Tor is TCP-only** → pf must **aggressively DROP all host UDP** (except DNS) — this kills FaceTime/QUIC/mDNS, the exact media paths [[Future - FaceTime Split-Route]] tries to *restore*\n- Loses the [[Double-Tunnel]] and [[LAN P2P & DERP]] mesh entirely\n- \"Daily driver\" friction: iCloud sync / macOS updates / Spotlight blindly download GBs over Tor → circuit saturation\n- **Bridge rot:** when obfs4 bridges burn out, the kill-switch = total internet loss\n- Exit-node discrimination → Cloudflare CAPTCHA onslaught, banking rejections\n\n## Relationships\n- 🔗 **builds on:** [[Tor-over-WARP]], [[tor container]], [[PF Kill-Switch]]\n- ⬆️ **needs:** [[Future - Pluggable Egress]] (`EGRESS_TYPE`)\n- ⚠️ **invalidates:** [[Double-Tunnel]], all UDP apps, [[LAN P2P & DERP]]\n- 🧭 **index:** [[MOC - Future]] · tension map: [[MOC - Tensions & Invalidations]]\n","nullexit-knowledge-graph/Future/Future - Mullvad & Headscale.md":"---\ntags:\n  - type/future\n  - status/hardening\n  - priority/medium\n---\n\n# 🔭 Future — Mullvad & Headscale Hardening\n\n**§9.4.** Drop-in upgrades that trade convenience for stronger anonymity.\n\n| Layer | Default | Hardened |\n|---|---|---|\n| VPN exit | Cloudflare WARP (US) | **Mullvad** (Swedish no-logs, cash/Monero) |\n| DNS | AdGuard via WARP | AdGuard via **Mullvad DoH** (Cloudflare-blind) |\n| Coordination | Tailscale (US) | **Headscale** (self-hosted) |\n| Auth | Persistent OAuth | Ephemeral keys |\n| Content | WireGuard | WireGuard + **PSKs** |\n\n## ⚠️ The trade-off (invalidation edge)\nSwapping WARP for Mullvad **gives up the \"anonymity in a crowd\" + static high-trust IP** that [[Double-Tunnel]] §9.1 deliberately chose. Mullvad's ASN is a flagged VPN range → more CAPTCHAs / banking rejections, the opposite of WARP's low-friction posture. Headscale removes Tailscale-the-company but you now run coordination infra.\n\n## Mechanics\n- Mullvad: `VPN_SERVICE_PROVIDER=mullvad` in docker-compose (Gluetun-native)\n- Headscale replaces the [[tailscale container]]'s control plane\n- PSKs blind the coordination server from transit content\n\n## Relationships\n- 🛡️ **strengthens:** [[Threat Model]]\n- ⚠️ **trades away:** WARP crowd-anonymity + static trusted IP ([[Double-Tunnel]])\n- 🔗 **touches:** [[warp (Gluetun)]], [[tailscale container]]\n- 🧭 **index:** [[MOC - Future]]\n","nullexit-knowledge-graph/Future/Future - Native Linux.md":"---\ntags:\n  - type/future\n  - status/roadmap\n  - priority/medium\n---\n\n# 🔭 Future — Native Linux Deployment\n\n**§18.2.** Run nullexit on a native Linux host (Raspberry Pi, Intel NUC) instead of macOS + [[Colima VM]]. Container footprint ~75MB without hypervisor overhead.\n\n## What it fixes\n- **True UDP
