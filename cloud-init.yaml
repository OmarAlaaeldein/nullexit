#cloud-config
# Generic Cloud-Init Bootstrap Script for Remote Exit Nodes (Ubuntu/Debian)
# Paste this into the "User Data" or "Initialization Script" section when creating a VPS.

package_update: true
package_upgrade: true

packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - git
  - python3
  - python3-pip

runcmd:
  # 1. Install Docker natively
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
  - sudo apt-get update
  - sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin

  # 2. Add default user (ubuntu) to docker group
  - usermod -aG docker ubuntu || true
  - usermod -aG docker debian || true

  # 3. Create the installation directory
  - mkdir -p /opt/nullexit
  - chown -R ubuntu:ubuntu /opt/nullexit || chown -R debian:debian /opt/nullexit

  # 4. Enable IPv4 and IPv6 forwarding for VPN routing
  - echo "net.ipv4.ip_forward=1" >> /etc/sysctl.d/99-tailscale.conf
  - echo "net.ipv6.conf.all.forwarding=1" >> /etc/sysctl.d/99-tailscale.conf
  - sysctl -p /etc/sysctl.d/99-tailscale.conf

final_message: "The remote exit node has been fully bootstrapped. SSH in, clone the repo to /opt/nullexit, add your .env, and run ./setup-linux.sh!"
